name: Supabase Keep-Alive

# Mantém os projetos Supabase (Gestor Financeiro + Gestor 3D) acordados,
# evitando a pausa automática por inatividade do plano free.

on:
  schedule:
    - cron: '17 6 * * *'   # todo dia ~06:17 UTC (03:17 BRT)
  workflow_dispatch: {}     # permite rodar manualmente pelo botão "Run workflow"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Gestor Financeiro
        run: |
          curl -sS -X POST "https://cppuceykhffjdcmwpfpk.supabase.co/rest/v1/rpc/keepalive" \
            -H "apikey: ${{ secrets.SUPABASE_FIN_ANON }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_FIN_ANON }}" \
            -H "Content-Type: application/json" -d '{}' \
            -w "\nFINANCEIRO -> HTTP %{http_code}\n"

      - name: Ping Gestor 3D
        run: |
          curl -sS -X POST "https://bzeuyahlxtnxfniftqdy.supabase.co/rest/v1/rpc/keepalive" \
            -H "apikey: ${{ secrets.SUPABASE_3D_ANON }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_3D_ANON }}" \
            -H "Content-Type: application/json" -d '{}' \
            -w "\n3D -> HTTP %{http_code}\n"
