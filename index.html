// ---- INVESTIMENTOS: cálculos ----
function mesesDesde(dataStr){
  const a=new Date(dataStr+'T00:00:00'), b=new Date();
  let m=(b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth());
  if(b.getDate()<a.getDate()) m-=1;
  return Math.max(0,m);
}
function valorAtualInvest(inv){
  const taxa=Number(inv.taxa_mensal)||0;
  if(!inv.data_aplicacao) return Number(inv.valor_aplicado||0);
  const a=new Date(inv.data_aplicacao+'T00:00:00'), b=new Date();
  const dias=Math.max(0,(b-a)/86400000);
  const meses=dias/30.4375; // fração de mês → rende diariamente
  return Number(inv.valor_aplicado||0)*Math.pow(1+taxa/100, meses);
}
function investimentosScope(){ return DATA.investimentos.filter(i=>!i.arquivado && srcOk(i.user_id)); }
function totalInvestido(){ return investimentosScope().reduce((a,i)=>a+valorAtualInvest(i),0); }
function patrimonioTotal(){
  let s=saldoTotal();
  s+=totalInvestidoContas();
  investimentosScope().filter(i=>i.incluir_patrimonio!==false).forEach(i=>s+=valorAtualInvest(i));
  return s;
}
// agregações para gráficos/orçamento
function noScope(l){
  if(!srcOk(l.user_id)) return false;
  if(scope==='familia') return lancFamiliar(l);
  if(lancFamiliar(l)) return false;
  if(scope==='tudo') return true;
  if(l.tipo==='transferencia') return (contaById(l.conta_id)&&contaById(l.conta_id).tipo===scope)||(contaById(l.conta_destino_id)&&contaById(l.conta_destino_id).tipo===scope);
  const conta=l.cartao_id?cartaoById(l.cartao_id):contaById(l.conta_id);
  return conta&&conta.tipo===scope;
}
function noScopeAll(l){
  // como noScope, mas ignora o filtro "De quem" (Eu/Carol/Casal) — sempre inclui eu + parceiros
  const uidOk = l.user_id===USER.id || MYPARTNERS.some(p=>p.owner_id===l.user_id);
  if(!uidOk) return false;
  if(scope==='familia') return lancFamiliar(l);
  if(lancFamiliar(l)) return false;
  if(scope==='tudo') return true;
  if(l.tipo==='transferencia') return (contaById(l.conta_id)&&contaById(l.conta_id).tipo===scope)||(contaById(l.conta_destino_id)&&contaById(l.conta_destino_id).tipo===scope);
  const conta=l.cartao_id?cartaoById(l.cartao_id):contaById(l.conta_id);
  return conta&&conta.tipo===scope;
}
function inMonth(l,d){const ld=new Date(l.data+'T00:00:00');return ld>=firstOfMonth(d)&&ld<=new Date(d.getFullYear(),d.getMonth()+1,0);}
// Para relatórios: lançamentos de cartão contam no mês da FATURA (competência), não da compra
function inMonthRep(l,d){
  if(l.cartao_id){
    if(!l.competencia) return false;
    return faturaYm(l.competencia, cartaoById(l.cartao_id))===ymd(firstOfMonth(d)).slice(0,7);
  }
  return inMonth(l,d);
}
// alerta quando um orçamento por categoria passa de 80% e de 100% (avisa 1x por mês por nível)
function checarOrcamentos(){
  try{
    const hoje=new Date(); const am=ymd(firstOfMonth(hoje)).slice(0,7);
    const orcs=DATA.orcamentos.filter(o=>o.user_id===USER.id && o.ano_mes===am && Number(o.limite)>0);
    if(!orcs.length) return;
    for(const o of orcs){
      const gasto=DATA.lancamentos.filter(l=>l.user_id===USER.id && l.tipo==='despesa' && l.categoria_id===o.categoria_id && inMonth(l,hoje))
        .reduce((a,l)=>a+Number(l.valor||0),0);
      const pct=gasto/Number(o.limite)*100;
      const cat=catById(o.categoria_id); const nome=cat?cat.nome:'categoria';
      for(const nivel of [100,80]){
        if(pct>=nivel){
          const k='gf_orc_'+o.categoria_id+'_'+am+'_'+nivel;
          if(localStorage.getItem(k)!=='1'){
            localStorage.setItem(k,'1');
            vibra(nivel===100?70:40);
            toast(nivel===100
              ? '🚨 Orçamento de '+nome+' estourou: '+brl(gasto)+' de '+brl(Number(o.limite))
              : '⚠️ '+nome+' já usou '+Math.round(pct)+'% do orçamento do mês');
          }
          break; // avisa só o nível mais alto atingido
        }
      }
    }
  }catch(e){}
}
function gastosPorCategoria(d,allSources){
  const map={};
  for(const l of DATA.lancamentos){
    if(l.tipo!=='despesa') continue;
    if(ehLancQuitacao(l)) continue;
    if(!inMonthRep(l,d)) continue;
    if(allSources){ if(!noScopeAll(l)) continue; } else { if(!noScope(l)) continue; }
    const cat=catById(l.categoria_id);
    const key=cat?cat.id:'_sem';
    if(!map[key]) map[key]={nome:cat?cat.nome:'Sem categoria',icone:cat?cat.icone:'❓',valor:0};
    map[key].valor+=Number(l.valor)||0;
  }
  return Object.entries(map).map(([id,v])=>({id,...v})).sort((a,b)=>b.valor-a.valor);
}

function evolucaoMeses(n,allSources){
  const out=[];
  for(let i=n-1;i>=0;i--){
    const d=new Date(viewMonth.getFullYear(),viewMonth.getMonth()-i,1);
    let rec=0,desp=0;
    for(const l of DATA.lancamentos){
      if(l.tipo==='transferencia') continue;
      if(!inMonthRep(l,d)) continue;
      if(allSources){ if(!noScopeAll(l)) continue; } else { if(!noScope(l)) continue; }
      if(l.tipo==='receita') rec+=Number(l.valor)||0; else { if(!ehLancQuitacao(l)) desp+=Number(l.valor)||0; }
    }
    out.push({mes:d,rec,desp});
  }
  return out;
}
// Receitas x Despesas — 24 meses, rolagem horizontal (2 anos até o mês selecionado)
function evolucao24HTML(){
  // PROJEÇÃO pra frente: do mês atual até o último mês que tem receita lançada (máx 24 meses).
  const base=new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1);
  const N=24, all=[];
  for(let i=0;i<N;i++){
    const d=new Date(base.getFullYear(), base.getMonth()+i, 1);
    let rec=0,desp=0;
    for(const l of DATA.lancamentos){
      if(l.tipo==='transferencia') continue;
      if(!inMonthRep(l,d)) continue;
      if(!noScope(l)) continue;
      if(l.tipo==='receita') rec+=Number(l.valor)||0; else { if(!ehLancQuitacao(l)) desp+=Number(l.valor)||0; }
    }
    all.push({mes:d,rec,desp});
  }
  // corta no último mês com RECEITA; garante um horizonte mínimo de 6 meses
  let lastRec=-1, lastAny=-1;
  all.forEach((m,i)=>{ if(m.rec>0) lastRec=i; if(m.rec>0||m.desp>0) lastAny=i; });
  let endIdx = lastRec>=0 ? lastRec : (lastAny>=0 ? lastAny : 0);
  endIdx = Math.max(endIdx, 5);
  const ev=all.slice(0, Math.min(endIdx+1, N));
  const maxV=Math.max(1,...ev.map(m=>Math.max(m.rec,m.desp)));
  const totRec=ev.reduce((a,m)=>a+m.rec,0);
  const totDesp=ev.reduce((a,m)=>a+m.desp,0);
  const saldo=totRec-totDesp;
  let h=`<div class="card" style="margin-bottom:0"><h3 style="margin:0 0 2px;font-size:15px">Receitas x Despesas — próximos ${ev.length} meses</h3>
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Projeção do mês atual pra frente ↔ · saldo do período <b style="color:${saldo>=0?'var(--bar-rec)':'var(--bar-desp)'}">${brl(saldo)}</b></div>
    <div class="hbarwrap"><div class="hbars">`;
  let lastYear=null;
  ev.forEach(m=>{
    const hr=Math.round(m.rec/maxV*90), hd=Math.round(m.desp/maxV*90);
    const yr=m.mes.getFullYear();
    const mesLab=m.mes.toLocaleDateString('pt-BR',{month:'short'}).replace('.','');
    const showYr=(yr!==lastYear); lastYear=yr;
    h+=`<div class="barcol barcolH" title="${mesNome(m.mes)}&#10;Receitas ${brl(m.rec)}&#10;Despesas ${brl(m.desp)}">
      <div class="barpair"><div class="bar rec" style="height:${hr}px"></div><div class="bar desp" style="height:${hd}px"></div></div>
      <div class="barlab">${mesLab}${showYr?`<br><span style="font-size:9px;opacity:.7">${String(yr).slice(2)}</span>`:''}</div>
    </div>`;
  });
  h+=`</div></div><div class="legend"><span><i style="background:var(--bar-rec)"></i>Receitas</span><span><i style="background:var(--bar-desp)"></i>Despesas</span></div></div>`;
  return h;
}
// Gastos diários de um parceiro específico (ex: só da Carol), sempre pela data da compra
// No relatório diário, despesa de cartão pertence ao mês da FATURA (competência), não ao dia da compra.
// Assim uma compra parcelada aparece 1x em cada mês (no dia-do-mês da compra), e não empilhada num dia só.
function diaGastoDiario(l,d){
  const diasNoMes=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  if(!l.data) return 0;
  if(l.cartao_id){
    if(!l.competencia) return 0;
    if(faturaYm(l.competencia,cartaoById(l.cartao_id))!==ymd(firstOfMonth(d)).slice(0,7)) return 0;
  } else {
    if(!inMonth(l,d)) return 0;
  }
  let dia=new Date(l.data+'T00:00:00').getDate();
  if(dia>diasNoMes) dia=diasNoMes;
  return dia;
}
function gastosDiariosPartner(d,ownerId){
  const diasNoMes=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  const arr=Array.from({length:diasNoMes},(_,i)=>({dia:i+1,valor:0}));
  for(const l of DATA.lancamentos){
    if(l.tipo!=='despesa') continue;
    if(ehLancQuitacao(l)) continue;
    if(l.user_id!==ownerId) continue;
    const dia=diaGastoDiario(l,d);
    if(!dia) continue;
    arr[dia-1].valor+=Number(l.valor)||0;
  }
  return arr;
}
function brlShort(v){
  if(HIDEVAL) return '••••';
  const n=Math.round(Number(v)||0);
  return n.toLocaleString('pt-BR');
}
// total de despesas por mês do ano (competência pra cartão, data pra conta)
// todos os meses com lançamento (pode passar de 2026 -> 2030 por causa das parcelas)
function gastosMensaisTodos(ownerId){
  const mapa={};
  for(const l of DATA.lancamentos){
    if(l.tipo!=='despesa') continue;
    if(ehLancQuitacao(l)) continue;
    if(l.user_id!==ownerId) continue;
    let ym;
    if(l.cartao_id){ if(!l.competencia) continue; ym=faturaYm(l.competencia,cartaoById(l.cartao_id)); }
    else ym=(l.data||'').slice(0,7);
    if(!ym) continue;
    mapa[ym]=(mapa[ym]||0)+(Number(l.valor)||0);
  }
  const chaves=Object.keys(mapa).sort();
  if(!chaves.length) return [];
  // preenche os meses vazios entre o primeiro e o último
  const [y0,m0]=chaves[0].split('-').map(Number);
  const [y1,m1]=chaves[chaves.length-1].split('-').map(Number);
  const out=[];
  let y=y0, m=m0;
  let guard=0;
  while((y<y1 || (y===y1 && m<=m1)) && guard++<400){
    const ym=`${y}-${String(m).padStart(2,'0')}`;
    out.push({ym, ano:y, mes:m, valor:mapa[ym]||0});
    m++; if(m>12){ m=1; y++; }
  }
  return out;
}

// ============ ARRASTAR PRA REORDENAR (segura no ⠿ e arrasta) ============
function ordemSalva(key,defaultOrder,disponiveis){
  let ord=null;
  try{ ord=JSON.parse(localStorage.getItem(key)||'null'); }catch(e){}
  if(!Array.isArray(ord)) ord=defaultOrder;
  // mantém só chaves disponíveis agora, na ordem salva, depois acrescenta as novas que faltarem
  const out=ord.filter(k=>disponiveis.includes(k));
  disponiveis.forEach(k=>{ if(!out.includes(k)) out.push(k); });
  return out;
}
function makeSortable(containerId,storageKey){
  const cont=$(containerId); if(!cont) return;
  cont.querySelectorAll(':scope > .sortable-item').forEach(item=>{
    const handle=item.querySelector('.drag-handle');
    if(!handle || handle._bound) return;
    handle._bound=true;
    handle.addEventListener('pointerdown',(e)=>{
      e.preventDefault();
      const items=[...cont.querySelectorAll(':scope > .sortable-item')];
      const rect=item.getBoundingClientRect();
      const startY=e.clientY;
      const placeholder=document.createElement('div');
      placeholder.className='sortable-placeholder';
      placeholder.style.height=rect.height+'px';
      item.parentNode.insertBefore(placeholder,item.nextSibling);
      item.classList.add('dragging');
      item.style.position='fixed';
      item.style.width=rect.width+'px';
      item.style.left=rect.left+'px';
      item.style.top=rect.top+'px';
      item.style.margin='0';
      document.body.appendChild(item);
      try{ handle.setPointerCapture(e.pointerId); }catch(err){}
      function onMove(ev){
        const dy=ev.clientY-startY;
        item.style.top=(rect.top+dy)+'px';
        let next=null;
        for(const other of items){
          if(other===item) continue;
          const r=other.getBoundingClientRect();
          if(ev.clientY < r.top+r.height/2){ next=other; break; }
        }
        if(next && next.parentNode) next.parentNode.insertBefore(placeholder,next);
        else if(placeholder.parentNode) placeholder.parentNode.appendChild(placeholder);
        // autoscroll perto das bordas da tela
        const margin=70, sc=document.scrollingElement||document.documentElement;
        if(ev.clientY<margin) sc.scrollTop-=14;
        else if(ev.clientY>window.innerHeight-margin) sc.scrollTop+=14;
      }
      function onUp(){
        document.removeEventListener('pointermove',onMove);
        document.removeEventListener('pointerup',onUp);
        placeholder.parentNode.insertBefore(item,placeholder);
        placeholder.remove();
        item.classList.remove('dragging');
        item.style.position=''; item.style.width=''; item.style.left=''; item.style.top=''; item.style.margin='';
        const order=[...cont.querySelectorAll(':scope > .sortable-item')].map(x=>x.dataset.key);
        localStorage.setItem(storageKey, JSON.stringify(order)); salvarPrefs();
      }
      document.addEventListener('pointermove',onMove);
      document.addEventListener('pointerup',onUp,{once:true});
    });
  });
}

function balancoMes(d){
  const ini=firstOfMonth(d), fim=new Date(d.getFullYear(),d.getMonth()+1,0);
  let rec=0,desp=0,recPend=0;
  for(const l of DATA.lancamentos){
    if(l.tipo==='transferencia') continue;
    if(l.cartao_id) continue; // gastos de cartão entram via fatura
    if(!srcOk(l.user_id)) continue;
    const ld=new Date(l.data+'T00:00:00');
    if(ld<ini||ld>fim) continue;
    const conta=contaById(l.conta_id);
    if(scope==='familia'){ if(!lancFamiliar(l)) continue; }
    else { if(lancFamiliar(l)) continue; if(scope!=='tudo' && (!conta || conta.tipo!==scope)) continue; }
    if(l.tipo==='receita'){ rec+=Number(l.valor)||0; if(l.status!=='pago') recPend+=Number(l.valor)||0; }
    else { if(!ehLancQuitacao(l)) desp+=Number(l.valor)||0; }
  }
  return {rec,desp,recPend,saldo:rec-desp};
}
// Detalhamento das saídas do mês (contas pagas, a pagar, investimento e cônjuge)
function saidasMes(d){
  const ini=firstOfMonth(d), fim=new Date(d.getFullYear(),d.getMonth()+1,0);
  const viewingPartner = (source!=='eu' && source!=='casal'); // source = owner_id de um parceiro
  let pagas=0,aPagar=0,invest=0, conj=0, pagFat=0, invPend=0;
  for(const l of DATA.lancamentos){
    if(l.cartao_id) continue;
    const ld=new Date(l.data+'T00:00:00'); if(ld<ini||ld>fim) continue;
    const val=Number(l.valor)||0;
    // "Pagamento de fatura" e "Pagamento a <cônjuge>" NÃO são despesa nova — só quitam algo já contado (cartão/gasto). Ignora no total.
    const _desc=(l.descricao||'').toLowerCase();
    const ehQuitacao = _desc.startsWith('pagamento fatura') || _desc.startsWith('pagamento a ');
    const isPartner = l.user_id!==USER.id && MYPARTNERS.some(p=>p.owner_id===l.user_id);
    // CÔNJUGE: gastos do parceiro (quem paga sou eu) → some no meu total, exceto quando estou vendo o parceiro direto
    if(isPartner){
      if(!viewingPartner){
        if(l.tipo==='despesa' && !ehQuitacao) conj+=val;
        else if(l.tipo==='transferencia'){ const dest=contaById(l.conta_destino_id); if(!dest || dest.eh_investimento) conj+=val; }
        continue; // não deixa cair nos buckets principais (evita contar 2x no Casal)
      }
      // se estou vendo o parceiro direto, ele é o "main" → segue o fluxo abaixo
    }
    if(!srcOk(l.user_id)) continue;
    let bucket=null;
    if(l.tipo==='transferencia'){
      const dest=contaById(l.conta_destino_id), orig=contaById(l.conta_id);
      if(!orig||orig.eh_investimento) continue;
      if(scope==='familia'){ if(!lancFamiliar(l)) continue; }
      else { if(lancFamiliar(l)) continue; if(scope!=='tudo' && orig.tipo!==scope) continue; }
      if(dest && dest.eh_investimento) bucket='invest';
      else if(!dest) bucket = (l.status==='pago'?'pagas':'aPagar');
      else continue;
    } else if(l.tipo==='despesa'){
      const conta=contaById(l.conta_id);
      if(ehQuitacao){ if(_desc.startsWith('pagamento fatura') && l.status==='pago') pagFat+=val; continue; } // rastreia pagamento de fatura mas não conta como despesa nova
      if(scope==='familia'){ if(!lancFamiliar(l)) continue; }
      else { if(lancFamiliar(l)) continue; if(scope!=='tudo' && (!conta||conta.tipo!==scope)) continue; }
      bucket = (l.status==='pago'?'pagas':'aPagar');
    } else continue;
    if(bucket==='pagas'){ pagas+=val; } else if(bucket==='aPagar') aPagar+=val; else if(bucket==='invest'){ invest+=val; if(l.status!=='pago') invPend+=val; }
  }
  // Cartões do cônjuge também entram no total "Gasto · Cônjuge" (não duplicam em "Gastos no cartão")
  let pagoConj=0;
  if(!viewingPartner && MYPARTNERS.length>0){
    const ymConj=ymd(ini).slice(0,7);
    const partnerIds=MYPARTNERS.map(p=>p.owner_id);
    for(const l of DATA.lancamentos){
      if(!l.cartao_id) continue;
      const isPartnerCard = l.user_id!==USER.id && partnerIds.includes(l.user_id);
      if(!isPartnerCard) continue;
      if(!l.competencia || faturaYm(l.competencia, cartaoById(l.cartao_id))!==ymConj) continue;
      conj += (l.tipo==='receita'?-1:1)*(Number(l.valor)||0);
    }
    // Quanto eu já transferi para a(s) conta(s) da parceira neste mês (abate do "falta")
    for(const l of DATA.lancamentos){
      if(l.user_id!==USER.id) continue;
      if(l.tipo!=='transferencia') continue;
      const ld=new Date(l.data+'T00:00:00'); if(ld<ini||ld>fim) continue;
      const dest=contaById(l.conta_destino_id);
      if(dest && partnerIds.includes(dest.user_id)) pagoConj += Number(l.valor)||0;
    }
  }
  return {pagas,aPagar,invest, invPend, conjuge:conj, pagoConjuge:pagoConj, pagFatura:pagFat};
}
function gastoCartaoMes(d){
  const ym=ymd(firstOfMonth(d)).slice(0,7);
  const viewingPartner=(source!=='eu' && source!=='casal');
  let s=0;
  for(const l of DATA.lancamentos){
    if(!l.cartao_id) continue;
    if(!l.competencia || faturaYm(l.competencia, cartaoById(l.cartao_id))!==ym) continue;
    if(!srcOk(l.user_id)) continue;
    const isPartnerCard = l.user_id!==USER.id && MYPARTNERS.some(p=>p.owner_id===l.user_id);
    if(isPartnerCard && !viewingPartner) continue; // no "Eu/Casal" o cônjuge entra em "Gasto · Cônjuge"
    const cart=cartaoById(l.cartao_id);
    if(scope==='familia'){ if(!(cart&&cart.incluir_principal===false)) continue; }
    else { if(cart&&cart.incluir_principal===false) continue; if(scope!=='tudo' && (!cart||cart.tipo!==scope)) continue; }
    s += (l.tipo==='receita'?-1:1)*(Number(l.valor)||0);
  }
  return s;
}

function lancScopeOk(l){
  if(scope==='familia') return lancFamiliar(l);
  if(lancFamiliar(l)) return false;
  if(scope==='tudo') return true;
  if(l.tipo==='transferencia') return (contaById(l.conta_id)&&contaById(l.conta_id).tipo===scope)||(contaById(l.conta_destino_id)&&contaById(l.conta_destino_id).tipo===scope);
  const conta=l.cartao_id?cartaoById(l.cartao_id):contaById(l.conta_id); return conta&&conta.tipo===scope;
}
function pendentesList(){

}

function calcVal(s){
  s=String(s||'').replace(/,/g,'.').replace(/\s/g,'');
  if(!s) return NaN;
  if(!/^[0-9+\-*/().]+$/.test(s)) return NaN;
  try{ const v=Function('"use strict";return('+s+')')(); return (typeof v==='number'&&isFinite(v))?+v.toFixed(2):NaN; }catch(e){ return NaN; }
}

async function confirmarLanc(id){
  const l=DATA.lancamentos.find(x=>x.id===id); if(!l)return;
  const valor=calcVal($('cfValor').value);
  if(!(valor>0)){toast('Valor inválido');return;}
  const conta_id=$('cfConta').value||l.conta_id;
  // atualização otimista: muda na hora localmente (tela responde instantâneo)
  l.status='pago'; l.valor=valor; l.conta_id=conta_id;
  closeSheet(); render(); vibra();
  const ehTransfInvest = l.tipo==='transferencia' && (()=>{ const dest=contaById(l.conta_destino_id); return dest&&dest.eh_investimento; })();
  // salva no servidor em segundo plano
  const r=await dbUpdate('lancamentos',{status:'pago',valor,conta_id},'id',id);
  if(r&&r.error){ toast('Erro ao salvar: '+r.error.message); try{await loadAll();}catch(e){} render(); return; }
  if(ehTransfInvest){ alocarAporte(valor); return; }
  toast(r&&r.queued?'Confirmado (offline) — sincroniza depois':'Confirmado ✅');
}

  if(!list.length){
    html+=`<div class="card"><div class="empty"><div class="ico">${ICON('receipt',30)}</div><p>Nenhuma ${f==='receita'?'receita':f==='despesa'?'despesa':'transação'} em ${mesNome(viewMonth)}.</p><button class="btn coral sm" onclick="openLanc()">Adicionar</button></div></div>`;
    $('content').innerHTML=html; return;
  }
  const pend=list.filter(l=>l.status==='pendente' && !l.cartao_id).sort((a,b)=>a.data<b.data?-1:a.data>b.data?1:0);
  const cart=list.filter(l=>!!l.cartao_id);
  const efet=list.filter(l=>!l.cartao_id && l.status!=='pendente');
  if(pend.length){
    const ef=pend.reduce((a,l)=>a+(l.tipo==='receita'?Number(l.valor):l.tipo==='despesa'?-Number(l.valor):0),0);

    pend.forEach(l=>html+=rowLanc(l));
    html+=`</div>`;
  }
  if(cart.length){
    const tc=cart.reduce((a,l)=>a+valFatura(l),0);
    html+=`<div class="grp-lab"><span>No cartão · entra na fatura</span><span class="gv" style="color:var(--coral)">${brl(tc)}</span></div><div class="card">`;

    html+=`</div>`;

  if(efet.length){
    html+=`<div class="grp-lab"><span>Efetivadas</span></div><div class="card">`;
    efet.forEach(l=>html+=rowLanc(l));
    html+=`</div>`;
  }
  $('content').innerHTML=html;
}
function normDesc(d){return (d||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');}
let _fixoCache=null,_fixoAt=0;
function fixoSet(){
  const now=Date.now();
  if(_fixoCache && now-_fixoAt<3000) return _fixoCache;
  const m=new Map();
  DATA.lancamentos.forEach(x=>{
    if(x.tipo==='transferencia'||(x.parcelas&&x.parcelas>1))return;
    const k=x.tipo+'|'+normDesc(x.descricao);
    if(!m.has(k))m.set(k,new Set());
    m.get(k).add((x.data||'').slice(0,7));
  });
  _fixoCache=new Set(); m.forEach((s,k)=>{ if(s.size>=2)_fixoCache.add(k); });
  _fixoAt=now; return _fixoCache;
}
function isFixo(l){
  if(l.tipo==='transferencia'||(l.parcelas&&l.parcelas>1))return false;
  if(l.grupo_id)return true;
  if(l.cartao_id)return false; // compra de cartão repetida (mercado, padaria) não é conta fixa
  return fixoSet().has(l.tipo+'|'+normDesc(l.descricao));
}
function duePill(l){
  if(l.status!=='pendente'||l.tipo==='transferencia'||l.tipo==='receita') return '';
  const hoje=ymd(new Date()), amanha=ymd(new Date(Date.now()+86400000));
  if(l.data<hoje) return ' <span class="pill" style="background:#fdecec;color:#d64545;font-weight:700">atrasada</span>';
  if(l.data===hoje) return ' <span class="pill" style="background:#fff3df;color:#c07600;font-weight:700">vence hoje</span>';
  if(l.data===amanha) return ' <span class="pill" style="background:#fff3df;color:#c07600">vence em 1 dia</span>';
  return '';
}
function rowLanc(l){
  const cat=catById(l.categoria_id);
  let cls='b',sign='',sub='';
  if(l.tipo==='receita'){cls='g';sign='+';}
  else if(l.tipo==='despesa'){cls='r';sign='-';}
  const vis = l.tipo==='transferencia' ? {icon:'swap',color:'#3b6fd6'} : catVisual(cat,l.tipo);
  if(l.tipo==='transferencia'){
    const o=contaById(l.conta_id),d=contaById(l.conta_destino_id);
    sub=`${o?esc(o.nome):'?'} → ${d?esc(d.nome):'?'}`;
  }else{
    const conta=l.cartao_id?cartaoById(l.cartao_id):contaById(l.conta_id);
    sub=(cat?esc(cat.nome):'Sem categoria')+(conta?' · '+esc(conta.nome):'');
  }
  const dt=new Date(l.data+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  let hora='';
  if(l.tipo==='despesa' && l.criado_em){
    hora=' · '+new Date(l.criado_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }
  const parc=(l.parcelas&&l.parcelas>1)?` <span class="pill neg">${l.parcela}/${l.parcelas}</span>`:'';
  const fixo=isFixo(l)?` <span class="pill" style="background:#e8eefc;color:#3b5bdb">fixo</span>`:'';
  const pend=duePill(l);
  let chk='';
  if(!l.cartao_id && l.tipo!=='transferencia'){
    chk = l.status==='pago'
      ? `<div class="lchk on" title="Confirmado — toque para voltar a pendente" onclick="event.stopPropagation();toggleLancPago('${l.id}')">✓</div>`
      : `<button class="lconf" onclick="event.stopPropagation();toggleLancPago('${l.id}')">Confirmar</button>`;
  }
  let dias='';
  if(l.status==='pendente' && !l.cartao_id && l.tipo!=='transferencia'){
    const dd=Math.round((new Date(l.data+'T00:00:00')-new Date(ymd(new Date())+'T00:00:00'))/86400000);
    const cor=dd<0?'var(--coral)':(dd<=2?'#e0a020':'var(--muted)');
    dias=`<div style="font-size:9px;font-weight:800;color:${cor};line-height:1;margin-top:3px;text-align:center">${dd<0?Math.abs(dd)+'d!':dd===0?'hoje':dd+'d'}</div>`;
  }
  const _pago = l.status==='pago' && !l.cartao_id && l.tipo!=='transferencia';
  return `<div class="lrow${_pago?' pago':''}" onclick="openLanc('${l.id}')">
    <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0"><div class="dot" style="background:${tintBg(vis.color)};color:${vis.color}">${ICON(vis.icon,18)}</div>${dias}</div>
    <div class="mid"><div class="t">${(HIDEVAL&&l.tipo==='receita')?'••••••':esc(l.descricao)}${parc}${fixo}${pend}</div><div class="s">${dt}${hora} · ${sub}</div></div>
    <div class="amt ${cls}">${sign}${brl(Number(l.valor)).replace('R$ ','R$ ')}</div>${chk}</div>`;
}

// Melhor cartão pra comprar HOJE: o que dá mais dias até a cobrança (acabou de fechar)
function melhorCartaoCompra(){
  const meus=DATA.cartoes.filter(c=>!c.arquivado && c.user_id===USER.id && (scope==='tudo'||c.tipo===scope));
  if(!meus.length) return null;
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const diaHoje=hoje.getDate();
  let melhor=null, maxDias=-1;
  meus.forEach(c=>{
    const fech=Number(c.dia_fechamento)||1;
    const venc=Number(c.dia_vencimento)||10;
    // em quantos dias a compra de hoje vai ser cobrada (vencimento da fatura em que ela cai)
    // se hoje já passou do fechamento, cai na fatura que vence daqui a ~2 meses; senão, no próximo vencimento
    let mesesAteVenc;
    if(diaHoje>=fech){
      // no dia do fechamento (ou depois) a compra entra na próxima fatura → vence mais longe
      mesesAteVenc = (venc>fech)?1:2;
    }else{
      mesesAteVenc = (venc>fech)?0:1;
    }
    let dv=new Date(hoje.getFullYear(), hoje.getMonth()+mesesAteVenc, Math.min(venc,28));
    if(dv<hoje) dv=new Date(hoje.getFullYear(), hoje.getMonth()+mesesAteVenc+1, Math.min(venc,28));
    const dias=Math.round((dv-hoje)/86400000);
    if(dias>maxDias){ maxDias=dias; melhor={cartao:c, dias}; }
  });
  return melhor;
}
function diasParaVencCartao(c){
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  let due=new Date(hoje.getFullYear(),hoje.getMonth(),Math.min(Number(c.dia_vencimento)||1,28));
  const dv=Number(c.dia_vencimento)||1;
  due=new Date(hoje.getFullYear(),hoje.getMonth(),dv);
  if(due<hoje) due=new Date(hoje.getFullYear(),hoje.getMonth()+1,dv);
  return Math.round((due-hoje)/86400000);
}
function faturaPagaInfo(cartaoId, mes){
  const c=cartaoById(cartaoId); if(!c) return {paga:false};
  const tot=faturaTotal(cartaoId,mes);
  if(tot<=0) return {paga:false};
  const m=firstOfMonth(mes).getMonth(), y=firstOfMonth(mes).getFullYear();
  const pags=DATA.lancamentos.filter(l=>{
    if(l.tipo!=='despesa'||l.cartao_id) return false;
    if(!(l.descricao||'').toLowerCase().startsWith('pagamento fatura '+c.nome.toLowerCase())) return false;
    const d=new Date((l.data||'')+'T00:00:00');
    return d.getMonth()===m && d.getFullYear()===y;
  });
  const pago=pags.reduce((a,l)=>a+(Number(l.valor)||0),0);
  const paga = pago >= tot-0.5;
  let dataPg='';
  if(paga && pags.length){
    const ult=pags.sort((a,b)=>(b.data||'')<(a.data||'')?-1:1)[0];
    if(ult&&ult.data) dataPg=new Date(ult.data+'T00:00:00').toLocaleDateString('pt-BR');
  }
  return {paga, dataPg};
}
function faturaPaga(cartaoId, mes){ return faturaPagaInfo(cartaoId,mes).paga; }

async function saveAjusteFatura(cartaoId){

  let desc;

    if(!(valor>=0)){toast('Informe o total correto');return;}

  const compDate=new Date(faturaMonth.getFullYear(), faturaMonth.getMonth()-off, 1);

function renderContas(){
  const cs=contasScope();
  const fam = scope==='familia';
  let html=`<div class="page-title">${fam?'👨‍👩‍👧 Contas de familiares':'Contas'}</div>`;
  html+=`<div class="card hero"><div class="lab">Saldo somado${fam?' (familiares)':''}</div><div class="big">${brl(cs.reduce((a,c)=>a+saldoConta(c.id),0))}</div></div>`;
  if(fam){
    if(!cs.length) html+=`<div class="card"><div class="empty"><div class="ico">👨‍👩‍👧</div><p>Nenhuma conta de familiar. Crie uma conta e marque "Separado (familiar)".</p></div></div>`;
    else{
      const grupos={}; cs.forEach(c=>{const t=(c.titular&&c.titular.trim())||'Familiar';(grupos[t]=grupos[t]||[]).push(c);});
      Object.keys(grupos).forEach(t=>{const arr=grupos[t],sub=arr.reduce((a,c)=>a+saldoConta(c.id),0);
        html+=`<div class="card"><div class="lrow" style="border:none;padding:2px 0 8px"><div class="mid"><div class="t">${esc(t)}</div><div class="s">Saldo somado</div></div><div class="amt ${sub<0?'r':''}">${brl(sub)}</div></div>`+arr.map(rowConta).join('')+`</div>`;});
    }
  }else{
    const normais=cs.filter(c=>!c.eh_investimento);
    const invest=cs.filter(c=>c.eh_investimento);
    html=`<div class="page-title">Contas</div>`;
    html+=`<div class="card hero"><div class="lab">Saldo somado</div><div class="big">${brl(normais.reduce((a,c)=>a+saldoConta(c.id),0))}</div></div>`;
    html+=`<div class="card">`+(normais.length?normais.map(rowConta).join(''):`<div class="empty"><div class="ico">${ICON('bank',32)}</div><p>Nenhuma conta.</p></div>`)+`</div>`;
    if(invest.length || totalInvestido()>0){
      const totalInvTudo = invest.reduce((a,c)=>a+saldoConta(c.id),0) + totalInvestido();
      html+=`<div class="page-title" style="margin-top:18px">Investimentos <span style="font-weight:700;color:var(--mint)">${brl(totalInvTudo)}</span></div>`;
      html+=`<div class="card">`+(invest.length?invest.map(rowConta).join(''):'')+`</div>`;
      html+=`<div class="note" style="margin:6px 2px">Inclui contas de investimento e a aba Investir. Esse dinheiro fica separado do saldo do dia a dia e entra no seu patrimônio.</div>`;
    }
  }
  html+=`<button class="btn outline" onclick="openConta()">+ Adicionar conta</button>`;
  $('content').innerHTML=html;
}

function fmtBrData(d){ if(!d) return '—'; try{ const dt=new Date((String(d).length<=10)?(d+'T00:00:00'):d); return dt.toLocaleDateString('pt-BR'); }catch(e){ return String(d); } }
function fmtBrDataHora(d){ if(!d) return '—'; try{ const dt=new Date(d); const dia=dt.toLocaleDateString('pt-BR'); const hora=dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); return dia+' às '+hora; }catch(e){ return String(d); } }
async function renderClientes(){
  if(USER.id!==ADMIN_ID){go('home');return;}
  $('content').innerHTML=`<div class="page-title" style="display:flex;align-items:center;gap:8px"><button class="backbt" onclick="go('config')">‹</button> 👑 Clientes do Gestor</div><div class="loading"><div class="spin"></div></div>`;
  let rows=[];
  try{ const {data,error}=await sb.rpc('admin_clientes'); if(error)throw error; rows=data||[]; }
  catch(e){ $('content').innerHTML=`<div class="page-title" style="display:flex;align-items:center;gap:8px"><button class="backbt" onclick="go('config')">‹</button> 👑 Clientes do Gestor</div><div class="card">Erro: ${esc(e.message||String(e))}<div class="note" style="margin-top:6px">Já rodou o SQL de licenças no Supabase? Me chama que te passo de novo.</div></div>`; return; }

  desenharClientes(window._cliFiltro||'');
}
function desenharClientes(filtro){
  window._cliFiltro=filtro||'';
  const all=window._cliRows||[];
  const rows=all.filter(r=>!filtro || (r.email||'').toLowerCase().includes(filtro) || (r.nome||'').toLowerCase().includes(filtro));
  const stat={total:all.length,teste:0,pag:0,venc:0};
  all.forEach(r=>{const s=licStatus(r); if(!s.ok)stat.venc++; else if(s.tipo==='teste')stat.teste++; else stat.pag++;});
  let html=`<div class="page-title" style="display:flex;align-items:center;gap:8px"><button class="backbt" onclick="go('config')">‹</button> 👑 Clientes do Gestor</div>`;
  html+=`<div class="field"><input id="cliBusca" placeholder="🔎 Buscar por nome ou email…" value="${esc(filtro)}" oninput="desenharClientes(this.value.toLowerCase())"></div>`;
  html+=`<div style="display:flex;gap:8px;margin-bottom:14px">
    ${[['Total',stat.total,'var(--ink)'],['Em teste',stat.teste,'#3b82f6'],['Pagantes',stat.pag,'var(--mint)'],['Vencidos',stat.venc,'var(--coral)']].map(([l,v,c])=>`<div class="card" style="flex:1;text-align:center;padding:12px;margin:0"><div style="font-size:22px;font-weight:800;color:${c}">${v}</div><div class="note">${l}</div></div>`).join('')}
  </div>`;
  if(!rows.length) html+=`<div class="card"><div class="empty"><div class="ico">👥</div><p>${filtro?'Ninguém bate com a busca.':'Nenhum cliente ainda. Quando alguém criar conta, aparece aqui.'}</p></div></div>`;
  rows.forEach(r=>{
    const s=licStatus(r);
    const pill=r.status==='bloqueado'?`<span class="pill" style="background:#fdecec;color:#d64545;font-weight:700">Bloqueado</span>`
      : !s.ok?`<span class="pill" style="background:#fdecec;color:#d64545;font-weight:700">Vencido</span>`
      : s.tipo==='teste'?`<span class="pill" style="background:#e8eefc;color:#3b5bdb;font-weight:700">Em teste</span>`
      : s.tipo==='pago'?`<span class="pill" style="background:#e7f6ee;color:#1f7a4d;font-weight:700">Pagante</span>`
      : `<span class="pill" style="background:#e7f6ee;color:#1f7a4d;font-weight:700">Liberado</span>`;
    const venc = r.status==='liberado'?'<b style="color:var(--mint)">sem vencimento</b>'
      : r.status==='pago'?('pago até <b>'+fmtBrData(r.pago_ate)+'</b>')
      : r.teste_ate?('teste até <b>'+fmtBrData(r.teste_ate)+'</b>'+(s.ok&&s.dias!=null?' · <b style="color:var(--mint)">faltam '+s.dias+' dia'+(s.dias===1?'':'s')+'</b>':''))
      : '—';
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="min-width:0"><b style="font-size:16px">${esc(r.nome||r.email||'—')}</b><div class="note" style="word-break:break-all">${esc(r.email||'')}</div></div>${pill}
      </div>
      <div class="note" style="margin-top:8px">${venc} · cadastro ${fmtBrData(r.criado_em)} · últ. acesso ${fmtBrDataHora(r.ultimo_acesso)}</div>
      ${(r.fone||r.cidade)?`<div class="note">${r.fone?`📱 <a href="https://wa.me/55${(r.fone||'').replace(/\\D/g,'')}" style="color:var(--nav-on)">${esc(r.fone)}</a>`:''}${(r.fone&&r.cidade)?' · ':''}${r.cidade?'📍 '+esc(r.cidade)+(r.uf?'/'+esc(r.uf):''):''}</div>`:''}
      <div class="note">🔑 ${r.logins||0} logins · ⏱️ ${Math.round(r.minutos_uso||0)} min de uso · 1º acesso ${fmtBrData(r.primeiro_acesso)}</div>
      <div class="note">🧾 ${r.n_lanc||0} lançamentos · 🏦 ${r.n_contas||0} contas · 💳 ${r.n_cartoes||0} cartões</div>
      ${(()=>{
        // estima progresso do tutorial pelos dados: conta, receita/despesa, etc.
        const temConta=(r.n_contas||0)>=1, temCartao=(r.n_cartoes||0)>=1, temLanc=(r.n_lanc||0)>=2, temCasal=(r.conjuges||0)>=1;
        const feitos=[temConta,temCartao,temLanc,temCasal].filter(Boolean).length;
        const configurou=temConta && temLanc;
        const cor = configurou?'var(--mint)':(temConta?'#e0a020':'var(--coral)');
        const txt = configurou?'✅ Configurou o app':(temConta?'⏳ Começou a configurar':'⚠️ Ainda não configurou');
        return `<div class="note">🎯 <b style="color:${cor}">${txt}</b> · ${feitos}/4 etapas</div>`;
      })()}
      ${r.conjuges!=null?`<div class="note">👫 ${r.conjuges>0?`<b style="color:var(--mint)">Cônjuge conectado</b> (${r.conjuges} ativo${r.conjuges>1?'s':''})`:'sem cônjuge conectado'}</div>`:''}
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px">
        <button class="btn sm" style="margin:0" onclick="adminAcao('${r.user_id}','mais7')">+7 dias</button>
        <button class="btn sm" style="margin:0" onclick="adminAcao('${r.user_id}','mais30')">+30 dias</button>
        <button class="btn sm" style="margin:0" onclick="adminAcao('${r.user_id}','definir')">📅 Definir</button>
        <button class="btn sm" style="margin:0;background:#1f7a4d;color:#fff" onclick="adminAcao('${r.user_id}','pago')">Marcar pago</button>
        <button class="btn sm" style="margin:0;background:var(--mint);color:#fff" onclick="adminAcao('${r.user_id}','liberar')">Liberar total</button>
        <button class="btn sm" style="margin:0;background:var(--coral);color:#fff" onclick="adminAcao('${r.user_id}','bloquear')">Bloquear</button>
        <button class="btn sm" style="margin:0;background:#7a1f1f;color:#fff" onclick="adminAcao('${r.user_id}','excluir')">🗑 Excluir</button>
        ${r.email?`<a class="btn sm ghost" style="margin:0;text-decoration:none" href="mailto:${esc(r.email)}">✉️ E-mail</a>`:''}
      </div>
    </div>`;
  });
  html+=`<button class="btn outline" onclick="renderClientes()">↻ Atualizar</button>`;
  $('content').innerHTML=html;
  if(filtro){ const i=$('cliBusca'); if(i){ i.focus(); try{i.setSelectionRange(filtro.length,filtro.length);}catch(e){} } }
}
async function adminAcao(uid,acao){
  const r=(window._cliRows||[]).find(x=>x.user_id===uid); if(!r)return;
  const hojeD=new Date(); const hoje=ymd(hojeD);
  const somaDias=(d)=>{ const b=(r.teste_ate&&r.teste_ate>=hoje)?new Date(r.teste_ate+'T00:00:00'):new Date(hojeD); b.setDate(b.getDate()+d); return ymd(b); };
  let patch=null;
  if(acao==='mais7') patch={status:'teste',teste_ate:somaDias(7)};
  else if(acao==='mais30') patch={status:'teste',teste_ate:somaDias(30)};
  else if(acao==='definir'){ const v=prompt('Teste até (AAAA-MM-DD):', r.teste_ate||hoje); if(!v)return; if(!/^\d{4}-\d{2}-\d{2}$/.test(v)){toast('Data inválida — use AAAA-MM-DD');return;} patch={status:'teste',teste_ate:v}; }
  else if(acao==='pago'){ const b=(r.pago_ate&&r.pago_ate>=hoje)?new Date(r.pago_ate+'T00:00:00'):new Date(hojeD); b.setMonth(b.getMonth()+1); patch={status:'pago',pago_ate:ymd(b)}; }
  else if(acao==='liberar') patch={status:'liberado'};
  else if(acao==='bloquear'){ if(!confirm('Bloquear o acesso deste cliente? Ele verá a tela de assinatura ao entrar.'))return; patch={status:'bloqueado'}; }
  else if(acao==='excluir'){
    if(!confirm('Remover "'+(r.nome||r.email||'cliente')+'" do painel? Isso apaga o registro de licença dele (os dados financeiros dele não são apagados por aqui).'))return;
    const {error}=await sb.from('licencas').delete().eq('user_id',uid);
    if(error){toast('Erro: '+error.message);return;}
    toast('Cliente removido do painel'); renderClientes(); return;
  }
  if(!patch)return;
  const {error}=await sb.from('licencas').update(patch).eq('user_id',uid);
  if(error){toast('Erro: '+error.message);return;}
  toast('Atualizado ✅'); renderClientes();
}
function temaRow(mode,titulo,sub,iconHtml,color,isLast){
  const sel=themeMode()===mode;
  return `<div class="lrow" style="cursor:pointer;${isLast?'border-bottom:none':''}" onclick="setThemeMode('${mode}')">
    <div class="dot" style="background:${tintBg(color)};color:${color}">${iconHtml}</div>
    <div class="mid"><div class="t">${esc(titulo)}</div><div class="s">${esc(sub)}</div></div>
    <div class="radio-dot ${sel?'on':''}">${sel?'✓':''}</div>
  </div>`;
}
function hubItem(icKey,t,s,act,color){
  color=color||'#1f9d8a';
  return `<div class="lrow" onclick="${act}"><div class="dot" style="background:${tintBg(color)};color:${color}">${ICON(icKey,20)}</div>
    <div class="mid"><div class="t">${t}</div><div class="s">${s}</div></div>
    <div class="amt" style="color:var(--muted);font-size:18px">›</div></div>`;
}

function gerarCodigo(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s='';
  for(let i=0;i<6;i++) s+=c[Math.floor(Math.random()*c.length)];
  return s;
}

async function novoCodigo(){
  const codigo=gerarCodigo();
  const {error}=await sb.from('compartilhamentos').insert({owner_id:USER.id,codigo,status:'pendente'});
  if(error){toast('Erro: '+error.message);return;}
  await loadAll(); toast('Código gerado: '+codigo); abrirCompartilhar();
}
async function removerShare(id){
  if(!confirm('Remover este compartilhamento?'))return;
  const {error}=await sb.from('compartilhamentos').delete().eq('id',id);
  if(error){toast('Erro: '+error.message);return;}
  await loadAll(); toast('Removido'); abrirCompartilhar();
}

function donutSVG(seg,total){
  const size=180,r=70,cx=size/2,cy=size/2,sw=26;
  const C=2*Math.PI*r; let off=0; let arcs='';
  seg.forEach(s=>{
    const frac=s.valor/total; const len=frac*C;
    arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"></circle>`;
    off+=len;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${arcs}
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="12" fill="var(--muted)">Total</text>
    <text x="${cx}" y="${cy+15}" text-anchor="middle" font-size="16" font-weight="700" fill="var(--ink)">${brl(total).replace('R$ ','R$')}</text></svg>`;
}

async function saveOrcamento(id){
  const lim=parseFloat($('oLim').value);
  if(!(lim>0)){toast('Informe um limite válido');return;}
  const am=ymd(firstOfMonth(viewMonth)).slice(0,7);
  let r;
  if(id){ r=await dbUpdate('orcamentos',{limite:lim},'id',id); }
  else{
    const catId=$('oCat').value; if(!catId){flashErr('Selecione uma categoria','oCat');return;}
    r=await dbInsert('orcamentos',[{user_id:USER.id,categoria_id:catId,ano_mes:am,limite:lim}]);
  }
  if(r&&r.error){toast('Erro: '+r.error.message);return;}
  closeSheet();
  if(!(r&&r.queued)){ try{ await loadAll(); }catch(e){} }
  toast(r&&r.queued?'Orçamento salvo (offline) — sincroniza depois':'Orçamento salvo'); render();
}
async function delOrcamento(id){
  if(!confirm('Remover este orçamento?'))return;

  if(r&&r.error){toast('Erro: '+r.error.message);return;}
  closeSheet();
  if(!(r&&r.queued)){ try{ await loadAll(); }catch(e){} }
  toast(r&&r.queued?'Removido (offline) — sincroniza depois':'Removido'); render();
}

const MAPFINAL_KEY='gf_map_cartao_final';
function mapFinal(){ try{ return JSON.parse(localStorage.getItem(MAPFINAL_KEY)||'{}'); }catch(e){ return {}; } }
function setMapFinal(f,cid){ try{ const m=mapFinal(); m[f]=cid; localStorage.setItem(MAPFINAL_KEY,JSON.stringify(m)); }catch(e){} }
function _num(s){ return parseFloat(String(s).replace(/\./g,'').replace(',','.'))||0; }
function _capWords(s){
  return String(s).replace(/\s+/g,' ').trim().toLowerCase()
    .replace(/\b([a-zà-ú])([a-zà-ú]*)/g,(m,a,b)=>a.toUpperCase()+b).slice(0,60);
}
// Parser genérico de notificação bancária (C6, Nubank, Itaú, Bradesco, etc.)
function parseNotifBanco(txt){
  const itens=[];
  if(!txt || !txt.trim()) return itens;
  const norm=String(txt).replace(/\u00A0/g,' ').replace(/\r/g,'\n');
  // quebra em frases: por linha e por ponto final seguido de maiúscula
  const brutos=[];
  norm.split('\n').forEach(l=>{
    l=l.trim(); if(!l) return;
    l.split(/(?<=\.)\s+(?=[A-ZÀ-Ú])/).forEach(s=>{ s=s.trim(); if(s) brutos.push(s); });
  });
  const RE_VAL=/R\$\s*([\d.]{1,15},\d{2})/i;
  const RE_PROMO=/toque para|aproveite|comece hoje|invista|investir|libere limite|limite garantido|conte com|simule|contrate|rende|cdi|cdb|poupança|a partir de|acumular pontos|e agora\?/i;
  const RE_RECEITA=/pix recebido|recebeu um pix|voc[êe] recebeu|cr[ée]dito recebido|dep[óo]sito|ted recebida|transfer[êe]ncia recebida|entrada de|sal[áa]rio/i;
  const RE_FORTE=/(compra|transa[çc][ãa]o).{0,60}(aprovad|realizad|autorizad)|compra no (cr[ée]dito|d[ée]bito)|foi aprovad|pix (recebido|enviado)|voc[êe] recebeu um pix|pagamento[\s\S]{0,120}?(realizad|efetuad|processad)|boleto[\s\S]{0,120}?(pago|realizad)|d[ée]bito de|saque de|transfer[êe]ncia (recebida|enviada)|fatura[\s\S]{0,60}?(paga|fechad)/i;
  const vistos=new Set();
  brutos.forEach(seg=>{
    const mv=seg.match(RE_VAL); if(!mv) return;
    const forte=RE_FORTE.test(seg);
    if(!forte) return;                       // sem verbo de transação → ignora
    if(RE_PROMO.test(seg) && !forte) return; // propaganda
    const valor=_num(mv[1]); if(!(valor>0)) return;

    const ehReceita=RE_RECEITA.test(seg);
    // data
    let data=null;
    const md=seg.match(/(\d{2})\/(\d{2})\/(\d{4})/);
    const md2=seg.match(/(\d{2})\/(\d{2})(?!\/)/);
    if(md) data=`${md[3]}-${md[2]}-${md[1]}`;
    else if(md2){ const y=new Date().getFullYear(); data=`${y}-${md2[2]}-${md2[1]}`; }
    else data=ymd(new Date());
    // final do cartão
    const mf=seg.match(/final\s*(\d{4})/i);
    const finalCart=mf?mf[1]:null;
    // descrição / estabelecimento
    let desc='';
    let me=seg.match(/,?\s*em\s+(.+?)(?:,\s*(?:foi|no valor|em)\b|\.\s*$|$)/i);
    if(ehReceita){
      // pagador: pega o "de <NOME>" que NÃO seja "de R$ ..." nem "de valor"
      let pag=null;
      const todos=[...seg.matchAll(/\bde\s+([^,.;]{3,60})/gi)];
      for(const m of todos){
        const c=m[1].trim();
        if(/^R\$|^\d|^valor\b|^liquidez|^hoje\b/i.test(c)) continue;
        pag=c.replace(/\s+CNPJ.*$/i,'').replace(/\s+CPF.*$/i,'').trim();
        break;
      }
      desc=pag?_capWords(pag):'Recebimento';
    }else if(/boleto/i.test(seg)) desc='Boleto';
    else if(/fatura/i.test(seg)) desc='Fatura';
    else if(me && me[1] && !/^\d{2}\/\d{2}/.test(me[1])) desc=_capWords(me[1]);
    else desc = ehReceita?'Recebimento':'Compra';
    if(!desc) desc = ehReceita?'Recebimento':'Compra';

    const chave=`${ehReceita?'r':'d'}|${valor.toFixed(2)}|${data}|${desc}`;
    if(vistos.has(chave)) return; vistos.add(chave);

    // duplicado do que já existe no app?
    const dup=DATA.lancamentos.some(l=>
      l.tipo===(ehReceita?'receita':'despesa') &&
      Math.abs(Number(l.valor)-valor)<0.005 &&
      String(l.data)===data
    );
    // cartão memorizado pelo final
    const mapa=mapFinal();
    const cartaoSug = finalCart && mapa[finalCart] && cartaoById(mapa[finalCart]) ? mapa[finalCart] : '';
    itens.push({
      tipo: ehReceita?'receita':'despesa',
      viaCartao: !!finalCart,
      finalCart, desc, valor, data, dup,
      incluir: !dup,
      cartao_id: cartaoSug,
      conta_id: (DATA.contas.filter(c=>c.user_id===USER.id&&!c.arquivado)[0]||{}).id||'',
      categoria_id: ''
    });
  });
  return itens;
}

function renderPreviaImport(){
  const it=window._impItens||[];
  const nSel=it.filter(x=>x.incluir).length;
  const nDup=it.filter(x=>x.dup).length;
  let h=`<h2 style="margin:0 0 4px">Confira antes de importar</h2>
    <p style="color:var(--muted);font-size:13px;margin:0 0 4px">${it.length} encontrada(s)${nDup?` · <b style="color:#e0a020">${nDup} possível(is) duplicada(s)</b> — já vêm desmarcadas`:''}</p>

    </div>`;
  it.forEach((x,i)=>{
    const cor = x.tipo==='receita'?'var(--bar-rec)':'var(--bar-desp)';
    h+=`<div class="impCard ${x.incluir?'':'off'} ${x.dup?'dup':''}" id="impC${i}">
      <div class="impTop">
        <input type="checkbox" ${x.incluir?'checked':''} onchange="impToggle(${i},this.checked)" style="width:20px;height:20px;flex:0 0 auto">
        <span class="impTag" style="background:${tintBg(x.tipo==='receita'?'#2f8f66':'#e5484d')};color:${cor}">${x.tipo==='receita'?'RECEITA':'DESPESA'}</span>
        ${x.viaCartao?`<span class="impTag" style="background:${tintBg('#7c5cff')};color:#7c5cff">CARTÃO ••${x.finalCart}</span>`:''}
        <span class="impV" style="color:${cor}">${brl(x.valor)}</span>
      </div>
      ${x.dup?`<div class="impWarn">⚠️ Já existe um lançamento igual (mesmo valor e data)</div>`:''}
      <div class="impGrid">
        <div class="full"><input value="${String(x.desc).replace(/"/g,'&quot;')}" onchange="impSet(${i},'desc',this.value)" placeholder="Descrição"></div>
        <div><input type="date" value="${x.data}" onchange="impSet(${i},'data',this.value)"></div>
        <div><select onchange="impSet(${i},'categoria_id',this.value)">${_optsCats(x.tipo,x.categoria_id)}</select></div>
        <div class="full">${
          x.viaCartao
          ? `<select onchange="impSet(${i},'cartao_id',this.value)">${_optsCartoes(x.cartao_id)}</select>`
          : `<select onchange="impSet(${i},'conta_id',this.value)">${_optsContas(x.conta_id)}</select>`
        }</div>
      </div>
    </div>`;
  });
  h+=`<button class="btn" style="margin-top:6px" onclick="confirmarImport()">Importar ${nSel} lançamento(s)</button>
      <button class="btn-sec" style="margin-top:8px" onclick="openImportBanco()">← Voltar e colar outro texto</button>`;
  openSheet(h);
}
function impToggle(i,v){ if(window._impItens&&window._impItens[i]){ window._impItens[i].incluir=v; renderPreviaImport(); } }
function impMarcarTodos(v){ (window._impItens||[]).forEach(x=>x.incluir=v); renderPreviaImport(); }
function impSet(i,k,v){ if(window._impItens&&window._impItens[i]) window._impItens[i][k]=v; }
async function confirmarImport(){
  const sel=(window._impItens||[]).filter(x=>x.incluir);
  if(!sel.length){ toast('Marque pelo menos uma'); return; }
  // valida destino
  for(const x of sel){
    if(x.viaCartao && !x.cartao_id){ toast('Escolha o cartão de: '+x.desc); return; }
    if(!x.viaCartao && !x.conta_id){ toast('Escolha a conta de: '+x.desc); return; }
  }
  const rows=[];
  sel.forEach(x=>{
    if(x.viaCartao){
      if(x.finalCart) setMapFinal(x.finalCart,x.cartao_id); // memoriza p/ próxima vez
      const cartao=cartaoById(x.cartao_id);
      const comp=calcCompetencia(x.data, cartao?cartao.dia_fechamento:1);
      rows.push({user_id:USER.id,tipo:'despesa',descricao:x.desc,valor:x.valor,data:x.data,status:'pago',
        cartao_id:x.cartao_id,categoria_id:x.categoria_id||null,competencia:ymd(comp)});
    }else{
      rows.push({user_id:USER.id,tipo:x.tipo,descricao:x.desc,valor:x.valor,data:x.data,status:'pago',
        conta_id:x.conta_id,categoria_id:x.categoria_id||null});
    }
  });
  const r=await insertRows(rows);
  if(!r.ok) return;
  window._impItens=null;
  closeSheet(); vibra();
  if(r.queued){ render(); toast('Salvo offline — sincroniza depois'); }
  else { await loadAll(); toast(rows.length+' lançamento(s) importado(s) ✅'); render(); }
}

function evalValor(str){
  if(str==null) return NaN;
  let s=(''+str).replace(/\s/g,'').replace(/[xX]/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
  if(s.indexOf(',')>=0 && s.indexOf('.')>=0){ s=s.replace(/\./g,'').replace(/,/g,'.'); } // 1.234,56 -> 1234.56
  else if(s.indexOf(',')>=0){ s=s.replace(/,/g,'.'); }                                    // 12,90 -> 12.90
  if(!/^[-+*/.()0-9]+$/.test(s)) return NaN;
  try{ const v=Function('"use strict";return ('+s+')')(); return (typeof v==='number'&&isFinite(v))?Math.round(v*100)/100:NaN; }catch(e){ return NaN; }
}
function fmtBRLnum(n){ return 'R$ '+(Number(n)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function setLancValor(n){ const v=Math.round((Number(n)||0)*100)/100; if($('lValor'))$('lValor').value=v||''; if($('lValDisplay'))$('lValDisplay').textContent=fmtBRLnum(v); try{updateParcNote();updateFaturaNote();}catch(e){} }
function abrirCalc(){
  const cur = $('lValor')&&parseFloat($('lValor').value);
  window._calcExpr = (cur>0)? String(cur).replace('.',',') : '';

function parseBanco(txt){
  const t=txt.replace(/\s+/g,' ').trim();
  let valor=0; const mv=t.match(/R\$\s*([\d.]+,\d{2})/); if(mv){valor=parseFloat(mv[1].replace(/\./g,'').replace(',','.'));}
  let data=ymd(new Date()); const md=t.match(/(\d{2})\/(\d{2})(?:\/(\d{2,4}))?/);
  if(md){let y=md[3]?(md[3].length===2?'20'+md[3]:md[3]):String(new Date().getFullYear()); data=`${y}-${md[2]}-${md[1]}`;}
  const tipo=/(receb|cr[ée]dito|entrada|dep[oó]sito|estorno|salário|salario)/i.test(t)?'receita':'despesa';
  const isCard=/(cart[ãa]o|final\s*\d{4}|cr[ée]dito)/i.test(t) && !/pix|d[ée]bito autom/i.test(t);
  let desc=''; let m;
  if((m=t.match(/(?:em|no|na|para|de)\s+([A-Za-zÀ-ÿ][A-Za-zÀ-ÿ0-9 .&'*\-]{2,40})/i))){
    desc=m[1].trim().replace(/\s+(no cart[ãa]o.*|em \d.*|R\$.*|final.*)$/i,'').trim();
  }
  if(!desc || /^\d/.test(desc)) desc = tipo==='receita'?'Recebimento':'Compra';
  return {valor, data, tipo, isCard, desc};
}

function processarBancoPend(tent){

  tent=tent||0;
  // espera o app estar pronto (logado, dados na memória, sem outro modal)
  const logado = (typeof USER!=='undefined') && USER && USER.id;
  const pronto = logado && $('modalRoot') && !document.body.classList.contains('modal-open');
  if(!pronto){
    if(tent<40) setTimeout(()=>processarBancoPend(tent+1), 700);
    return;
  }
  try{
    toast('📥 Lendo mensagem do banco…');
    lerBancoTexto(pend.trim());
    // só remove se a prévia/ficha realmente abriu
    setTimeout(()=>{
      const abriu = $('modalRoot') && $('modalRoot').innerHTML.length>50;

      else if(tent<40) setTimeout(()=>processarBancoPend(tent+1), 900);
    }, 400);
  }catch(e){

  }
}

  const mapa={}; // desc normalizada -> {texto, catId, n, ultima}
  DATA.lancamentos.forEach(l=>{
    if(l.user_id!==USER.id || l.tipo!==tipo) return;
    const d=String(l.descricao||'').trim(); if(d.length<2) return;
    const k=_normTxt(d); if(!k) return;
    const m=mapa[k];
    const quando=l.criado_em||l.data||'';
    if(!m){ mapa[k]={texto:d, cats:{}, n:0, ultima:quando}; }
    const r=mapa[k];
    r.n++;
    if(quando>r.ultima){ r.ultima=quando; r.texto=d; }
    if(l.categoria_id) r.cats[l.categoria_id]=(r.cats[l.categoria_id]||0)+1;
  });
  return Object.values(mapa).map(r=>{
    const cat=Object.entries(r.cats).sort((a,b)=>b[1]-a[1])[0];
    return {texto:r.texto, n:r.n, ultima:r.ultima, catId:cat?cat[0]:null};
  });
}
function autoDesc(){
  const inp=$('lDesc'), box=$('acList');
  if(!inp||!box) return;
  const q=_normTxt(inp.value);
  if(q.length<2){ box.innerHTML=''; return; }
  const lista=_histDescricoes()
    .filter(r=>{ const k=_normTxt(r.texto); return k!==q && k.includes(q); })
    .sort((a,b)=>{
      const ap=_normTxt(a.texto).startsWith(q)?1:0, bp=_normTxt(b.texto).startsWith(q)?1:0;
      return (bp-ap) || (b.n-a.n) || (b.ultima<a.ultima?-1:1);
    })
    .slice(0,5);
  if(!lista.length){ box.innerHTML=''; return; }
  window._acCache=lista;
  const _n=$('catSugNote'); if(_n) _n.style.display='none';
  box.innerHTML=`<div class="acList">`+lista.map((r,i)=>{
    const c=r.catId?catById(r.catId):null;
    return `<div class="acItem" onmousedown="event.preventDefault()" onclick="usarAutoDesc(${i})">
      <span class="acTxt">${esc(r.texto)}</span>
      ${c?`<span class="acCat">${c.icone?c.icone+' ':''}${esc(c.nome)}</span>`:''}
    </div>`;
  }).join('')+`</div>`;
}

function usarAutoDesc(i){
  const r=(window._acCache||[])[i]; if(!r) return;
  const inp=$('lDesc'); if(inp) inp.value=r.texto;
  fecharAutoDesc();

function sugerirCategoria(){
  const inp=$('lDesc'), sel=$('lCatSel'), note=$('catSugNote');
  if(!inp||!sel||!note) return;
  const _lst=$('acList');
  if(_lst && _lst.innerHTML.trim()){ note.style.display='none'; return; }
  if(sel.value && sel.value!=='' && window._catManual){ note.style.display='none'; return; }
  const q=_normTxt(inp.value);
  if(q.length<3){ note.style.display='none'; return; }
  const tipo=(lancType==='receita')?'receita':'despesa';
  const catsValidas=new Set(DATA.categorias.filter(c=>c.user_id===USER.id&&c.tipo===tipo).map(c=>c.id));
  const STOP=new Set(['de','da','do','para','com','das','dos','por','uma','um','the','no','na']);
  const qw=q.split(' ').filter(w=>w.length>2 && !STOP.has(w));
  // melhor correspondência por categoria (não soma: evita categoria muito usada vencer no volume)
  const best={};  // catId -> {pts, n}
  DATA.lancamentos.forEach(l=>{
    if(l.user_id!==USER.id || l.tipo!==tipo || !l.categoria_id) return;
    if(!catsValidas.has(l.categoria_id)) return;
    const d=_normTxt(l.descricao); if(!d) return;
    let pts=0;
    if(d===q) pts=100;
    else if(d.startsWith(q)||q.startsWith(d)) pts=70;
    else if(d.includes(q)||q.includes(d)) pts=50;
    else if(qw.length){
      // só conta se TODAS as palavras significativas da busca aparecem
      const dw=new Set(d.split(' ').filter(w=>w.length>2 && !STOP.has(w)));
      if(qw.every(w=>dw.has(w))) pts=40;
    }
    if(pts<40) return;
    const b=best[l.categoria_id];
    if(!b) best[l.categoria_id]={pts,n:1};
    else { b.n++; if(pts>b.pts) b.pts=pts; }
  });
  const rank=Object.entries(best).sort((a,b)=> (b[1].pts-a[1].pts) || (b[1].n-a[1].n));
  if(!rank.length){ note.style.display='none'; return; }
  const cat=catById(rank[0][0]);
  if(!cat || sel.value===cat.id){ note.style.display='none'; return; }
  note.style.display='block';
  note.innerHTML=`💡 Sugestão: <b style="color:var(--emerald,#1f9d8a);cursor:pointer" onclick="aplicarCatSug('${cat.id}')">${cat.icone?cat.icone+' ':''}${esc(cat.nome)}</b> — toque pra usar`;
  window._catSug=cat.id;
}

// calcula a competência (1º dia do mês da fatura) p/ uma compra
function calcCompetencia(dataStr,diaFechamento){
  const d=new Date(dataStr+'T00:00:00');
  let y=d.getFullYear(),m=d.getMonth();
  // no dia do fechamento a fatura já fechou: compra de hoje entra na PRÓXIMA (padrão Itaú/Nubank/C6)
  if(d.getDate()>=diaFechamento) m+=1;
  return new Date(y,m,1);
}
// Mês em que a fatura é PAGA (vencimento). Se vence antes/no fechamento, vence no mês seguinte ao fechamento.
function cardDueOffset(c){ return (c && Number(c.dia_vencimento)>Number(c.dia_fechamento)) ? 0 : 1; }
function faturaYm(competencia, cartao){
  if(!competencia) return '';
  const d=new Date(competencia+'T00:00:00');
  const t=new Date(d.getFullYear(), d.getMonth()+cardDueOffset(cartao), 1);
  return ymd(t).slice(0,7);
}
async function saveLanc(id){
  const desc=$('lDesc').value.trim();
  const valor=evalValor($('lValor').value);
  const data=$('lData').value;
  if(!desc){flashErr('Informe a descrição','lDesc');return;}
  if(isNaN(valor)){flashErr('Valor inválido (confira a conta)','lValor');return;}
  if(!(valor>0)){flashErr('Informe um valor válido','lValor');return;}
  if(!data){flashErr('Informe a data','lData');return;}
  if(lancType!=='transferencia' && !window._meio){toast(lancType==='receita'?'Escolha Recebido ou A receber':'Escolha como pagar: Débito, A prazo ou Cartão');return;}
  const isCardPurchase = (lancType!=='transferencia' && window._meio==='cartao');
  if(!isCardPurchase && !window._lancStatus){toast('Escolha uma opção acima pra continuar');return;}

  if(lancType==='transferencia'){
    const o=$('lContaOrig').value, d=$('lContaDest').value;
    const destOwner = $('lDestOwner') ? $('lDestOwner').value : USER.id;
    if(!d){flashErr('Selecione a conta de destino','lContaDest');return;}
    if(destOwner!==USER.id){
      if(!navigator.onLine){ toast('Transferência para parceiro precisa de internet.'); return; }
      const {error}=await sb.rpc('transferir_parceiro',{p_conta_origem:o,p_owner_destino:destOwner,p_conta_destino:d,p_valor:valor,p_descricao:desc,p_data:data});
      if(error){toast('Erro: '+error.message);return;}
      closeSheet(); await loadAll(); toast('Transferência enviada ✅'); render(); return;
    }
    if(o===d){toast('Origem e destino devem ser diferentes');return;}
    const row={user_id:USER.id,tipo:'transferencia',descricao:desc,valor,data,status:window._lancStatus||'pago',conta_id:o,conta_destino_id:d};
    await upsertLanc(id,row); return;
  }

  if(window._meio==='cartao'){
    const cartaoId=$('lCartao')?$('lCartao').value:null;
    if(!cartaoId){toast('Selecione o cartão');return;}
    const pvRaw=($('lAvista')&&$('lAvista').checked)?'1':($('lParcelas')?$('lParcelas').value:'');
    if(!pvRaw){toast('Escolha as parcelas (à vista, parcelado ou recorrente)');return;}
    const rec = pvRaw==='rec';
    const n = rec?24:(pvRaw==='custom'?parcelasEfetivas():(parseInt(pvRaw)||1));
    if(!rec && (!(n>=1))){toast('Número de parcelas inválido');return;}
    const cartao=cartaoById(cartaoId);
    if(id){const old=DATA.lancamentos.find(l=>l.id===id); if(old&&old.grupo_id){await dbDelete('lancamentos','grupo_id',old.grupo_id);} else {await dbDelete('lancamentos','id',id);} }
    const grupo=uuid();
    const baseComp=calcCompetencia(data,cartao.dia_fechamento);
    const rows=[];
    if(rec){
      // cobrança fixa todo mês (24 meses à frente), cada mês com sua data e competência
      for(let i=0;i<24;i++){
        const dataI=addMonths(data,i);
        const comp=calcCompetencia(dataI,cartao.dia_fechamento);
        rows.push({user_id:USER.id,tipo:'despesa',descricao:desc,valor,data:dataI,status:'pago',
          cartao_id:cartaoId,categoria_id:window._catSel||null,competencia:ymd(comp),
          grupo_id:grupo});
      }
    }else{
      const centavos=Math.round(valor*100);
      const each=Math.floor(centavos/n);
      const resto=centavos-each*n;
      for(let i=0;i<n;i++){
        const comp=new Date(baseComp.getFullYear(),baseComp.getMonth()+i,1);
        let cent=each; if(i===n-1) cent+=resto;
        rows.push({user_id:USER.id,tipo:'despesa',descricao:desc,valor:cent/100,data,status:'pago',
          cartao_id:cartaoId,categoria_id:window._catSel||null,competencia:ymd(comp),
          grupo_id:n>1?grupo:null,parcela:n>1?i+1:null,parcelas:n>1?n:null});
      }
    }
    const r=await insertRows(rows);
    if(!r.ok) return;
    closeSheet();
    vibra(); if(r.queued){ render(); toast('Salvo offline — sincroniza quando a internet voltar'); }
    else { await loadAll(); toast(rec?'Recorrência criada (24 meses)':(id?'Compra atualizada':'Compra registrada')); render(); }
    return;
  }

  // conta normal
  const contaId=$('lConta').value;
  if(!contaId){toast('Selecione a conta');return;}
  const recVal = $('lRecorr') ? $('lRecorr').value : '0';
  const recorr = recVal==='fixo' ? 24 : (recVal==='custom' ? (Math.min(120,Math.max(0,parseInt($('lRecorrN')?$('lRecorrN').value:'')||0))) : (parseInt(recVal)||0));
  if(!id && recorr>1){
    const grupo=uuid();
    const rows=[];
    for(let i=0;i<recorr;i++){
      rows.push({user_id:USER.id,tipo:lancType,descricao:desc,valor,data:addMonths(data,i),
        status: i===0?(window._lancStatus||'pago'):'pendente',
        conta_id:contaId,categoria_id:window._catSel||null,grupo_id:grupo});
    }
    const r=await insertRows(rows);
    if(!r.ok) return;
    closeSheet();
    if(r.queued){ render(); toast('Salvo offline — sincroniza quando a internet voltar'); }
    else { await loadAll(); toast(recorr+'x criadas'); render(); }
    return;
  }
  const row={user_id:USER.id,tipo:lancType,descricao:desc,valor,data,status:window._lancStatus||'pago',
    conta_id:contaId,categoria_id:window._catSel||null};
  // se é edição de uma despesa/receita normal (não cartão), oferece aplicar nos próximos meses
  const orig = id ? DATA.lancamentos.find(l=>l.id===id) : null;
  if(id && orig && orig.tipo!=='transferencia' && !orig.cartao_id && !window._escopoEdicao){
    perguntarEscopoEdicao(id, row, orig);
    return;
  }
  await upsertLanc(id,row);
  window._escopoEdicao=null;
}
function perguntarEscopoEdicao(id, row, orig){
  // detecta se já é recorrente: tem grupo OU existem outras despesas iguais em outros meses
  const mesmoNome=(l)=> l.user_id===USER.id && l.tipo===orig.tipo && !l.cartao_id && l.id!==orig.id &&
    (l.descricao||'').toLowerCase().trim()===(orig.descricao||'').toLowerCase().trim();
  const futurosExistentes=DATA.lancamentos.filter(l=> mesmoNome(l) && (l.data||'')>(orig.data||''));
  const temRecorrencia = !!orig.grupo_id || futurosExistentes.length>0;
  window._edicaoPend={id,row,orig,futurosExistentes,temRecorrencia};
  openSheet(`<h2>Aplicar alteração</h2>
    <div class="note" style="margin-bottom:14px">${temRecorrencia?'Esta despesa se repete em outros meses. Onde aplicar as mudanças?':'Você quer repetir essa despesa nos próximos meses?'}</div>
    <button class="btn" style="margin-bottom:10px" onclick="aplicarEdicao('so','${id}')">Só nesta (${fmtBrData(orig.data)})</button>
    <button class="btn" style="margin-bottom:10px" onclick="aplicarEdicao('futuras','${id}')">${temRecorrencia?'Nesta e todas as seguintes':'Nesta e criar nos próximos 12 meses'}</button>
    <button class="btn ghost" onclick="closeSheet();window._edicaoPend=null">Cancelar</button>`);
}
async function aplicarEdicao(escopo, id){
  const pend=window._edicaoPend; if(!pend){closeSheet();return;}
  const {row,orig}=pend;
  window._escopoEdicao=escopo;
  if(escopo==='so'){
    await upsertLanc(id,{...row});
    window._edicaoPend=null; window._escopoEdicao=null;
    return;
  }
  closeSheet();
  const patch={descricao:row.descricao, valor:row.valor, categoria_id:row.categoria_id, conta_id:row.conta_id};
  const temRecorrencia = pend.temRecorrencia;
  if(temRecorrencia){
    // já é recorrente (por grupo OU por nome em outros meses): atualiza este e TODOS os seguintes existentes
    let futuros;
    if(orig.grupo_id){
      futuros=DATA.lancamentos.filter(l=>l.grupo_id===orig.grupo_id && (l.data||'')>=(orig.data||''));
    }else{
      futuros=DATA.lancamentos.filter(l=>
        l.user_id===USER.id && l.tipo===orig.tipo && !l.cartao_id &&
        (l.descricao||'').toLowerCase().trim()===(orig.descricao||'').toLowerCase().trim() &&
        (l.data||'')>=(orig.data||'')
      );
    }
    const _deltaDias = orig.data ? Math.round((new Date(row.data+'T00:00:00') - new Date(orig.data+'T00:00:00'))/86400000) : 0;
    futuros.forEach(l=>{
      const nd = (_deltaDias && l.data) ? ymd(new Date(new Date(l.data+'T00:00:00').getTime()+_deltaDias*86400000)) : l.data;
      Object.assign(l, patch, {data:nd});
    });
    render(); vibra();
    for(const l of futuros){ try{ await dbUpdate('lancamentos', {...patch, data:l.data}, 'id', l.id); }catch(e){} }
    window._edicaoPend=null; window._escopoEdicao=null;
    toast(`Alterado em ${futuros.length} mês(es) ✅`);
  }else{
    // não era recorrente: atualiza este e CRIA os próximos 12 meses (SÓ os que ainda não existem)
    const grupo=uuid();
    orig.grupo_id=grupo; Object.assign(orig, patch);
    await dbUpdate('lancamentos', {...patch, grupo_id:grupo}, 'id', id);
    const novos=[];
    for(let i=1;i<=12;i++){
      const dataFutura=addMonths(orig.data,i);
      const ym=dataFutura.slice(0,7); // ano-mês
      // pula se já existe uma despesa/receita igual (mesma descrição + mesmo mês) pra não duplicar
      const jaExiste=DATA.lancamentos.some(l=>
        l.user_id===USER.id && l.tipo===orig.tipo && !l.cartao_id &&
        (l.descricao||'').toLowerCase().trim()===(patch.descricao||'').toLowerCase().trim() &&
        (l.data||'').slice(0,7)===ym
      );
      if(jaExiste) continue;
      novos.push({user_id:USER.id,tipo:orig.tipo,descricao:patch.descricao,valor:patch.valor,
        data:dataFutura,status:'pendente',conta_id:patch.conta_id,
        categoria_id:patch.categoria_id,grupo_id:grupo});
    }
    if(novos.length){ const r=await insertRows(novos); if(r.ok){ try{ await loadAll(); }catch(e){} } }
    render(); vibra();
    window._edicaoPend=null; window._escopoEdicao=null;
    toast(novos.length?`Aplicado e criado em ${novos.length} mês(es) ✅`:'Alteração aplicada ✅');
  }
}
function addMonths(dateStr,n){
  const b=new Date(dateStr+'T00:00:00'); const day=b.getDate();
  const t=new Date(b.getFullYear(),b.getMonth()+n,1);
  const dim=new Date(t.getFullYear(),t.getMonth()+1,0).getDate();
  t.setDate(Math.min(day,dim));
  return ymd(t);
}
async function upsertLanc(id,row){
  if(id){
    const r=await dbUpdate('lancamentos',row,'id',id);
    if(r&&r.error){toast('Erro: '+r.error.message);return;}
    closeSheet();
    if(!(r&&r.queued)){ try{ await loadAll(); }catch(e){} }
    vibra(); toast(r&&r.queued?'Atualizado offline — sincroniza depois':'Transação atualizada'); render(); return;
  }
  if(!row.id) row.id=uuid();
  const r=await insertRows([row]);
  if(!r.ok) return;
  closeSheet();
  if(r.queued){ render(); toast('Salvo offline — sincroniza quando a internet voltar'); }
  else { await loadAll(); toast('Transação adicionada'); render(); }
}

}

function bancoDominio(nome){
  const n=(nome||'').toLowerCase();
  const map=[
    [/nubank|nu\b/,'nubank.com.br'],[/inter/,'bancointer.com.br'],[/ita[uú]/,'itau.com.br'],
    [/bradesco/,'bradesco.com.br'],[/santander/,'santander.com.br'],[/sicoob/,'sicoob.com.br'],
    [/sicredi/,'sicredi.com.br'],[/caixa/,'caixa.gov.br'],[/banco do brasil|\bbb\b/,'bb.com.br'],
    [/\bc6\b/,'c6bank.com.br'],[/picpay/,'picpay.com'],[/mercado|\bmp\b/,'mercadopago.com.br'],
    [/original/,'original.com.br'],[/\bnext\b/,'next.me'],[/\bpan\b/,'bancopan.com.br'],
    [/safra/,'safra.com.br'],[/btg/,'btgpactual.com'],[/neon/,'neon.com.br'],
    [/will/,'willbank.com.br'],[/pagbank|pagseguro/,'pagbank.com.br'],[/\bame\b/,'amedigital.com'],
    [/nomad/,'nomadglobal.com'],[/\bxp\b/,'xpi.com.br'],[/banrisul/,'banrisul.com.br'],
    [/sofisa/,'sofisadireto.com.br'],[/daycoval/,'daycoval.com.br'],
  ];
  for(const [re,dom] of map){ if(re.test(n)) return dom; }
  return null;
}

function pickLogo(pfx){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{
    const file=inp.files&&inp.files[0]; if(!file)return;
    const rd=new FileReader();
    rd.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const S=72, cv=document.createElement('canvas'); cv.width=S; cv.height=S;
        const ctx=cv.getContext('2d');
        const scale=Math.max(S/img.width,S/img.height), w=img.width*scale, h=img.height*scale;
        ctx.drawImage(img,(S-w)/2,(S-h)/2,w,h);
        let data;
        try{ data=cv.toDataURL('image/png'); if(data.length>60000) data=cv.toDataURL('image/jpeg',0.82); }
        catch(e){ data=cv.toDataURL('image/jpeg',0.82); }
        window['_'+pfx+'Logo']=data;
        const prev=$(pfx+'LogoPrev');
        if(prev){ prev.style.backgroundColor='#fff'; prev.style.color=''; prev.style.backgroundImage=`url("${data}")`; prev.style.backgroundSize='76%'; prev.style.backgroundRepeat='no-repeat'; prev.style.backgroundPosition='center'; prev.innerHTML=''; }
      };
      img.src=rd.result;
    };
    rd.readAsDataURL(file);
  };
  inp.click();
}
function clearLogo(pfx){
  window['_'+pfx+'Logo']=null;
  const prev=$(pfx+'LogoPrev'); if(!prev)return;
  prev.style.backgroundImage='';
  if(pfx==='c'){ const cv=contaVisual({nome:$('cNome')?$('cNome').value:''}); prev.style.background=tintBg(cv.color); prev.style.color=cv.color; prev.innerHTML=ICON(cv.icon,24); }
  else { prev.style.background=tintBg('#7c5cff'); prev.style.color='#7c5cff'; prev.innerHTML=ICON('card',24); }
}

async function reajustarConfirma(id){
  const c=DATA.contas.find(x=>x.id===id); if(!c) return;
  const novo=evalValor($('rjValor')?$('rjValor').value:'');
  if(isNaN(novo)){ toast('Valor inválido'); return; }
  const atual=saldoConta(id);
  const diff=Math.round((novo-atual)*100)/100;
  if(diff===0){ toast('O saldo já está igual — nada a ajustar'); closeSheet(); return; }
  const tipo = diff>0?'receita':'despesa';
  let cat=DATA.categorias.find(k=>k.user_id===USER.id && (k.nome||'').toLowerCase()==='reajuste em contas' && k.tipo===tipo);
  if(!cat){
    const rc=await dbInsert('categorias',[{user_id:USER.id,nome:'Reajuste em contas',tipo}]);
    if(rc&&rc.error){toast('Erro: '+rc.error.message);return;}
    cat=rc.rows[0];
    if(!(rc&&rc.queued) && !DATA.categorias.some(c=>c.id===cat.id)) DATA.categorias.push(cat);
  }
  const row={user_id:USER.id,tipo,descricao:'Reajuste de saldo',valor:Math.abs(diff),data:ymd(new Date()),status:'pago',conta_id:id,categoria_id:cat.id};
  const r=await dbInsert('lancamentos',[row]);
  if(r&&r.error){toast('Erro: '+r.error.message);return;}
  closeSheet();
  if(!(r&&r.queued)){ try{ await loadAll(); }catch(e){} }
  toast((diff>0?'+':'−')+brl(Math.abs(diff)).replace('R$ ','R$ ')+' · saldo reajustado'+(r&&r.queued?' (offline)':'')+' ✅'); render();
}
