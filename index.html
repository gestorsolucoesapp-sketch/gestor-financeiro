<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d3b34">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gestor">
<title>Gestor Soluções · Financeiro</title>
<script src="assets/supabase.js"></script>
<style>
:root{
  --ink:#0c1c1a; --paper:#f4f1ea; --card:#ffffff;
  --emerald:#0d3b34; --emerald-2:#15564c; --mint:#1f9d8a;
  --coral:#e8654e; --coral-soft:#fbe4de;
  --green:#1f9d6b; --red:#d6473a; --blue:#3b6fd6;
  --muted:#6f7d79; --line:#e6e1d6; --line-2:#d7d0c2;
  --input-bg:#ffffff;
  --shadow:0 1px 2px rgba(12,28,26,.06),0 8px 24px rgba(12,28,26,.06);
  --radius:18px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;overflow-x:hidden;width:100%;max-width:100%;overscroll-behavior-x:none}
*{box-sizing:border-box}
body{
  font-family:var(--font); background:var(--paper); color:var(--ink);
  font-size:15px; line-height:1.4; -webkit-font-smoothing:antialiased;
  padding-bottom:env(safe-area-inset-bottom);
}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;font-size:16px}
.hidden{display:none !important}

/* ---------- AUTH ---------- */
#auth{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:28px;
  background:#020111}
/* ---- splash ---- */
#splash{position:fixed;inset:0;z-index:100000;background:#020111;display:flex;align-items:center;justify-content:center;overflow:hidden}
#splash.done{opacity:0;transition:opacity .5s ease;pointer-events:none}
.splash-stack{display:flex;flex-direction:column;align-items:center;position:relative;z-index:2}
.splash-mark{width:min(34vw,132px);height:auto;animation:markPop .85s cubic-bezier(.2,.9,.3,1.15) both}
.splash-glow{position:absolute;width:120vw;height:120vw;max-width:560px;max-height:560px;border-radius:50%;z-index:1;
  background:radial-gradient(circle,rgba(72,110,235,.32) 0%,rgba(120,60,200,.16) 40%,transparent 68%);
  animation:splGlow 2.4s ease-in-out both}
@keyframes markPop{0%{opacity:0;transform:scale(.4) translateY(14px)}65%{opacity:1}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes splGlow{0%{opacity:0;transform:scale(.5)}45%{opacity:1}100%{opacity:.55;transform:scale(1.05)}}
.word-reveal{display:flex;margin-top:8px}
.word-reveal span{font-family:var(--font);font-weight:800;letter-spacing:.5px;
  background:linear-gradient(100deg,#59B4FF,#7C7CF0 55%,#A85CFF);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  opacity:0;display:inline-block;transform:translateY(14px) scale(.7);
  animation:letterIn .55s cubic-bezier(.2,.9,.3,1.3) forwards;
  animation-delay:calc(.85s + var(--i) * .12s)}
.splash-word span{font-size:42px}
.brand-word span{font-size:34px}
@keyframes letterIn{to{opacity:1;transform:translateY(0) scale(1)}}
.splash-tag{margin-top:10px;color:#8fa0c8;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  opacity:0;animation:tagIn .6s ease forwards;animation-delay:1.75s}
@keyframes tagIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#auth::before{content:'';position:fixed;inset:0;background:radial-gradient(90% 50% at 50% 8%, rgba(28,48,110,.35) 0%, transparent 70%);pointer-events:none}
.brand{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:22px;margin-top:-8px;position:relative}
.brand .logo-img{width:min(30vw,116px);height:auto;display:block}
.brand .tag{margin:0;color:#8fa0c8;font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase}
.auth-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;width:100%;max-width:380px}
.auth-card h2{margin:0 0 4px;font-size:19px}
.auth-card .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;max-width:100%;min-width:0;padding:13px 14px;border:1.5px solid var(--line-2);border-radius:12px;background:var(--input-bg);color:var(--ink);outline:none;font-family:inherit;font-size:15px}
.field input[type=date]{-webkit-appearance:none;appearance:none;display:block;box-sizing:border-box;width:100%;max-width:100%;min-height:48px;text-align:left}
.field input[type=date]::-webkit-date-and-time-value{text-align:left;margin:0}
.field input[type=date]::-webkit-calendar-picker-indicator{margin-left:auto}
body.modal-open{overflow:hidden}
body.modal-open .fab{display:none !important}
.field select{text-overflow:ellipsis}
.field input:focus,.field select:focus{border-color:var(--mint)}
.acWrap{position:relative}
.acList{position:absolute;left:0;right:0;top:100%;margin-top:4px;z-index:40;background:var(--card);border:1.5px solid var(--line-2);border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35);max-height:230px;overflow-y:auto}
.acItem{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--line-2)}
.acItem:last-child{border-bottom:0}
.acItem:active{background:var(--input-bg)}
.acItem .acTxt{font-weight:600;font-size:14px}
.acItem .acCat{margin-left:auto;font-size:11px;color:var(--muted)}
.field .err-flash,input.err-flash,select.err-flash{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(239,68,68,.25)!important;animation:errShake .35s}
@keyframes errShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:12px;
  background:var(--emerald);color:#fff;font-weight:700;font-size:15px;transition:filter .15s}
.btn:active{filter:brightness(.92)}
.btn.coral{background:var(--coral)}
.btn.ghost{background:transparent;color:var(--nav-on);font-weight:600}
.btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:10px}
.btn.outline{background:var(--card);border:1.5px solid var(--line-2);color:var(--ink)}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
.auth-switch b{color:var(--nav-on);cursor:pointer}
.msg{font-size:13px;padding:10px 12px;border-radius:10px;margin-bottom:14px}
.msg.err{background:#fdeceb;color:#b5392c}
.msg.ok{background:#e7f6ee;color:#1a7a4f}

/* ---------- APP SHELL ---------- */
#app{min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden;width:100%;max-width:100%}
.topbar{position:sticky;top:0;z-index:30;background:var(--emerald);color:#fff;
  padding:calc(env(safe-area-inset-top) + 14px) 16px 14px}
.topbar .row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.topbar .hi{font-size:13px;opacity:.8}
.topbar .hi b{display:block;font-size:16px;font-weight:700;opacity:1}
.iconbtn{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.14);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:18px}
.seg{display:flex;background:rgba(255,255,255,.12);border-radius:12px;padding:3px;gap:3px;margin-top:6px}
.segcap{display:none}
.seg-sec{background:rgba(255,255,255,.07)}
.seg-sec button{font-size:13px;padding:5px}
.seg button{flex:1;padding:6px;border-radius:9px;color:rgba(255,255,255,.75);font-weight:600;font-size:13px}
.seg button.on{background:#fff;color:var(--emerald)}

.content{flex:1;padding:16px;padding-bottom:210px;max-width:560px;width:100%;margin:0 auto;overflow-x:hidden}
.page-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:4px 2px 12px}

/* cards */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.hero{background:linear-gradient(155deg,var(--emerald),var(--emerald-2));color:var(--on-hero)}
.hero .lab{font-size:12px;opacity:.78;text-transform:uppercase;letter-spacing:.6px}
.hero .big{font-size:33px;font-weight:800;letter-spacing:-.6px;margin:6px 0 2px;font-variant-numeric:tabular-nums}
.hero .big.neg{color:var(--hero-red)}
.balrow{display:flex;gap:12px;margin-top:16px}
.balrow .b{flex:1;min-width:0;background:color-mix(in srgb, var(--on-hero) 12%, transparent);border-radius:12px;padding:10px 10px}
.balrow .b .l{font-size:10.5px;opacity:.8;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.balrow .b .v{font-size:14px;font-weight:700;margin-top:2px;white-space:nowrap;font-variant-numeric:tabular-nums}
.balrow .b .v.g{color:var(--hero-green)}.balrow .b .v.r{color:var(--hero-red)}
.saidas{margin-top:12px;background:var(--hero-box);border-radius:12px;padding:2px 12px}
.saidas .srow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;font-size:13.5px;border-bottom:1px solid color-mix(in srgb, var(--on-hero) 10%, transparent)}
.saidas .srow:last-child{border-bottom:0}
.saidas .srow span{opacity:.85}
.saidas .srow b{font-variant-numeric:tabular-nums;color:var(--hero-red);font-weight:700}
.saidas .srow.inv b{color:var(--hero-green)}
.saidas .srow.tot{font-weight:800}
.saidas .srow.tot span{opacity:1}
.saidas .srow.tot b{color:var(--hero-red);font-size:15.5px}

.sec-head{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 10px}
.sec-head h3{margin:0;font-size:15px;font-weight:700}
.sec-head a{font-size:13px;color:var(--mint);font-weight:600;cursor:pointer}

/* list rows */
.lrow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);cursor:pointer}
.lrow.pago{position:relative;padding-left:10px}
.lrow.pago::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:#2fbf83}
.lrow:last-child{border-bottom:none}
.dot{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:var(--coral-soft)}
.dot svg{display:block}
.limbar{height:6px;border-radius:6px;background:#e9e4dc;overflow:hidden;margin-top:10px}
.limbar-fill{height:100%;border-radius:6px;background:var(--mint);transition:width .3s}
.lnk{color:var(--nav-on);font-weight:700;font-size:13px}
.pend-alert{display:flex;align-items:center;gap:12px;margin-bottom:14px;cursor:pointer}
.pend-g{font-size:12px;font-weight:700;color:var(--muted);text-transform:capitalize;padding:10px 2px 4px}
.pend-row{cursor:pointer;border-radius:10px}
.pend-row.sel{background:rgba(232,101,78,.16)}
.pend-chk{width:28px;height:28px;border-radius:50%;border:2px solid var(--line-2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;flex-shrink:0;margin-left:8px}
.pend-chk.on{background:var(--coral);border-color:var(--coral)}
.lchk{width:24px;height:24px;border-radius:7px;border:2px solid var(--line-2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;flex-shrink:0;margin-left:10px;background:var(--input-bg)}
.lchk.on{background:var(--mint);border-color:var(--mint)}
.lconf{margin-left:10px;flex-shrink:0;background:var(--mint);color:#fff;font-weight:700;font-size:12px;padding:9px 13px;border-radius:9px;white-space:nowrap;line-height:1}
.proj{margin-top:8px;font-size:13px;color:rgba(255,255,255,.82)}
.proj b{color:#fff}
.grp-lab{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin:16px 2px 7px;display:flex;justify-content:space-between;align-items:center}
.grp-lab .gv{font-weight:800}
.switch{width:48px;height:28px;border-radius:16px;background:var(--line-2);position:relative;flex-shrink:0;transition:background .2s;border:none}
.switch.on{background:var(--mint)}
.switch .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.switch.on .knob{left:23px}
.conta-logo{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--input-bg);background-position:center;background-size:cover;border:1px solid var(--line-2)}
.btn.sm{padding:9px 14px;font-size:13px;width:auto}
.b.tap{cursor:pointer;transition:transform .1s}
.b.tap:active{transform:scale(.97)}
.tfilter{display:flex;gap:6px;margin-bottom:12px}
.tfilter button{flex:1;padding:9px 4px;border-radius:10px;border:1.5px solid var(--line-2);background:var(--card);font-weight:700;font-size:12.5px;color:var(--muted)}
.tfilter button.on{background:var(--emerald);color:#fff;border-color:var(--emerald)}
.pendbar{position:fixed;left:0;right:0;bottom:calc(env(safe-area-inset-bottom) + 60px);z-index:25;width:calc(100% - 24px);max-width:536px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--card);border:1px solid var(--line-2);box-shadow:0 -4px 20px rgba(0,0,0,.12);border-radius:16px;padding:10px 14px}
.lrow .mid{flex:1;min-width:0}
.lrow .mid .t{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lrow .mid .t.wrap{white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.25}
.lrow .mid .s{font-size:12px;color:var(--muted);margin-top:1px}
.lrow .amt{font-weight:700;font-size:15px;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.amt.g{color:var(--green)}.amt.r{color:var(--red)}.amt.b{color:var(--blue)}
.pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px;vertical-align:middle}
.pill.pend{background:#fdf0d9;color:#a9701a}
.pill.neg{background:#eef1ef;color:var(--muted)}
.pill.peso{background:#e9f3f1;color:var(--emerald-2)}

.empty{text-align:center;padding:34px 18px;color:var(--muted)}
.empty .ico{font-size:34px;margin-bottom:8px}
.empty p{margin:0 0 14px;font-size:14px}

/* tabbar */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--card);border-top:1px solid var(--line);
  display:flex;padding:6px 6px calc(env(safe-area-inset-bottom) + 6px);max-width:560px;margin:0 auto}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0;color:var(--muted);font-size:10.5px;font-weight:600}
.tabbar button .i{font-size:20px;line-height:1}
.tabbar button.on{color:var(--nav-on)}
.fab{position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom) + 80px);z-index:45;
  width:50px;height:50px;border-radius:15px;background:var(--coral);color:#fff;font-size:25px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(232,101,78,.5);transition:opacity .3s,transform .08s,filter .08s;opacity:.82}
.fab:active{transform:scale(.9);filter:brightness(.9);opacity:1}
.iafab{left:16px;right:auto;background:#2f8f66;box-shadow:0 3px 10px rgba(0,0,0,.35);overflow:visible}
.iaring{position:absolute;top:-5px;left:-5px;pointer-events:none;overflow:visible}
.iaring-fill{transition:stroke-dashoffset .6s ease,stroke .3s ease}
.obfab{left:16px;right:auto;bottom:calc(env(safe-area-inset-bottom) + 142px);background:#ff7a1a;box-shadow:0 8px 22px rgba(255,122,26,.5);animation:obPulse 1.8s ease-in-out infinite;opacity:1}
@keyframes obPulse{0%,100%{box-shadow:0 8px 22px rgba(255,122,26,.5)}50%{box-shadow:0 8px 30px rgba(255,122,26,.85)}}
/* ===== WALKTHROUGH GUIADO (coach marks) ===== */
#wtOverlay{position:fixed;inset:0;z-index:200;pointer-events:none}
#wtOverlay .wt-dim{position:absolute;inset:0;background:rgba(6,8,16,.78);pointer-events:auto;transition:clip-path .3s ease}
#wtOverlay .wt-ring{position:absolute;border-radius:18px;box-shadow:0 0 0 3px #ff8a1a,0 0 0 9999px rgba(6,8,16,.78);transition:all .35s cubic-bezier(.22,1,.36,1);pointer-events:none}
#wtOverlay .wt-baloon{position:absolute;max-width:290px;background:#fff;color:#16182a;border-radius:16px;padding:16px 18px;box-shadow:0 12px 40px rgba(0,0,0,.5);pointer-events:auto;transition:all .35s cubic-bezier(.22,1,.36,1)}
#wtOverlay .wt-baloon h4{font-size:16px;font-weight:800;margin-bottom:5px;color:#7c3aed}
#wtOverlay .wt-baloon p{font-size:13.5px;line-height:1.5;color:#3a3d55;margin-bottom:12px}
#wtOverlay .wt-baloon .wt-step{font-size:11px;font-weight:700;color:#9aa0bd;margin-bottom:8px;letter-spacing:.5px}
#wtOverlay .wt-baloon .wt-btns{display:flex;gap:8px;justify-content:space-between;align-items:center}
#wtOverlay .wt-baloon button{border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:13.5px;cursor:pointer}
#wtOverlay .wt-next{background:#7c3aed;color:#fff}
#wtOverlay .wt-skip{background:transparent;color:#9aa0bd;padding:9px 6px !important}
#wtOverlay .wt-arrow{position:absolute;width:0;height:0}
.fab,.iafab,.obfab{transition:opacity .25s ease,transform .08s,filter .08s}
body.scrolling .fab{opacity:.25}
/* feedback de toque — só em botões pequenos, sem transform que causa piscar */
.btn,.lnk,.quick,.seg button{transition:opacity .12s ease}
.btn:active,.lnk:active,.quick:active,.seg button:active{opacity:.6}
.tapped{opacity:.55 !important}

/* sheet / modal */
.overlay{position:fixed;inset:0;z-index:40;background:rgba(12,28,26,.45);display:flex;align-items:flex-end;justify-content:center;touch-action:none}
.sheet{background:var(--paper);width:100%;max-width:560px;border-radius:22px 22px 0 0;max-height:92dvh;display:flex;flex-direction:column;overflow:hidden;animation:up .22s ease;position:relative}
.sheet-x{position:absolute;top:9px;right:12px;z-index:6;width:34px;height:34px;border-radius:50%;background:rgba(128,128,128,.22);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;border:none;cursor:pointer}
.sheet-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:0 18px calc(env(safe-area-inset-bottom) + 24px)}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
.grip{width:40px;height:4px;border-radius:4px;background:var(--line-2);margin:8px auto 6px}
.sheet h2{font-size:18px;margin:6px 2px 16px}
.typetabs{display:flex;gap:8px;margin-bottom:16px}
.typetabs button{flex:1;padding:12px 8px;border-radius:11px;background:var(--input-bg);border:1.5px solid var(--line-2);font-weight:700;font-size:13.5px;color:var(--muted)}
.typetabs button.on.rec{background:var(--green);border-color:var(--green);color:#fff}
.typetabs button.on.desp{background:var(--red);border-color:var(--red);color:#fff}
.typetabs button.on.transf{background:var(--blue);border-color:var(--blue);color:#fff}
.row2{display:flex;gap:10px}.row2>*{flex:1}
.seg2{display:flex;background:var(--input-bg);border:1.5px solid var(--line-2);border-radius:13px;padding:3px;gap:4px}
.seg2 button{flex:1;padding:11px 8px;border-radius:10px;font-weight:700;font-size:13.5px;color:var(--muted)}
.seg2 button.on{background:var(--emerald);color:#fff}
.chiprow{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chip{padding:8px 13px;border-radius:20px;background:var(--input-bg);border:1.5px solid var(--line-2);font-size:13px;font-weight:600;color:var(--muted)}
.chip.on{background:var(--emerald);color:#fff;border-color:var(--emerald)}
.note{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}
.danger{color:var(--red);font-weight:600}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 90px);left:50%;transform:translateX(-50%);z-index:60;
  background:#1a1024;color:#fff;padding:12px 20px;border-radius:30px;font-size:13.5px;font-weight:700;
  box-shadow:0 8px 30px rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.12);max-width:80vw;text-align:center;
  opacity:0;transition:opacity .2s, transform .2s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
.toast.err{background:#7a1f1f;border-color:rgba(255,120,120,.4)}
.loading{display:flex;align-items:center;justify-content:center;height:60dvh;color:var(--muted)}
.spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--emerald);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.monthnav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:14px;padding:3px 6px;box-shadow:var(--shadow);margin-bottom:10px}
.monthnav button{width:30px;height:30px;border-radius:10px;font-size:17px;color:var(--mint)}
.monthnav .m{font-weight:700;font-size:14px;color:var(--ink)}
.facard{background:linear-gradient(155deg,#2a2440,#3d3460);color:#fff}

/* atalhos rápidos */
.quickrow{display:flex;gap:10px;margin-bottom:14px}
.radio-dot{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:13px;font-weight:800}
.radio-dot.on{background:var(--ink);border-color:var(--ink);color:var(--paper)}
.sortable-item{position:relative}
.sortable-item.dragging{opacity:.92;box-shadow:0 14px 34px rgba(0,0,0,.4);border-radius:var(--radius)}
.sortable-placeholder{border:2px dashed var(--line-2);border-radius:var(--radius);margin-bottom:14px;box-sizing:border-box}
.drag-handle{position:absolute;top:8px;right:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--muted);touch-action:none;z-index:6;font-size:18px;letter-spacing:1px;line-height:1;cursor:grab;border-radius:8px}
.drag-handle:active{background:var(--input-bg)}
.quick{flex:1;background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:9px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--ink)}
.quick .qi{font-size:22px;margin-bottom:2px}
/* barra receita x despesa no hero */
.rdbar{display:flex;height:8px;border-radius:6px;overflow:hidden;margin:16px 0 4px;background:rgba(255,255,255,.18)}
.rdrec{background:var(--hero-green)}.rddesp{background:var(--hero-red)}
/* progresso */
.prog{height:9px;border-radius:6px;background:var(--line);overflow:hidden}
.progfill{height:100%;border-radius:6px;transition:width .3s}
/* barras 6 meses */
.bars{display:flex;align-items:flex-end;justify-content:space-between;height:110px;gap:6px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.barpair{display:flex;gap:3px;align-items:flex-end;height:90px}
.bar{width:11px;border-radius:4px 4px 0 0;min-height:2px;transform-origin:bottom;animation:barGrow .55s cubic-bezier(.22,1,.36,1) both}
.bar.rec{background:var(--bar-rec)}.bar.desp{background:var(--bar-desp)}
.barlab{font-size:10px;color:var(--muted);margin-top:6px;text-transform:capitalize}
/* importar do banco */
.impCard{border:1px solid var(--line-2);border-radius:14px;padding:10px 12px;margin-bottom:10px;background:var(--card-2,rgba(255,255,255,.02))}
.impCard.off{opacity:.45}
.impCard.dup{border-color:#e0a020}
.impTop{display:flex;align-items:center;gap:10px}
.impTop .impV{margin-left:auto;font-weight:700;font-size:15px}
.impTag{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:700}
.impGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.impGrid .full{grid-column:1/-1}
.impCard input,.impCard select{width:100%;padding:8px 10px;border-radius:10px;border:1px solid var(--line-2);background:var(--bg);color:var(--txt);font-size:13px}
.impWarn{font-size:11px;color:#e0a020;margin-top:6px}
/* barras 24 meses — rolagem horizontal */
.hbarwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 2px 4px;scrollbar-width:thin}
.hbars{display:flex;align-items:flex-end;height:110px;gap:9px;min-width:max-content;padding-top:2px}
.barcolH{flex:0 0 auto;width:30px}
.barcolH .barlab{line-height:1.15;text-align:center}
.daybars{display:flex;align-items:flex-end;height:170px;gap:6px;overflow-x:auto;padding:22px 4px 2px;overflow-y:visible}
.daycol{flex:0 0 auto;width:30px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;cursor:pointer;position:relative}
.daybar{width:24px;border-radius:5px 5px 0 0;min-height:4px;background:var(--bar-desp);display:flex;align-items:center;justify-content:center;transform-origin:bottom;animation:barGrow .6s cubic-bezier(.22,1,.36,1) both}
.daybar.hoje{background:var(--mint,#2fbf83)}
@keyframes barGrow{from{transform:scaleY(0);opacity:.3}to{transform:scaleY(1);opacity:1}}
.daylab{font-size:9.5px;color:var(--muted);margin-top:5px}
.dayval{white-space:nowrap;font-size:8.8px;font-weight:800;pointer-events:none;line-height:1}
.dayval.in{color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.35);font-size:8px}
.dayval.out{color:var(--ink);margin-bottom:4px}
.legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:12px;color:var(--muted)}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
/* subhead com voltar */
.subhead{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 12px;font-size:15px}
.subhead span{color:var(--mint);font-weight:600;cursor:pointer;min-width:64px}
.subhead b{font-size:16px}
.badge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 4px;border-radius:10px;background:var(--coral);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--emerald)}
.installbanner{position:fixed;left:10px;right:10px;bottom:calc(env(safe-area-inset-bottom) + 78px);z-index:35;max-width:540px;margin:0 auto;
  background:var(--ink);color:#fff;border-radius:16px;padding:12px 12px 12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.installbanner .ib-ic{font-size:24px}
.installbanner .ib-txt{flex:1;line-height:1.25}
.installbanner .ib-txt b{display:block;font-size:14px}
.installbanner .ib-txt span{font-size:12px;opacity:.75}
.installbanner .ib-btn{background:var(--mint);color:#fff;font-weight:700;padding:9px 14px;border-radius:10px;font-size:13px}
.installbanner .ib-x{color:rgba(255,255,255,.6);font-size:20px;width:26px}
.istep{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line)}
.istep:last-child{border-bottom:none}
.istep .n{width:26px;height:26px;border-radius:50%;background:var(--emerald);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.istep .st{font-size:14px}
.addgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.addmenu{position:fixed;inset:0;z-index:60;background:rgba(10,12,14,.82);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:calc(env(safe-area-inset-bottom) + 24px);animation:amfade .18s ease}
@keyframes amfade{from{opacity:0}to{opacity:1}}
.addmenu-inner{display:flex;flex-direction:column;gap:22px;align-items:center;margin-bottom:28px}
.amrow{display:grid;grid-template-columns:110px 110px;gap:0 56px;justify-content:center}
.amitem{display:flex;flex-direction:column;align-items:center;gap:9px;background:none;animation:amup .26s ease both}
.amrow:nth-child(1) .amitem:nth-child(1){animation-delay:.02s}
.amrow:nth-child(1) .amitem:nth-child(2){animation-delay:.06s}
.amrow:nth-child(2) .amitem:nth-child(1){animation-delay:.10s}
.amrow:nth-child(2) .amitem:nth-child(2){animation-delay:.14s}
@keyframes amup{from{opacity:0;transform:translateY(16px) scale(.85)}to{opacity:1;transform:none}}
.am-ic{width:64px;height:64px;border-radius:50%;background:#22262b;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.35)}
.am-ic.rec{color:#34d399}.am-ic.desp{color:#f87171}.am-ic.card{color:#2dd4bf}.am-ic.tr{color:#60a5fa}.am-ic.bank{color:#fbbf24}
.am-lab{color:#fff;font-size:13.5px;font-weight:600;text-align:center;line-height:1.2;min-height:32px;display:flex;align-items:flex-start;justify-content:center}
.amitem.paste .am-lab{min-height:0;align-items:center}
.amitem.paste{flex-direction:row;gap:10px;background:rgba(255,255,255,.1);padding:10px 18px;border-radius:30px;animation-delay:.18s}
.amitem.paste .am-ic{width:34px;height:34px;box-shadow:none;background:rgba(255,255,255,.12)}
.amitem.paste .am-ic svg{width:18px;height:18px}
.addmenu-x{width:60px;height:60px;border-radius:50%;background:#7c3aed;color:#fff;font-size:24px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(124,58,237,.5)}
.saved-lbl{font-size:12px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.4px;margin:2px 0 8px}
.brand .ver{display:inline-block;font-size:12.5px;font-weight:600;color:rgba(255,255,255,.7);margin-top:8px;letter-spacing:.3px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:3px 12px;border-radius:20px}
.tema-presets{display:flex;flex-direction:column;gap:8px}
.tema-chip{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;border:1.5px solid var(--line-2);background:var(--card);font-weight:600;font-size:14px;color:var(--ink)}
.tema-chip .sw{width:18px;height:18px;border-radius:50%;border:1px solid rgba(0,0,0,.1)}
.cor-in{width:48px;height:34px;padding:0;border:1px solid var(--line);border-radius:8px;background:none}
.opsrow{display:flex;gap:6px;margin:-4px 0 12px}
.sheet-back{display:inline-flex;align-items:center;gap:2px;color:var(--mint);font-weight:700;font-size:15px;margin:-4px 0 6px;cursor:pointer}
.bigval{background:var(--emerald);color:#fff;border-radius:16px;padding:16px 18px;margin:4px 0 14px;cursor:pointer}
.bigval .bv-lab{font-size:12px;opacity:.8;text-transform:uppercase;letter-spacing:.3px}
.bigval .bv-num{font-size:32px;font-weight:800;margin-top:4px}
.datechips{display:flex;gap:8px}
.datechips button,.datechips .dc-outros{flex:1;padding:9px 8px;border-radius:10px;border:1.5px solid var(--line-2);background:var(--input-bg);font-weight:600;font-size:13.5px;color:var(--muted);display:flex;align-items:center;justify-content:center;text-align:center;text-transform:none;letter-spacing:normal;margin:0;line-height:1;min-height:0}
.datechips button.on,.datechips .dc-outros.on{background:var(--emerald);color:#fff;border-color:var(--emerald)}
.dc-outros{position:relative;cursor:pointer;overflow:hidden}
.dc-outros input{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:0;padding:0;margin:0}
.datashow{margin-top:8px;font-size:13.5px;color:var(--muted);font-weight:600}
.calcpad{position:fixed;left:0;right:0;bottom:0;z-index:120;background:#15181c;border-radius:20px 20px 0 0;padding:14px 14px calc(14px + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .22s ease;box-shadow:0 -8px 30px rgba(0,0,0,.4);pointer-events:none}
.calcpad.show{transform:translateY(0);pointer-events:auto}
.calc-disp{display:flex;align-items:center;justify-content:flex-end;gap:8px;color:#fff;font-size:30px;font-weight:700;padding:10px 8px 16px}
.calc-disp .cur{font-size:16px;opacity:.6;margin-right:auto}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.calc-grid button{padding:18px 0;border-radius:12px;background:#23272d;color:#fff;font-size:22px;font-weight:700}
.calc-grid button.op{background:#2f3a39;color:var(--mint)}
.calc-actions{display:flex;gap:8px;margin-top:10px;align-items:center}
.calc-actions .calc-back{width:54px;padding:14px 0;border-radius:12px;background:#23272d;color:#fff;font-size:18px}
.calc-actions .calc-cancel{flex:1;padding:14px;border-radius:12px;background:#23272d;color:#fff;font-weight:700}
.calc-actions .calc-ok{flex:1;padding:14px;border-radius:12px;background:var(--mint);color:#fff;font-weight:800}
.opsrow button{flex:1;padding:9px 0;border-radius:10px;border:1.5px solid var(--line-2);background:var(--input-bg);font-size:18px;font-weight:700;color:var(--ink)}
.opsrow button.eq{background:var(--mint);color:#fff;border-color:var(--mint)}
.ctxrow{display:flex;gap:6px;margin-bottom:12px}
.ctxrow button{flex:1;padding:9px 4px;border-radius:10px;border:1.5px solid var(--line-2);background:var(--input-bg);font-weight:700;font-size:13px;color:var(--muted)}
.ctxrow button.on{background:var(--emerald);color:#fff;border-color:var(--emerald)}
.saved-acc{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);margin-bottom:8px;cursor:pointer}
.saved-acc.last{border-color:var(--mint)}
.saved-acc .sa-ic{font-size:20px}
.saved-acc .sa-mid{flex:1;min-width:0}
.saved-acc .sa-em{color:#fff;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.saved-acc .sa-sub{font-size:11px;color:var(--mint)}
.saved-acc .sa-x{color:rgba(255,255,255,.5);font-size:20px;width:28px;flex-shrink:0}
.savepass-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);margin:2px 0 14px;cursor:pointer}
.savepass-row input{width:18px;height:18px}
</style>
</head>
<body>

<!-- ================= SPLASH ================= -->
<div id="splash">
  <div class="splash-glow"></div>
  <div class="splash-stack">
    <img src="assets/mark.png?v=4" class="splash-mark" alt="">
    <div class="word-reveal splash-word">
      <span style="--i:0">G</span><span style="--i:1">e</span><span style="--i:2">s</span><span style="--i:3">t</span><span style="--i:4">o</span><span style="--i:5">r</span>
    </div>
    <div class="splash-tag">Controle Financeiro</div>
    <div id="splashVer" style="margin-top:10px;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,.38);font-weight:600"></div>
  </div>
</div>

<!-- ================= AUTH ================= -->
<div id="auth">
  <div class="brand">
    <img class="logo-img" src="assets/mark.png?v=4" alt="Gestor Soluções">
    <div class="word-reveal brand-word">
      <span style="--i:0">G</span><span style="--i:1">e</span><span style="--i:2">s</span><span style="--i:3">t</span><span style="--i:4">o</span><span style="--i:5">r</span>
    </div>
    <p class="tag">Controle Financeiro</p>
    <p class="ver" id="appVer"></p>
  </div>
  <div class="auth-card">
    <div id="authMsg"></div>
    <!-- login -->
    <div id="loginForm">
      <h2>Entrar</h2>
      <div class="sub">Acesse sua conta</div>
      <div id="savedAccounts"></div>
      <div class="field"><label>E-mail</label><input id="liEmail" type="email" inputmode="email" autocapitalize="none" autocorrect="off" spellcheck="false" autocomplete="username" placeholder="voce@email.com"></div>
      <div class="field"><label>Senha</label><input id="liPass" type="password" autocomplete="current-password" placeholder="••••••••"></div>
      <label class="savepass-row"><input type="checkbox" id="liSavePass"> Salvar senha neste aparelho</label>
      <button class="btn" onclick="doLogin()">Entrar</button>
      <div class="auth-switch">Não tem conta? <b onclick="showSignup()">Criar agora</b></div>
      <div class="auth-switch" style="margin-top:6px"><b onclick="esqueciSenha()">Esqueci minha senha</b></div>
    </div>
    <!-- signup -->
    <div id="signupForm" class="hidden">
      <h2>Criar conta</h2>
      <div class="sub">Leva menos de um minuto</div>
      <div class="field"><label>Nome</label><input id="suNome" type="text" autocomplete="name" placeholder="Seu nome"></div>
      <div class="field"><label>WhatsApp / celular</label><input id="suFone" type="tel" inputmode="tel" autocomplete="tel" placeholder="(19) 99999-9999"></div>
      <div style="display:flex;gap:10px">
        <div class="field" style="flex:1"><label>Cidade</label><input id="suCidade" type="text" autocomplete="address-level2" placeholder="Sua cidade"></div>
        <div class="field" style="width:88px"><label>UF</label><input id="suUF" type="text" maxlength="2" autocapitalize="characters" placeholder="SP" style="text-transform:uppercase"></div>
      </div>
      <div class="field"><label>E-mail</label><input id="suEmail" type="email" inputmode="email" autocapitalize="none" autocorrect="off" spellcheck="false" autocomplete="email" placeholder="voce@email.com"></div>
      <div class="field"><label>Senha</label><input id="suPass" type="password" autocomplete="new-password" placeholder="mínimo 6 caracteres"></div>
      <label class="savepass-row" style="align-items:flex-start;margin:4px 0 14px"><input type="checkbox" id="suAceite" style="margin-top:3px"> <span style="font-size:12.5px;line-height:1.5">Li e concordo com os <a href="termos.html" target="_blank" style="color:var(--nav-on);font-weight:700">Termos de Uso</a> e a <a href="privacidade.html" target="_blank" style="color:var(--nav-on);font-weight:700">Política de Privacidade</a>.</span></label>
      <button class="btn coral" onclick="doSignup()">Criar conta</button>
      <div class="auth-switch">Já tem conta? <b onclick="showLogin()">Entrar</b></div>
    </div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="row1">
      <div class="hi">Olá,<b id="userName">—</b></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="iconbtn hidden" id="cliBtn" onclick="go('clientes')" style="position:relative" title="Clientes"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4L12 14.3 7.2 16.9l.9-5.4L4.2 7.7l5.4-.8z"/></svg><span id="cliBadge" class="badge hidden">0</span></button>
        <button class="iconbtn" id="eyeBtn" onclick="toggleHideVal()" title="Ocultar valores"></button>
        <button class="iconbtn" id="bellBtn" onclick="abrirNotificacoes()" style="position:relative"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span id="bellBadge" class="badge hidden">0</span></button>
        <button class="iconbtn" onclick="doLogout()" title="Sair"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg></button>
      </div>
    </div>
    <div class="segcap">Carteira</div>
    <div class="seg" id="scopeSeg">
      <button data-scope="tudo" class="on" onclick="setScope('tudo')">Tudo</button>
      <button data-scope="pessoal" onclick="setScope('pessoal')">Pessoal</button>
      <button data-scope="negocio" onclick="setScope('negocio')">Negócio</button>
      <button data-scope="familia" onclick="setScope('familia')">Família</button>
    </div>
    <div id="sourceSegWrap"></div>
  </div>

  <div class="content" id="content">
    <div class="loading"><div class="spin"></div></div>
  </div>
</div>

<button class="fab hidden" id="fab" onclick="openAddMenu()">+</button>
<button class="fab iafab hidden" id="iaFab" onclick="go('assistente')" title="Assistente IA">
  <svg class="iaring" width="60" height="60" viewBox="0 0 60 60"><circle id="iaRingFill" class="iaring-fill" cx="30" cy="30" r="26" fill="none" stroke="#ff8a1a" stroke-width="6" stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="0" transform="rotate(-90 30 30)"/></svg>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:1px"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6.3 6.3l2.8 2.8M14.9 14.9l2.8 2.8M6.3 17.7l2.8-2.8M14.9 9.1l2.8-2.8"/></svg>
  <span style="font-size:9px;font-weight:800;letter-spacing:.5px;line-height:1">IA</span>
</button>
<button class="fab obfab hidden" id="obFab" onclick="go('tutorial')" title="Primeiros passos">

// tabela -> chave correspondente em DATA (pra aplicar a mudança localmente na hora, mesmo sem internet)
const TABLE_KEY={lancamentos:'lancamentos',orcamentos:'orcamentos',cartoes:'cartoes',contas:'contas',categorias:'categorias',investimentos:'investimentos'};
function applyLocalOp(table,type,payload){
  const key=TABLE_KEY[table]; const arr=key&&DATA[key]; if(!arr) return;
  if(type==='insert'){
    payload.rows.forEach(r=>{ const c=Object.assign({},r,{_offline:true}); arr.unshift(c); });
  }else if(type==='update'){
    const vals=Array.isArray(payload.match.val)?payload.match.val:[payload.match.val];
    arr.forEach(item=>{ if(vals.includes(item[payload.match.col])) Object.assign(item,payload.patch); });
  }else if(type==='delete'){
    const vals=Array.isArray(payload.match.val)?payload.match.val:[payload.match.val];
    const kept=arr.filter(item=>!vals.includes(item[payload.match.col]));
    arr.length=0; kept.forEach(x=>arr.push(x));
  }
  saveCache(); updateOfflinePill();
}
function queueOp(table,type,payload){
  const q=outbox(); q.push({table,type,payload,ts:Date.now()}); setOutbox(q);
  applyLocalOp(table,type,payload);
}
// INSERT genérico. rows sempre recebe um id gerado no cliente, pra já poder usar na hora mesmo offline.
async function dbInsert(table,rows){
  rows.forEach(r=>{ if(!r.id) r.id=uuid(); });
  if(navigator.onLine){
    try{
      let {error}=await sb.from(table).insert(rows);
      if(error && isAuthErr(error) && await fixAuth()){ ({error}=await sb.from(table).insert(rows)); }
      if(error){ if(isNetErr(error)){ queueOp(table,'insert',{rows}); return {ok:true,queued:true,rows}; } toast('Erro: '+error.message); return {ok:false,error}; }
      return {ok:true,rows};
    }catch(e){ if(isNetErr(e)){ queueOp(table,'insert',{rows}); return {ok:true,queued:true,rows}; } toast('Erro: '+(e.message||e)); return {ok:false}; }
  }
  queueOp(table,'insert',{rows}); return {ok:true,queued:true,rows};
}
// UPDATE genérico. val pode ser um id único ou um array (vira .in no supabase)
async function dbUpdate(table,patch,col,val){
  if(navigator.onLine){
    try{
      const run=async()=>{ const base=sb.from(table).update(patch); return Array.isArray(val)?await base.in(col,val):await base.eq(col,val); };
      let {error}=await run();
      if(error && isAuthErr(error) && await fixAuth()){ ({error}=await run()); }
      if(error){ if(isNetErr(error)){ queueOp(table,'update',{patch,match:{col,val}}); return {ok:true,queued:true}; } toast('Erro: '+error.message); return {ok:false,error}; }
      applyLocalOp(table,'update',{patch,match:{col,val}});
      return {ok:true};
    }catch(e){ if(isNetErr(e)){ queueOp(table,'update',{patch,match:{col,val}}); return {ok:true,queued:true}; } toast('Erro: '+(e.message||e)); return {ok:false}; }
  }
  queueOp(table,'update',{patch,match:{col,val}}); return {ok:true,queued:true};
}
// DELETE genérico. val pode ser um id único ou um array (vira .in no supabase)
async function dbDelete(table,col,val){
  if(navigator.onLine){
    try{
      const run=async()=>{ const base=sb.from(table).delete(); return Array.isArray(val)?await base.in(col,val):await base.eq(col,val); };
      let {error}=await run();
      if(error && isAuthErr(error) && await fixAuth()){ ({error}=await run()); }
      if(error){ if(isNetErr(error)){ queueOp(table,'delete',{match:{col,val}}); return {ok:true,queued:true}; } toast('Erro: '+error.message); return {ok:false,error}; }
      applyLocalOp(table,'delete',{match:{col,val}});
      return {ok:true};
    }catch(e){ if(isNetErr(e)){ queueOp(table,'delete',{match:{col,val}}); return {ok:true,queued:true}; } toast('Erro: '+(e.message||e)); return {ok:false}; }
  }
  queueOp(table,'delete',{match:{col,val}}); return {ok:true,queued:true};
}

let _flushing=false;
async function flushOutbox(){
  updateOfflinePill();
  if(!navigator.onLine) return;
  const q=outbox(); if(!q.length) return;
  if(_flushing) return; _flushing=true;
  const keep=[]; let sent=0; let lastErr=null;
  try{
    for(const op of q){
      try{
        let error;
        if(op.rows && !op.table){
          // formato antigo (antes de existir update/delete na fila): sempre insert em lancamentos
          const clean=op.rows.map(r=>{ const c=Object.assign({},r); delete c._offline; return c; });
          ({error}=await sb.from('lancamentos').upsert(clean,{onConflict:'id'}));
        }else if(op.type==='insert'){
          const clean=op.payload.rows.map(r=>{ const c=Object.assign({},r); delete c._offline; return c; });
          ({error}=await sb.from(op.table).upsert(clean,{onConflict:'id'}));
        }else if(op.type==='update'){
          const base=sb.from(op.table).update(op.payload.patch);
          const val=op.payload.match.val;
          ({error}=Array.isArray(val)?await base.in(op.payload.match.col,val):await base.eq(op.payload.match.col,val));
        }else if(op.type==='delete'){
          const base=sb.from(op.table).delete();
          const val=op.payload.match.val;
          ({error}=Array.isArray(val)?await base.in(op.payload.match.col,val):await base.eq(op.payload.match.col,val));
        }
        if(error){ keep.push(op); lastErr=error.message; } else { sent++; }
      }catch(e){ keep.push(op); lastErr=(e&&e.message)||String(e); }
    }
  }finally{ _flushing=false; }
  setOutbox(keep);
  if(sent>0){ try{ await loadAll(); }catch(e){} render(); toast(sent+' alteração(ões) sincronizada(s) ✅'); }
  if(keep.length && lastErr && !isNetErr({message:lastErr})) toast('Sincronização falhou: '+lastErr);
  updateOfflinePill();
}
function updateOfflinePill(){
  let el=document.getElementById('offlinePill');
  if(!el){ el=document.createElement('div'); el.id='offlinePill'; el.style.cssText='position:fixed;left:0;right:0;top:0;z-index:99999;text-align:center;font-size:12.5px;font-weight:700;padding:6px 10px'; document.body.appendChild(el); }
  const n=outbox().length;
  if(!navigator.onLine){ el.style.display='block'; el.style.background='#b45309'; el.style.color='#fff'; el.textContent = n? ('Offline · '+n+' na fila (salvos no aparelho)') : 'Offline · dá pra lançar, sincroniza depois'; }
  else if(n>0){ el.style.display='block'; el.style.background='#1f7a4d'; el.style.color='#fff'; el.textContent='Sincronizando '+n+'…'; }
  else { el.style.display='none'; }
}

// saldo de uma conta = saldo_inicial + receitas pagas - despesas pagas + transf entrada - transf saida
function saldoConta(contaId){
  const c=contaById(contaId); if(!c) return 0;
  let s=Number(c.saldo_inicial)||0;
  for(const l of DATA.lancamentos){
    if(l.status!=='pago') continue;
    const v=Number(l.valor)||0;
    if(l.tipo==='receita' && l.conta_id===contaId) s+=v;
    else if(l.tipo==='despesa' && l.conta_id===contaId && !l.cartao_id) s-=v;
    else if(l.tipo==='transferencia'){
      if(l.conta_id===contaId && l.user_id===c.user_id) s-=v;
      if(l.conta_destino_id===contaId && l.user_id===c.user_id) s+=v;
    }
  }
  return s;
}
function saldoTotal(){return contasPrincipais().reduce((a,c)=>a+saldoConta(c.id),0);}
// Balanço de fechamento de um mês: saldo + receitas a receber - (contas a pagar + cartão restante + cônjuge a pagar)
function balancoFechamento(d){
  const tot=saldoTotal();
  const b=balancoMes(d);
  const gc=gastoCartaoMes(d);
  const sd=saidasMes(d);
  const gcRest=Math.max(0,gc-(sd.pagFatura||0));
  const faltaConj=Math.max(0,(sd.conjuge||0)-(sd.pagoConjuge||0));
  const base = tot + b.recPend - (sd.aPagar + gcRest + faltaConj);
  return base - descontarInvest(sd.invPend, base);
}

// "Investir só o que sobra": investimento entra na previsão só até o que sobra, nunca deixa negativo. Padrão: ligado.
function investSobra(){ const v=localStorage.getItem('gf_invest_sobra'); return v===null?true:v==='1'; }
function toggleInvestSobra(v){ localStorage.setItem('gf_invest_sobra', v?'1':'0'); salvarPrefs(); render(); }
// quanto do aporte descontar da previsão, dado o "base" (o que sobraria antes do investimento)
function descontarInvest(investBruto, base){
  if(!projInvest()) return 0;                  // não conta investimento na previsão
  const inv=Number(investBruto)||0;
  if(!investSobra()) return inv;               // desconta o aporte cheio (pode ficar negativo)
  return Math.max(0, Math.min(inv, base));     // só o que sobra, nunca negativo
}
// Saldo projetado: no mês atual/passado = saldo real; nos meses FUTUROS = fechamento do mês anterior + receitas - gastos do mês
function saldoProjetado(d){
  const hoje=new Date();
  const ymView=d.getFullYear()*12+d.getMonth();
  const ymHoje=hoje.getFullYear()*12+hoje.getMonth();
  if(ymView<=ymHoje) return saldoTotal(); // mês atual ou passado: saldo real de hoje
  let saldo=balancoFechamento(hoje);
  for(let m=ymHoje+1; m<=ymView; m++){
    const dd=new Date(Math.floor(m/12), m%12, 1);
    const bb=balancoMes(dd);
    const ss=saidasMes(dd);
    const gcart=gastoCartaoMes(dd);
    let saidasTot=ss.pagas+ss.aPagar+gcart+(ss.conjuge||0);
    const baseMes = saldo + bb.rec - saidasTot;         // saldo previsto do mês antes do investimento
    saldo = baseMes - descontarInvest(ss.invest, baseMes); // investe só até o que sobra (nunca negativo)
  }
  return saldo;
}
function saldoPendConta(contaId){
  const c=contaById(contaId); if(!c) return 0;
  const ini=firstOfMonth(viewMonth), fim=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+1,0);
  let s=0;
  for(const l of DATA.lancamentos){
    if(l.status!=='pendente') continue;
    const ld=new Date(l.data+'T00:00:00'); if(ld<ini||ld>fim) continue;
    const v=Number(l.valor)||0;
    if(l.tipo==='receita' && l.conta_id===contaId) s+=v;
    else if(l.tipo==='despesa' && l.conta_id===contaId && !l.cartao_id) s-=v;
    else if(l.tipo==='transferencia'){
      if(l.conta_id===contaId && l.user_id===c.user_id) s-=v;
      if(l.conta_destino_id===contaId && l.user_id===c.user_id) s+=v;
    }
  }
  return s;
}
function saldoPendTotal(){return contasPrincipais().reduce((a,c)=>a+saldoPendConta(c.id),0);}

function _hx(v){return Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0');}
function lighten(hex,amt){const c=hex.replace('#','');const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);return '#'+_hx(r+(255-r)*amt)+_hx(g+(255-g)*amt)+_hx(b+(255-b)*amt);}
function darken(hex,amt){const c=hex.replace('#','');const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);return '#'+_hx(r*(1-amt))+_hx(g*(1-amt))+_hx(b*(1-amt));}
function vivid(hex){
  // aumenta saturação e vivacidade mantendo a matiz (pra barras/gráfico com bom contraste)
  const c=hex.replace('#','');let r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),avg=(mx+mn)/2;
  const f=1.35; // fator de saturação
  r=Math.round(avg+(r-avg)*f); g=Math.round(avg+(g-avg)*f); b=Math.round(avg+(b-avg)*f);
  r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
  return '#'+_hx(r)+_hx(g)+_hx(b);
}
function bestText(hex){
  // retorna '#fff' ou cor escura conforme luminância do fundo (contraste automático)
  const c=hex.replace('#','');
  const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);
  // luminância perceptual
  const L=(0.299*r+0.587*g+0.114*b)/255;
  return L>0.6 ? '#1a1024' : '#ffffff';
}
function applyTema(sc){
  const t=getTema(sc); const s=document.documentElement.style;
  s.setProperty('--emerald',t.emerald); s.setProperty('--emerald-2',lighten(t.emerald,0.18));
  const heroLight = bestText(t.emerald)==='#ffffff'; // fundo escuro → texto claro
  s.setProperty('--on-hero', t.heroText || bestText(t.emerald));
  s.setProperty('--hero-green', t.heroGreen || (heroLight ? lighten(t.green,0.45) : darken(t.green,0.15)));
  s.setProperty('--hero-red', t.heroRed || (heroLight ? lighten(t.red,0.42) : darken(t.red,0.10)));
  s.setProperty('--hero-box', t.heroBox || 'color-mix(in srgb, var(--on-hero) 7%, transparent)');
  s.setProperty('--mint',t.mint); s.setProperty('--coral',t.coral); s.setProperty('--coral-soft',lighten(t.coral,0.75));
  s.setProperty('--green-on', lighten(t.green,0.45)); s.setProperty('--red-on', lighten(t.red,0.42));
  s.setProperty('--green',t.green); s.setProperty('--red',t.red);
  s.setProperty('--bar-rec', vivid(t.green)); s.setProperty('--bar-desp', vivid(t.red));
  s.setProperty('--paper',t.paper); s.setProperty('--card',t.card);
  s.setProperty('--ink',t.ink); s.setProperty('--muted',t.muted);
  s.setProperty('--line',t.line); s.setProperty('--line-2',darken(t.line,0.06));
  if(isDark()){
    s.setProperty('--paper','#0f1613'); s.setProperty('--card','#18211d');
    s.setProperty('--ink','#e8ede9'); s.setProperty('--muted','#8b9a94');
    s.setProperty('--line','#242f2a'); s.setProperty('--line-2','#2f3b35');
    s.setProperty('--input-bg','#1e2823');
    s.setProperty('--coral-soft','rgba(232,101,78,.20)');
    s.setProperty('--shadow','0 1px 2px rgba(0,0,0,.35),0 8px 24px rgba(0,0,0,.4)');
    s.setProperty('--nav-on', lighten(t.mint,0.12));
  }else{
    s.setProperty('--input-bg','#ffffff');
    s.setProperty('--shadow','0 1px 2px rgba(12,28,26,.06),0 8px 24px rgba(12,28,26,.06)');
    s.setProperty('--nav-on', t.emerald);
  }
}

function exportarCSV(){
  const linhas=[['Data','Descrição','Valor','Tipo','Status','Categoria','Conta/Cartão','Competência','De quem']];
  const rows=[...DATA.lancamentos].sort((a,b)=>a.data<b.data?-1:1);
  rows.forEach(l=>{
    const cat=catById(l.categoria_id);
    const fonte=l.cartao_id?(cartaoById(l.cartao_id)||{}).nome:(contaById(l.conta_id)||{}).nome;
    linhas.push([
      l.data||'', (l.descricao||'').replace(/;/g,','), String(Number(l.valor||0)).replace('.',','),
      l.tipo||'', l.status||'', cat?cat.nome:'', fonte||'', l.competencia||'', apelidoDe(l.user_id)||''
    ]);
  });
  const csv='\ufeff'+linhas.map(r=>r.join(';')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='gestor-financeiro-'+ymd(new Date())+'.csv';
  document.body.appendChild(a); a.click(); a.remove();
  vibra(); toast('Planilha exportada 📊 ('+rows.length+' lançamentos)');
}
async function baixarBackup(){

    const meu=x=>x.user_id===USER.id;

      app:'Gestor Financeiro', versao:APP_VER, gerado_em:new Date().toISOString(), user_id:USER.id,

      lancamentos:DATA.lancamentos.filter(meu)
    };
    const txt=JSON.stringify(dump,null,2);
    const nome='gestor-backup-'+ymd(new Date())+'.json';
    const blob=new Blob([txt],{type:'application/json'});
    // tenta compartilhar arquivo (melhor no iPhone → salva em Arquivos/Drive)
    try{
      const file=new File([blob],nome,{type:'application/json'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:'Backup Gestor'});
        toast('Backup pronto — salve em Arquivos/Drive ✅'); return;
      }
    }catch(e){ /* segue pro download */ }
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=nome;

    setTimeout(()=>URL.revokeObjectURL(url),3000);

    <input type="color" value="${_temaWork[key]}" oninput="setTemaCor('${key}',this.value)" class="cor-in"></div>`;

  Object.keys(TEMA_PRESETS).forEach(nome=>{const p=TEMA_PRESETS[nome];
    html+=`<button class="tema-chip" onclick="aplicarPreset('${nome}')"><span class="sw" style="background:${p.emerald}"></span><span class="sw" style="background:${p.mint}"></span><span class="sw" style="background:${p.coral}"></span>${nome}</button>`;});
  html+=`</div></div>`;
  html+=`<div class="note" style="margin:14px 2px 6px">Ajuste cada cor</div><div class="card">

    ${row('green','Receita')}${row('red','Despesa')}${row('paper','Fundo do app')}${row('card','Cartões / caixas')}

function editarTemaScope(k){_temaScope=k;renderTema();}
function setTemaCor(key,val){

  setTema(_temaScope,_temaWork);applyTema(_temaScope);
}
function aplicarPreset(nome){_temaWork=Object.assign({},TEMA_PRESETS[nome]);setTema(_temaScope,_temaWork);applyTema(_temaScope);renderTema();toast('Tema aplicado');}

async function doSignup(){
  const nome=$('suNome').value.trim(), email=$('suEmail').value.trim(), pass=$('suPass').value;
  const fone=$('suFone')?$('suFone').value.trim():'', cidade=$('suCidade')?$('suCidade').value.trim():'', uf=$('suUF')?$('suUF').value.trim().toUpperCase():'';
  if(!nome||!email||pass.length<6){authErr('Preencha nome, e-mail e senha (mín. 6 caracteres).');return;}
  if(!fone){authErr('Informe seu WhatsApp/celular.');return;}
  if(!cidade||!uf){authErr('Informe sua cidade e estado (UF).');return;}
  if($('suAceite') && !$('suAceite').checked){authErr('Para criar a conta, você precisa aceitar os Termos de Uso e a Política de Privacidade.');return;}
  const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{nome,fone,cidade,uf}}});
  if(error){authErr(traduzErro(error.message));return;}
  window._signupExtra={fone,cidade,uf};
  if(data.session){ rememberEmail(email); _promptAfterSignup=true; await afterLogin(); }
  else { authOk('Conta criada! Confirme o e-mail (se pedido) e faça login.'); showLogin(); }
}
async function doLogin(){
  const email=$('liEmail').value.trim(), pass=$('liPass').value;
  if(!email||!pass){authErr('Informe e-mail e senha.');return;}
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){authErr(traduzErro(error.message));return;}
  rememberEmail(email);
  if($('liSavePass')&&$('liSavePass').checked) savePassFor(email,pass);
  else { try{localStorage.removeItem('savedPass:'+email);}catch(e){} }
  await afterLogin();
}
async function doLogout(){ try{ await sb.auth.signOut(); }catch(e){} finally{ try{ Object.keys(localStorage).forEach(k=>{ if(k.startsWith('sb-')&&k.indexOf('auth')>=0) localStorage.removeItem(k); }); }catch(e){} location.reload(); } }
function traduzErro(m){
  if(/Invalid login/i.test(m)) return 'E-mail ou senha incorretos.';
  if(/already registered/i.test(m)) return 'Esse e-mail já tem conta. Faça login.';
  if(/at least 6/i.test(m)) return 'A senha precisa ter ao menos 6 caracteres.';
  return m;
}

let _wtSteps=[], _wtIdx=0, _wtWatch=null;
function wtKey(){ return 'gf_wt_done_'+(USER?USER.id:'x'); }
function wtDone(){ return localStorage.getItem(wtKey())==='1'; }
function iniciarWalkthrough(){
  // define os passos: cada um aponta um elemento e sabe quando foi concluído
  _wtSteps=[
    { alvo:()=>document.querySelector('[data-tab="contas"]'), titulo:'1. Cadastre suas contas',
      texto:'Toque aqui em "Contas" para adicionar seus bancos e carteiras (ex: Nubank, Itaú, Caixa, Dinheiro).',
      feito:()=>DATA.contas.filter(c=>c.user_id===USER.id&&!c.arquivada).length>=1 },
    { alvo:()=>document.querySelector('[data-tab="contas"]'), titulo:'2. Informe o saldo atual',
      texto:'Ao criar a conta, coloque o saldo que você tem nela hoje. É isso que faz o app calcular certo.',
      feito:()=>DATA.contas.filter(c=>c.user_id===USER.id&&!c.arquivada).length>=1, auto:true },
    { alvo:()=>document.getElementById('fab'), titulo:'3. Cadastre um cartão',
      texto:'Toque no "+" e escolha Cartão. Informe o dia de fechamento e de vencimento da fatura.',
      feito:()=>DATA.cartoes.filter(c=>c.user_id===USER.id&&!c.arquivado).length>=1, skip:true },
    { alvo:()=>document.getElementById('fab'), titulo:'4. Informe sua receita fixa',
      texto:'Toque no "+" e registre seu salário ou entrada de dinheiro do mês.',
      feito:()=>DATA.lancamentos.filter(l=>l.user_id===USER.id&&l.tipo==='receita').length>=1 },
    { alvo:()=>document.getElementById('fab'), titulo:'5. Primeira compra no cartão',
      texto:'Toque no "+", escolha Despesa e pague com Cartão. Assim você vê como a fatura funciona.',
      feito:()=>DATA.lancamentos.filter(l=>l.user_id===USER.id&&l.tipo==='despesa'&&l.cartao_id).length>=1, skip:true },
    { alvo:()=>document.getElementById('fab'), titulo:'6. Primeira despesa no débito',
      texto:'Por fim, registre um gasto pago no débito/dinheiro. Pronto, você já domina o app! 🎉',
      feito:()=>DATA.lancamentos.filter(l=>l.user_id===USER.id&&l.tipo==='despesa'&&!l.cartao_id).length>=1 },
  ];
  _wtIdx=0;
  // pula passos já concluídos
  while(_wtIdx<_wtSteps.length && _wtSteps[_wtIdx].feito()) _wtIdx++;
  if(_wtIdx>=_wtSteps.length){ finalizarWalkthrough(); return; }
  criarWtOverlay();
  mostrarWtPasso();
  // vigia a conclusão de cada passo
  if(_wtWatch) clearInterval(_wtWatch);
  _wtWatch=setInterval(()=>{
    // se o overlay sumiu, para o vigia (evita loop/piscar)
    if(!document.getElementById('wtOverlay')){ clearInterval(_wtWatch); _wtWatch=null; return; }
    if(!_wtSteps[_wtIdx]) return;
    if(_wtSteps[_wtIdx].feito()){ avancarWt(); }
  }, 900);
}
function criarWtOverlay(){
  if(document.getElementById('wtOverlay')) return;
  const ov=document.createElement('div'); ov.id='wtOverlay';
  ov.innerHTML=`<div class="wt-ring" id="wtRing"></div><div class="wt-baloon" id="wtBaloon"></div>`;
  document.body.appendChild(ov);
}
function mostrarWtPasso(){
  const s=_wtSteps[_wtIdx]; if(!s){ finalizarWalkthrough(); return; }
  const el=s.alvo&&s.alvo();
  const ring=document.getElementById('wtRing'), bal=document.getElementById('wtBaloon');
  if(!ring||!bal) return;
  // posiciona o anel sobre o elemento
  if(el){
    const r=el.getBoundingClientRect();
    const pad=6;
    ring.style.display='block';
    ring.style.left=(r.left-pad)+'px'; ring.style.top=(r.top-pad)+'px';
    ring.style.width=(r.width+pad*2)+'px'; ring.style.height=(r.height+pad*2)+'px';
  } else { ring.style.display='none'; }
  // conteúdo do balão
  const ultimo=_wtIdx===_wtSteps.length-1;
  bal.innerHTML=`<div class="wt-step">PASSO ${_wtIdx+1} DE ${_wtSteps.length}</div>
    <h4>${s.titulo}</h4><p>${s.texto}</p>
    <div class="wt-btns">
      <button class="wt-skip" onclick="pularWalkthrough()">Pular tutorial</button>
      ${s.skip?`<button class="wt-skip" onclick="avancarWt()">Pular passo ›</button>`:`<span></span>`}
    </div>`;
  // posiciona o balão perto do elemento (acima se estiver embaixo, abaixo se estiver em cima)
  const br=el?el.getBoundingClientRect():{top:window.innerHeight/2,left:20,bottom:window.innerHeight/2,width:0};
  bal.style.visibility='hidden'; bal.style.display='block';
  setTimeout(()=>{
    const bh=bal.offsetHeight, bw=bal.offsetWidth;
    let top, left;
    if(br.top > window.innerHeight/2){ top=br.top-bh-16; } else { top=br.bottom+16; }
    left=Math.min(Math.max(12, br.left+br.width/2-bw/2), window.innerWidth-bw-12);
    top=Math.max(12, Math.min(top, window.innerHeight-bh-12));
    bal.style.top=top+'px'; bal.style.left=left+'px'; bal.style.visibility='visible';
  },20);
}
function avancarWt(){
  _wtIdx++;
  while(_wtIdx<_wtSteps.length && _wtSteps[_wtIdx].feito() && !_wtSteps[_wtIdx].auto) _wtIdx++;
  if(_wtIdx>=_wtSteps.length){ finalizarWalkthrough(); return; }
  mostrarWtPasso();
}

  localStorage.setItem(wtKey(),'1');

function finalizarWalkthrough(){

function licCache(){try{return JSON.parse(localStorage.getItem('gf_lic')||'null')}catch(e){return null}}

function licStatus(l){
  if(!l) return {ok:true,tipo:'novo'};
  const hoje=ymd(new Date());
  if(l.status==='bloqueado') return {ok:false,motivo:'bloqueado'};
  if(l.status==='liberado') return {ok:true,tipo:'liberado'};
  if(l.status==='pago'){ if(l.pago_ate && l.pago_ate>=hoje) return {ok:true,tipo:'pago',ate:l.pago_ate}; return {ok:false,motivo:'pagamento vencido'}; }
  if(l.teste_ate && l.teste_ate>=hoje){ const dias=Math.round((new Date(l.teste_ate+'T00:00:00')-new Date(hoje+'T00:00:00'))/86400000); return {ok:true,tipo:'teste',dias}; }
  return {ok:false,motivo:'teste encerrado'};
}
async function checarLicenca(isLogin){

    const fone=(window._signupExtra&&window._signupExtra.fone)||md.fone||'';

      // se a função nova ainda não foi criada no banco, usa a antiga
      await sb.rpc('registrar_acesso',{p_email:USER.email||'',p_nome:nome,p_minutos:0,p_login:!!isLogin});
    }
    window._signupExtra=null;

// ---- NOTIFICAÇÕES (tempo real do parceiro) ----
let _rtChannel=null, _rtTimer=null, _rtPendingWhileModal=false, _rtSyncing=false;
// Sync total em tempo real (multi-aparelho): recarrega+re-renderiza com debounce,
// pulando enquanto tiver modal/sheet aberto (não interrompe edição). Retoma ao fechar.
function _rtAgendarSync(){
  if(document.body.classList.contains('modal-open')){ _rtPendingWhileModal=true; return; }
  clearTimeout(_rtTimer);
  _rtTimer=setTimeout(async()=>{
    if(document.body.classList.contains('modal-open')){ _rtPendingWhileModal=true; return; }
    if(_rtSyncing || !navigator.onLine || _demoNovo) return;
    _rtSyncing=true;
    try{ await loadAll(); if(['home','trans','relatorios','contas','cartoes'].includes(tab)) render(); }
    catch(e){}
    finally{ _rtSyncing=false; }
  }, 700);
}
function _rtResumeIfPending(){ if(_rtPendingWhileModal){ _rtPendingWhileModal=false; _rtAgendarSync(); } }
function iniciarRealtime(){
  try{ if(_rtChannel) sb.removeChannel(_rtChannel); }catch(e){}
  const tabelas=['lancamentos','contas','cartoes','categorias','orcamentos','investimentos','compartilhamentos'];
  let ch=sb.channel('gf-sync-rt');
  tabelas.forEach(t=>{
    ch=ch.on('postgres_changes',{event:'*',schema:'public',table:t},payload=>{
      // aviso de parceiro: só quando o parceiro INSERE um lançamento
      if(t==='lancamentos' && payload.eventType==='INSERT'){
        const r=payload.new;
        if(r && r.user_id!==USER.id && MYPARTNERS.some(p=>p.owner_id===r.user_id)){
          if(!DATA.lancamentos.find(x=>x.id===r.id)) DATA.lancamentos.unshift(r);
          const sinal=r.tipo==='receita'?'+':(r.tipo==='despesa'?'-':'');
          if(r.grupo_id){
            // parcelas chegam em rajada: agrupa e mostra UM aviso só
            window._rtGrupoBuf=window._rtGrupoBuf||{};
            const buf=window._rtGrupoBuf;
            if(buf[r.grupo_id]){ buf[r.grupo_id].n++; }
            else{
              buf[r.grupo_id]={n:1};
              setTimeout(()=>{
                const q=(buf[r.grupo_id]&&buf[r.grupo_id].n)||1; delete buf[r.grupo_id];
                toast('🔔 '+apelidoDe(r.user_id)+': '+sinal+brl(Number(r.valor))+(q>1?' ('+q+'x parcelado)':''));
                updateBell();
              }, 1000);
            }
          }else{
            toast('🔔 '+apelidoDe(r.user_id)+': '+sinal+brl(Number(r.valor)));
            updateBell();
          }
        }
      }
      _rtAgendarSync();
    });
  });
  _rtChannel=ch.subscribe();
}

function partnerLancs(){
  return DATA.lancamentos
    .filter(l=> l.user_id!==USER.id && MYPARTNERS.some(p=>p.owner_id===l.user_id))
    .sort((a,b)=> (b.criado_em||b.data) < (a.criado_em||a.data) ? -1 : 1);
}
// agrupa parcelas/recorrências do parceiro numa entrada só (grupo_id)
function partnerLancsAgrupados(){
  const out=[], porGrupo={};
  partnerLancs().forEach(l=>{
    if(l.grupo_id){
      const g=porGrupo[l.grupo_id];
      if(g){
        g._qtd++; g._total+=Number(l.valor)||0;
        if((l.parcela||999)<(g._rep.parcela||999)) g._rep=l;
        return;
      }
      const novo={_rep:l,_qtd:1,_total:Number(l.valor)||0};
      porGrupo[l.grupo_id]=novo; out.push(novo);
    } else out.push({_rep:l,_qtd:1,_total:Number(l.valor)||0});
  });
  return out;
}
function updateBell(){
  const badge=$('bellBadge');
  if(badge){
    if(!MYPARTNERS.length){ badge.classList.add('hidden'); }
    else {
      const seen=notifSeenAt();
      const n=partnerLancsAgrupados().filter(g=> ((g._rep.criado_em||g._rep.data) > seen)).length;
      if(n>0){ badge.textContent=n>9?'9+':n; badge.classList.remove('hidden'); }
      else badge.classList.add('hidden');
    }
  }
  updateCliBadge();
}
async function updateCliBadge(){
  const btn=$('cliBtn'), badge=$('cliBadge');
  if(!btn||!badge) return;
  if(!USER || USER.id!==ADMIN_ID){ btn.classList.add('hidden'); return; }
  btn.classList.remove('hidden');
  // só busca do servidor no máximo 1x a cada 60s (evita chamadas repetidas que causam piscar)
  const agora=Date.now();
  if(window._cliBadgeCache && (agora-window._cliBadgeCache.t)<60000){
    aplicarCliBadge(window._cliBadgeCache.total, badge); return;
  }
  try{
    const {data}=await sb.rpc('admin_clientes');
    if(!data) return;
    const outros=data.filter(c=>c.user_id!==ADMIN_ID);
    window._totalClientes=outros.length;
    window._cliBadgeCache={t:agora, total:outros.length};
    aplicarCliBadge(outros.length, badge);
  }catch(e){}
}
function aplicarCliBadge(total, badge){
  const visto=parseInt(localStorage.getItem('gf_cli_seen')||'0');
  const novos=Math.max(0, total - visto);
  if(novos>0){ badge.textContent=novos>9?'9+':novos; badge.classList.remove('hidden'); }
  else badge.classList.add('hidden');
}

async function loadAll(){
  if(_demoNovo) return; // no modo cliente novo, não recarrega dados reais
  let c1,c2,c3,c4;
  try{
    [c1,c2,c3,c4]=await Promise.all([
      sb.from('contas').select('*').order('criado_em'),
      sb.from('categorias').select('*').order('nome'),
      sb.from('cartoes').select('*').order('criado_em'),
      sb.from('lancamentos').select('*').order('data',{ascending:false}),
    ]);
  }catch(e){
    if((isNetErr(e)||!navigator.onLine) && loadCache()){ updateOfflinePill(); return; }
    throw e;
  }
  if(c1.error||c2.error||c3.error||c4.error){
    const e=c1.error||c2.error||c3.error||c4.error;
    if((isNetErr(e)||!navigator.onLine) && loadCache()){ updateOfflinePill(); return; }
    $('content').innerHTML='<div class="card"><b>Erro ao carregar dados.</b><div class="note">'+esc(e.message)+'<br><br>Verifique se você rodou o SQL das tabelas no Supabase.</div></div>';
    throw e;
  }
  DATA.contas=c1.data; DATA.categorias=c2.data; DATA.cartoes=c3.data; DATA.lancamentos=c4.data;
  const o=await sb.from('orcamentos').select('*');
  DATA.orcamentos = o.error ? [] : o.data;
  const inv=await sb.from('investimentos').select('*');
  DATA.investimentos = inv.error ? [] : inv.data;
  saveCache(); updateOfflinePill();
  const sh=await sb.from('compartilhamentos').select('*');
  if(sh.error){
    // erro passageiro (ex: instabilidade do Supabase): NÃO some com a Carol — mantém o que já tinha ou o cache
    if(!MYPARTNERS.length){
      try{ const c=JSON.parse(localStorage.getItem('gf_partners')||'null'); if(c){ MYPARTNERS=c.partners||[]; MYSHARES=c.shares||[]; } }catch(e){}
    }

  }

function atualizarAnelIA(){
  const ring=$('iaRingFill'); if(!ring) return;
  const l=window._aiLimite;
  const total=163.36; // circunferência (2*PI*26)
  if(!l || l.limite_dia==null || l.limite_dia>=9999){
    // sem limite (admin) ou sem dado: anel cheio laranja
    ring.style.strokeDashoffset='0'; ring.style.stroke='#ff8a1a';
    return;
  }
  const usados=parseInt(l.usos_hoje)||0, lim=parseInt(l.limite_dia)||40;
  const rest=Math.max(0,lim-usados);
  const frac=rest/lim; // 1 = cheio, 0 = vazio
  ring.style.strokeDashoffset=String(total*(1-frac));
  ring.style.stroke = rest<=8 ? '#ff4d4d' : '#ff8a1a';
}
function renderLimiteIA(){
  const l=window._aiLimite; if(!l) return '';
  // novo formato: mensagens diárias (usos_hoje / limite_dia)
  if(l.limite_dia!=null){
    const usados=parseInt(l.usos_hoje)||0, lim=parseInt(l.limite_dia)||40;
    const rest=Math.max(0,lim-usados);
    const pct=lim?Math.max(0,Math.min(100,rest/lim*100)):100;
    const critico=rest<=8;
    return `<div style="padding:10px 0 2px;border-top:1px solid var(--line-2);margin-top:6px">
      <div class="s" style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span>Mensagens de hoje</span><span style="color:${critico?'var(--coral)':'var(--muted)'}">${rest} de ${lim} restantes</span>
      </div>
      <div class="prog"><div class="progfill" style="width:${pct}%;background:${critico?'var(--coral)':'var(--mint)'}"></div></div>
    </div>`;
  }
  // formato antigo (headers da API) — mantido por compatibilidade
  if(l.requests_restantes==null) return '';
  const rest=parseInt(l.requests_restantes), lim=parseInt(l.requests_limite)||rest;
  const pct=lim?Math.max(0,Math.min(100,rest/lim*100)):100;
  const critico=pct<20;
  let resetTxt='';
  if(l.requests_reset){ const d=new Date(l.requests_reset); if(!isNaN(d)) resetTxt=' · renova '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
  return `<div style="padding:10px 0 2px;border-top:1px solid var(--line-2);margin-top:6px">
    <div class="s" style="display:flex;justify-content:space-between;margin-bottom:5px">
      <span>Uso da IA (janela atual)</span><span style="color:${critico?'var(--coral)':'var(--muted)'}">${rest}/${lim} pedidos${resetTxt}</span>
    </div>
    <div class="prog"><div class="progfill" style="width:${pct}%;background:${critico?'var(--coral)':'var(--mint)'}"></div></div>
  </div>`;
}

async function aiEnviar(){
  const inp=$('aiInput'); const txt=(inp.value||'').trim(); if(!txt||window._aiPend)return;
  inp.value='';
  _aiMsgs.push({role:'user',content:txt});
  window._aiPend=true; window._aiProposta=null; window._aiPropExclusao=null; renderAssistente();
  try{
    const {data:{session}}=await sb.auth.getSession();
    const r=await fetch(SUPABASE_URL+'/functions/v1/ai-chat',{
      method:'POST',
      headers:{'content-type':'application/json','authorization':'Bearer '+(session?session.access_token:SUPABASE_KEY),'apikey':SUPABASE_KEY},
      body:JSON.stringify({mensagens:_aiMsgs.slice(-10),resumo:resumoParaIA(),pode_excluir:iaPodeExcluir()})
    });
    const d=await r.json();
    if(!d.ok) throw new Error(d.erro||'Falha na função');
    if(d.limite){ window._aiLimite=d.limite; try{atualizarAnelIA();}catch(e){} }
    let obj=null;
    try{ obj=JSON.parse(String(d.texto||'').replace(/```json|```/g,'').trim()); }catch(e){}
    if(obj && obj.acao==='criar_lancamento'){
      window._aiProposta={tipo:obj.tipo==='receita'?'receita':'despesa',descricao:obj.descricao||'Lançamento',valor:+obj.valor||0,data:obj.data||ymd(new Date()),conta_nome:obj.conta_nome||'',categoria_nome:obj.categoria_nome||''};
      _aiMsgs.push({role:'assistant',content:'Preparei o lançamento abaixo — confirma?'});
    }else if(obj && obj.acao==='excluir_lancamento'){
      if(!iaPodeExcluir()){
        _aiMsgs.push({role:'assistant',content:'Exclusão por voz está desligada. Ative em "IA pode excluir lançamentos" aqui em cima.'});
      }else{
        const norm=s=>normDesc(s||'');
        const alvo=DATA.lancamentos.filter(l=>l.user_id===USER.id)
          .filter(l=> !obj.data || l.data===obj.data)
          .filter(l=> obj.valor==null || obj.valor==='' || Math.abs(Number(l.valor)-Number(obj.valor))<0.005)
          .filter(l=> !obj.descricao || norm(l.descricao).includes(norm(obj.descricao)) || norm(obj.descricao).includes(norm(l.descricao)))
          .sort((a,b)=> (b.criado_em||'')<(a.criado_em||'')?-1:1)[0];
        if(!alvo){
          _aiMsgs.push({role:'assistant',content:'Não achei um lançamento seu que bata com isso. Confere a descrição/data?'});
        }else{
          window._aiPropExclusao=alvo;
          _aiMsgs.push({role:'assistant',content:'Achei esse lançamento — confirma a exclusão?'});
        }
      }
    }else{
      _aiMsgs.push({role:'assistant',content:(obj&&obj.texto)||d.texto||'Não entendi, tenta de novo?'});
    }
  }catch(e){
    const msg=String(e.message||e);
    if(msg.includes('Limite diário')) _aiMsgs.push({role:'assistant',content:'🕐 '+msg});
    else if(msg.toLowerCase().includes('não autenticado')||msg.includes('401')) _aiMsgs.push({role:'assistant',content:'Sua sessão expirou — sai e entra de novo no app pra usar o assistente.'});
    else _aiMsgs.push({role:'assistant',content:'Erro: '+msg+'. Confere se a função ai-chat está publicada.'});
  }
  window._aiPend=false; renderAssistente();
}
