<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d3b34">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gestor">
<title>Gestor Soluções · Financeiro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#0c1c1a; --paper:#f4f1ea; --card:#ffffff;
  --emerald:#0d3b34; --emerald-2:#15564c; --mint:#1f9d8a;
  --coral:#e8654e; --coral-soft:#fbe4de;
  --green:#1f9d6b; --red:#d6473a; --blue:#3b6fd6;
  --muted:#6f7d79; --line:#e6e1d6; --line-2:#d7d0c2;
  --shadow:0 1px 2px rgba(12,28,26,.06),0 8px 24px rgba(12,28,26,.06);
  --radius:18px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;overflow-x:hidden;width:100%;max-width:100%;overscroll-behavior-x:none}
*{box-sizing:border-box}
body{
  font-family:var(--font); background:var(--paper); color:var(--ink);
  font-size:15px; line-height:1.4; -webkit-font-smoothing:antialiased;
  padding-bottom:env(safe-area-inset-bottom);
}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;font-size:16px}
.hidden{display:none !important}

/* ---------- AUTH ---------- */
#auth{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:28px;
  background:radial-gradient(120% 80% at 50% 18%, #0a1230 0%, #020111 60%)}
.brand{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:22px;margin-top:-8px}
.brand .logo-img{width:min(78vw,300px);height:auto;display:block;margin-bottom:-6px}
.brand .tag{margin:0;color:#8fa0c8;font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase}
.auth-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;width:100%;max-width:380px}
.auth-card h2{margin:0 0 4px;font-size:19px}
.auth-card .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;max-width:100%;min-width:0;padding:13px 14px;border:1.5px solid var(--line-2);border-radius:12px;background:#fff;outline:none;font-family:inherit;font-size:15px}
body.modal-open{overflow:hidden}
.field select{text-overflow:ellipsis}
.field input:focus,.field select:focus{border-color:var(--mint)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:12px;
  background:var(--emerald);color:#fff;font-weight:700;font-size:15px;transition:filter .15s}
.btn:active{filter:brightness(.92)}
.btn.coral{background:var(--coral)}
.btn.ghost{background:transparent;color:var(--emerald);font-weight:600}
.btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:10px}
.btn.outline{background:#fff;border:1.5px solid var(--line-2);color:var(--ink)}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
.auth-switch b{color:var(--emerald);cursor:pointer}
.msg{font-size:13px;padding:10px 12px;border-radius:10px;margin-bottom:14px}
.msg.err{background:#fdeceb;color:#b5392c}
.msg.ok{background:#e7f6ee;color:#1a7a4f}

/* ---------- APP SHELL ---------- */
#app{min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden;width:100%;max-width:100%}
.topbar{position:sticky;top:0;z-index:30;background:var(--emerald);color:#fff;
  padding:calc(env(safe-area-inset-top) + 14px) 16px 14px}
.topbar .row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.topbar .hi{font-size:13px;opacity:.8}
.topbar .hi b{display:block;font-size:16px;font-weight:700;opacity:1}
.iconbtn{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.14);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:18px}
.seg{display:flex;background:rgba(255,255,255,.12);border-radius:12px;padding:3px;gap:3px}
.segcap{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:700;margin:10px 0 4px 4px}
.seg-sec{background:rgba(255,255,255,.07)}
.seg-sec button{font-size:13px;padding:7px}
.seg button{flex:1;padding:8px;border-radius:9px;color:rgba(255,255,255,.75);font-weight:600;font-size:13px}
.seg button.on{background:#fff;color:var(--emerald)}

.content{flex:1;padding:16px;padding-bottom:96px;max-width:560px;width:100%;margin:0 auto;overflow-x:hidden}
.page-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:4px 2px 12px}

/* cards */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.hero{background:linear-gradient(155deg,var(--emerald),var(--emerald-2));color:#fff}
.hero .lab{font-size:12px;opacity:.78;text-transform:uppercase;letter-spacing:.6px}
.hero .big{font-size:32px;font-weight:800;letter-spacing:-.5px;margin:6px 0 2px}
.hero .big.neg{color:#ffd2c9}
.balrow{display:flex;gap:12px;margin-top:16px}
.balrow .b{flex:1;background:rgba(255,255,255,.1);border-radius:12px;padding:11px 12px}
.balrow .b .l{font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:.4px}
.balrow .b .v{font-size:16px;font-weight:700;margin-top:2px}
.balrow .b .v.g{color:#a8f0c8}.balrow .b .v.r{color:#ffc2b8}

.sec-head{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 10px}
.sec-head h3{margin:0;font-size:15px;font-weight:700}
.sec-head a{font-size:13px;color:var(--mint);font-weight:600;cursor:pointer}

/* list rows */
.lrow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);cursor:pointer}
.lrow:last-child{border-bottom:none}
.dot{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:var(--coral-soft)}
.dot svg{display:block}
.limbar{height:6px;border-radius:6px;background:#e9e4dc;overflow:hidden;margin-top:10px}
.limbar-fill{height:100%;border-radius:6px;background:var(--mint);transition:width .3s}
.lnk{color:var(--emerald);font-weight:700;font-size:13px}
.pend-alert{display:flex;align-items:center;gap:12px;margin-bottom:14px;cursor:pointer}
.pend-g{font-size:12px;font-weight:700;color:var(--muted);text-transform:capitalize;padding:10px 2px 4px}
.pend-row{cursor:pointer;border-radius:10px}
.pend-row.sel{background:#fdecec}
.pend-chk{width:24px;height:24px;border-radius:50%;border:2px solid var(--line-2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;flex-shrink:0;margin-left:8px}
.pend-chk.on{background:var(--coral);border-color:var(--coral)}
.lchk{width:24px;height:24px;border-radius:7px;border:2px solid var(--line-2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;flex-shrink:0;margin-left:10px;background:#fff}
.lchk.on{background:var(--mint);border-color:var(--mint)}
.b.tap{cursor:pointer;transition:transform .1s}
.b.tap:active{transform:scale(.97)}
.tfilter{display:flex;gap:8px;margin-bottom:12px}
.tfilter button{flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--line-2);background:#fff;font-weight:700;font-size:13px;color:var(--muted)}
.tfilter button.on{background:var(--emerald);color:#fff;border-color:var(--emerald)}
.pendbar{position:fixed;left:0;right:0;bottom:calc(env(safe-area-inset-bottom) + 60px);z-index:25;width:calc(100% - 24px);max-width:536px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;border:1px solid var(--line-2);box-shadow:0 -4px 20px rgba(0,0,0,.12);border-radius:16px;padding:10px 14px}
.lrow .mid{flex:1;min-width:0}
.lrow .mid .t{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lrow .mid .s{font-size:12px;color:var(--muted);margin-top:1px}
.lrow .amt{font-weight:700;font-size:15px;text-align:right;white-space:nowrap}
.amt.g{color:var(--green)}.amt.r{color:var(--red)}.amt.b{color:var(--blue)}
.pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px;vertical-align:middle}
.pill.pend{background:#fdf0d9;color:#a9701a}
.pill.neg{background:#eef1ef;color:var(--muted)}
.pill.peso{background:#e9f3f1;color:var(--emerald-2)}

.empty{text-align:center;padding:34px 18px;color:var(--muted)}
.empty .ico{font-size:34px;margin-bottom:8px}
.empty p{margin:0 0 14px;font-size:14px}

/* tabbar */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;background:#fff;border-top:1px solid var(--line);
  display:flex;padding:6px 6px calc(env(safe-area-inset-bottom) + 6px);max-width:560px;margin:0 auto}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0;color:var(--muted);font-size:10.5px;font-weight:600}
.tabbar button .i{font-size:20px;line-height:1}
.tabbar button.on{color:var(--emerald)}
.fab{position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom) + 74px);z-index:31;
  width:56px;height:56px;border-radius:18px;background:var(--coral);color:#fff;font-size:28px;
  display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(232,101,78,.45)}

/* sheet / modal */
.overlay{position:fixed;inset:0;z-index:40;background:rgba(12,28,26,.45);display:flex;align-items:flex-end;justify-content:center;touch-action:none}
.sheet{background:var(--paper);width:100%;max-width:560px;border-radius:22px 22px 0 0;max-height:92dvh;display:flex;flex-direction:column;overflow:hidden;animation:up .22s ease}
.sheet-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:0 18px calc(env(safe-area-inset-bottom) + 24px)}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
.grip{width:40px;height:4px;border-radius:4px;background:var(--line-2);margin:8px auto 6px}
.sheet h2{font-size:18px;margin:6px 2px 16px}
.typetabs{display:flex;gap:8px;margin-bottom:16px}
.typetabs button{flex:1;padding:12px 8px;border-radius:11px;background:#fff;border:1.5px solid var(--line-2);font-weight:700;font-size:13.5px;color:var(--muted)}
.typetabs button.on.rec{background:var(--green);border-color:var(--green);color:#fff}
.typetabs button.on.desp{background:var(--red);border-color:var(--red);color:#fff}
.typetabs button.on.transf{background:var(--blue);border-color:var(--blue);color:#fff}
.row2{display:flex;gap:10px}.row2>*{flex:1}
.seg2{display:flex;background:#fff;border:1.5px solid var(--line-2);border-radius:13px;padding:3px;gap:4px}
.seg2 button{flex:1;padding:11px 8px;border-radius:10px;font-weight:700;font-size:13.5px;color:var(--muted)}
.seg2 button.on{background:var(--emerald);color:#fff}
.chiprow{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chip{padding:8px 13px;border-radius:20px;background:#fff;border:1.5px solid var(--line-2);font-size:13px;font-weight:600;color:var(--muted)}
.chip.on{background:var(--emerald);color:#fff;border-color:var(--emerald)}
.note{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}
.danger{color:var(--red);font-weight:600}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 90px);left:50%;transform:translateX(-50%);z-index:60;
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:30px;font-size:13px;font-weight:600;box-shadow:var(--shadow);
  opacity:0;transition:opacity .2s, transform .2s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
.loading{display:flex;align-items:center;justify-content:center;height:60dvh;color:var(--muted)}
.spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--emerald);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.monthnav{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:14px;padding:8px 6px;box-shadow:var(--shadow);margin-bottom:14px}
.monthnav button{width:36px;height:36px;border-radius:10px;font-size:18px;color:var(--emerald)}
.monthnav .m{font-weight:700;font-size:14px}
.facard{background:linear-gradient(155deg,#2a2440,#3d3460);color:#fff}

/* atalhos rápidos */
.quickrow{display:flex;gap:10px;margin-bottom:14px}
.quick{flex:1;background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:12px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--ink)}
.quick .qi{font-size:22px;margin-bottom:4px}
/* barra receita x despesa no hero */
.rdbar{display:flex;height:8px;border-radius:6px;overflow:hidden;margin:16px 0 4px;background:rgba(255,255,255,.18)}
.rdrec{background:#a8f0c8}.rddesp{background:#ffb4a8}
/* progresso */
.prog{height:9px;border-radius:6px;background:var(--line);overflow:hidden}
.progfill{height:100%;border-radius:6px;transition:width .3s}
/* barras 6 meses */
.bars{display:flex;align-items:flex-end;justify-content:space-between;height:110px;gap:6px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.barpair{display:flex;gap:3px;align-items:flex-end;height:90px}
.bar{width:11px;border-radius:4px 4px 0 0;min-height:2px}
.bar.rec{background:var(--green)}.bar.desp{background:var(--red)}
.barlab{font-size:10px;color:var(--muted);margin-top:6px;text-transform:capitalize}
.legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:12px;color:var(--muted)}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
/* subhead com voltar */
.subhead{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 12px;font-size:15px}
.subhead span{color:var(--mint);font-weight:600;cursor:pointer;min-width:64px}
.subhead b{font-size:16px}
.badge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 4px;border-radius:10px;background:var(--coral);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--emerald)}
.installbanner{position:fixed;left:10px;right:10px;bottom:calc(env(safe-area-inset-bottom) + 78px);z-index:35;max-width:540px;margin:0 auto;
  background:var(--ink);color:#fff;border-radius:16px;padding:12px 12px 12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.installbanner .ib-ic{font-size:24px}
.installbanner .ib-txt{flex:1;line-height:1.25}
.installbanner .ib-txt b{display:block;font-size:14px}
.installbanner .ib-txt span{font-size:12px;opacity:.75}
.installbanner .ib-btn{background:var(--mint);color:#fff;font-weight:700;padding:9px 14px;border-radius:10px;font-size:13px}
.installbanner .ib-x{color:rgba(255,255,255,.6);font-size:20px;width:26px}
.istep{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line)}
.istep:last-child{border-bottom:none}
.istep .n{width:26px;height:26px;border-radius:50%;background:var(--emerald);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.istep .st{font-size:14px}
.addgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.addopt{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 8px;border-radius:16px;background:#fff;border:1.5px solid var(--line-2);font-weight:700;font-size:13px;color:var(--ink)}
.addmenu{position:fixed;inset:0;z-index:60;background:rgba(10,12,14,.82);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:calc(env(safe-area-inset-bottom) + 24px);animation:amfade .18s ease}
@keyframes amfade{from{opacity:0}to{opacity:1}}
.addmenu-inner{display:flex;flex-direction:column;gap:22px;align-items:center;margin-bottom:28px}
.amrow{display:flex;gap:54px;justify-content:center}
.amitem{display:flex;flex-direction:column;align-items:center;gap:9px;background:none;animation:amup .26s ease both}
.amrow:nth-child(1) .amitem:nth-child(1){animation-delay:.02s}
.amrow:nth-child(1) .amitem:nth-child(2){animation-delay:.06s}
.amrow:nth-child(2) .amitem:nth-child(1){animation-delay:.10s}
.amrow:nth-child(2) .amitem:nth-child(2){animation-delay:.14s}
@keyframes amup{from{opacity:0;transform:translateY(16px) scale(.85)}to{opacity:1;transform:none}}
.am-ic{width:64px;height:64px;border-radius:50%;background:#22262b;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.35)}
.am-ic.rec{color:#34d399}.am-ic.desp{color:#f87171}.am-ic.card{color:#2dd4bf}.am-ic.tr{color:#60a5fa}.am-ic.bank{color:#fbbf24}
.am-lab{color:#fff;font-size:13.5px;font-weight:600;text-align:center;line-height:1.2}
.amitem.paste{flex-direction:row;gap:10px;background:rgba(255,255,255,.1);padding:10px 18px;border-radius:30px;animation-delay:.18s}
.amitem.paste .am-ic{width:34px;height:34px;box-shadow:none;background:rgba(255,255,255,.12)}
.amitem.paste .am-ic svg{width:18px;height:18px}
.addmenu-x{width:60px;height:60px;border-radius:50%;background:#7c3aed;color:#fff;font-size:24px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(124,58,237,.5)}
.addopt span{font-size:26px}
.addopt.rec{border-color:#22c55e;border-width:2px;background:#eafaf0}.addopt.desp{border-color:#ef4444;border-width:2px;background:#fdecec}.addopt.card{border-color:#f59e0b;border-width:2px;background:#fff4e3}.addopt.tr{border-color:#3b82f6;border-width:2px;background:#eaf1fe}
.saved-lbl{font-size:12px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.4px;margin:2px 0 8px}
.brand .ver{font-size:12px;color:rgba(255,255,255,.45);margin-top:2px;letter-spacing:.3px}
.tema-presets{display:flex;flex-direction:column;gap:8px}
.tema-chip{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;border:1.5px solid var(--line-2);background:#fff;font-weight:600;font-size:14px;color:var(--ink)}
.tema-chip .sw{width:18px;height:18px;border-radius:50%;border:1px solid rgba(0,0,0,.1)}
.cor-in{width:48px;height:34px;padding:0;border:1px solid var(--line);border-radius:8px;background:none}
.opsrow{display:flex;gap:6px;margin:-4px 0 12px}
.sheet-back{display:inline-flex;align-items:center;gap:2px;color:var(--mint);font-weight:700;font-size:15px;margin:-4px 0 6px;cursor:pointer}
.bigval{background:var(--emerald);color:#fff;border-radius:16px;padding:16px 18px;margin:4px 0 14px;cursor:pointer}
.bigval .bv-lab{font-size:12px;opacity:.8;text-transform:uppercase;letter-spacing:.3px}
.bigval .bv-num{font-size:32px;font-weight:800;margin-top:4px}
.datechips{display:flex;gap:8px}
.datechips button,.datechips .dc-outros{flex:1;padding:9px 8px;border-radius:10px;border:1.5px solid var(--line-2);background:#fff;font-weight:600;font-size:13.5px;color:var(--muted);display:flex;align-items:center;justify-content:center;text-align:center;text-transform:none;letter-spacing:normal;margin:0;line-height:1;min-height:0}
.datechips button.on,.datechips .dc-outros.on{background:var(--emerald);color:#fff;border-color:var(--emerald)}
.dc-outros{position:relative;cursor:pointer;overflow:hidden}
.dc-outros input{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:0;padding:0;margin:0}
.datashow{margin-top:8px;font-size:13.5px;color:var(--muted);font-weight:600}

// ============ STATE ============

let DATA={contas:[],categorias:[],cartoes:[],lancamentos:[],orcamentos:[],investimentos:[]};
const PALETA=['#6c5ce7','#0984e3','#00b894','#e17055','#fdcb6e','#e84393','#00cec9','#a29bfe','#fab1a0','#55efc4','#74b9ff','#ff7675','#81ecec','#ffeaa7','#fd79a8','#636e72'];

// ============ HELPERS ============
const $=id=>document.getElementById(id);
const brl=n=>(n<0?'-':'')+'R$ '+Math.abs(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const mesNome=d=>{const s=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});return s.charAt(0).toUpperCase()+s.slice(1);};
const ICON=(n,s=20)=>{const p={
  home:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
  swap:'<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>',
  card:'<rect x="1.5" y="4.5" width="21" height="15" rx="2.5"/><line x1="1.5" y1="10" x2="22.5" y2="10"/>',
  bank:'<path d="M3 21h18"/><path d="M5 10l7-4 7 4"/><path d="M5 10v9"/><path d="M19 10v9"/><path d="M9.5 10v9"/><path d="M14.5 10v9"/>',
  trend:'<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>',
  trenddown:'<polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/>',
  sliders:'<line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1.5" y1="14" x2="6.5" y2="14"/><line x1="9.5" y1="8" x2="14.5" y2="8"/><line x1="17.5" y1="16" x2="22.5" y2="16"/>',
  chart:'<line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/>',
  target:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.6"/>',
  receipt:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/>',
  bell:'<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>',
  power:'<path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/>'
};
  return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p[n]||''}</svg>`;
};
const ymd=d=>d.toISOString().slice(0,10);
const firstOfMonth=d=>new Date(d.getFullYear(),d.getMonth(),1);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function uuid(){return (crypto.randomUUID?crypto.randomUUID():'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c==='x'?r:(r&0x3|0x8)).toString(16);}));}

// scope filter helpers
function srcOk(uid){
  if(source==='casal') return uid===USER.id || MYPARTNERS.some(p=>p.owner_id===uid);
  if(source==='eu') return uid===USER.id;
  return uid===source; // source = owner_id de um parceiro
}
function apelidoDe(uid){const p=MYPARTNERS.find(p=>p.owner_id===uid);return p?p.apelido:'Parceiro';}
function souDono(uid){return uid===USER.id;}
function ehFamiliarConta(c){return !!(c && c.incluir_principal===false);}
function lancFamiliar(l){
  const c = l.cartao_id?cartaoById(l.cartao_id):contaById(l.conta_id);
  let fam = ehFamiliarConta(c);
  if(!fam && l.tipo==='transferencia') fam = ehFamiliarConta(contaById(l.conta_destino_id));
  return fam;
}
function contaPassaScope(c){
  if(scope==='familia') return c.incluir_principal===false;
  if(c.incluir_principal===false) return false;
  return scope==='tudo' || c.tipo===scope;
}
function contasScope(){return DATA.contas.filter(c=>!c.arquivada && srcOk(c.user_id) && contaPassaScope(c));}
function cartoesScope(){return DATA.cartoes.filter(c=>!c.arquivado && srcOk(c.user_id) && contaPassaScope(c));}
function contasPrincipais(){return contasScope().filter(c=>!c.eh_investimento);}
function contasInvestimento(){return contasScope().filter(c=>c.eh_investimento);}
function totalInvestidoContas(){return contasInvestimento().reduce((a,c)=>a+saldoConta(c.id),0);}
function contasFamiliares(){return DATA.contas.filter(c=>!c.arquivada && srcOk(c.user_id) && c.incluir_principal===false);}
function cartoesPrincipais(){return cartoesScope();}
function cartoesFamiliares(){return DATA.cartoes.filter(c=>!c.arquivado && srcOk(c.user_id) && c.incluir_principal===false);}
function titularesSugeridos(){
  const set=new Set(['Eu','Mãe','Pai','Irmão','Irmã','Filho','Filha','Esposa']);
  DATA.contas.concat(DATA.cartoes).forEach(x=>{ if(x.titular && x.titular.trim()) set.add(x.titular.trim()); });
  return Array.from(set);
}
function contaById(id){return DATA.contas.find(c=>c.id===id);}
function cartaoById(id){return DATA.cartoes.find(c=>c.id===id);}
function catById(id){return DATA.categorias.find(c=>c.id===id);}

// saldo de uma conta = saldo_inicial + receitas pagas - despesas pagas + transf entrada - transf saida
function saldoConta(contaId){
  const c=contaById(contaId); if(!c) return 0;
  let s=Number(c.saldo_inicial)||0;
  for(const l of DATA.lancamentos){
    if(l.status!=='pago') continue;
    const v=Number(l.valor)||0;
    if(l.tipo==='receita' && l.conta_id===contaId) s+=v;
    else if(l.tipo==='despesa' && l.conta_id===contaId && !l.cartao_id) s-=v;
    else if(l.tipo==='transferencia'){
      if(l.conta_id===contaId && l.user_id===c.user_id) s-=v;
      if(l.conta_destino_id===contaId && l.user_id===c.user_id) s+=v;
    }
  }
  return s;
}
function saldoTotal(){return contasPrincipais().reduce((a,c)=>a+saldoConta(c.id),0);}

// ===== contas salvas no login =====
function lsGet(k,def){try{const v=localStorage.getItem(k);return v==null?def:JSON.parse(v);}catch(e){return def;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function getSavedEmails(){return lsGet('savedEmails',[]);}
function rememberEmail(email){let arr=getSavedEmails().filter(e=>e!==email);arr.unshift(email);lsSet('savedEmails',arr.slice(0,6));lsSet('lastEmail',email);}
function forgetEmail(email){lsSet('savedEmails',getSavedEmails().filter(e=>e!==email));try{localStorage.removeItem('savedPass:'+email);}catch(e){}if(lsGet('lastEmail','')===email)lsSet('lastEmail','');renderSavedAccounts();}

function getTemas(){
  let all=lsGet('temas',null);
  if(!all){ const old=lsGet('tema',null); all = old?{tudo:old}:{}; lsSet('temas',all); }
  return all;
}
function setTema(sc,t){const all=getTemas();all[sc]=t;lsSet('temas',all);}
function getTema(sc){sc=sc||scope||'tudo';const all=getTemas();return Object.assign({},TEMA_DEFAULT,all[sc]||all['tudo']||{});}
function _hx(v){return Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0');}
function lighten(hex,amt){const c=hex.replace('#','');const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);return '#'+_hx(r+(255-r)*amt)+_hx(g+(255-g)*amt)+_hx(b+(255-b)*amt);}
function darken(hex,amt){const c=hex.replace('#','');const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);return '#'+_hx(r*(1-amt))+_hx(g*(1-amt))+_hx(b*(1-amt));}
function applyTema(sc){
  const t=getTema(sc); const s=document.documentElement.style;
  s.setProperty('--emerald',t.emerald); s.setProperty('--emerald-2',lighten(t.emerald,0.18));
  s.setProperty('--mint',t.mint); s.setProperty('--coral',t.coral); s.setProperty('--coral-soft',lighten(t.coral,0.75));
  s.setProperty('--green',t.green); s.setProperty('--red',t.red);
  s.setProperty('--paper',t.paper); s.setProperty('--card',t.card);
  s.setProperty('--ink',t.ink); s.setProperty('--muted',t.muted);
  s.setProperty('--line',t.line); s.setProperty('--line-2',darken(t.line,0.06));
}

async function doSignup(){
  const nome=$('suNome').value.trim(), email=$('suEmail').value.trim(), pass=$('suPass').value;
  if(!nome||!email||pass.length<6){authErr('Preencha nome, e-mail e senha (mín. 6 caracteres).');return;}
  const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{nome}}});
  if(error){authErr(traduzErro(error.message));return;}
  if(data.session){ rememberEmail(email); _promptAfterSignup=true; await afterLogin(); }
  else { authOk('Conta criada! Confirme o e-mail (se pedido) e faça login.'); showLogin(); }
}
async function doLogin(){
  const email=$('liEmail').value.trim(), pass=$('liPass').value;
  if(!email||!pass){authErr('Informe e-mail e senha.');return;}
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){authErr(traduzErro(error.message));return;}
  rememberEmail(email);
  if($('liSavePass')&&$('liSavePass').checked) savePassFor(email,pass);
  else { try{localStorage.removeItem('savedPass:'+email);}catch(e){} }
  await afterLogin();
}
async function doLogout(){ await sb.auth.signOut(); location.reload(); }
function traduzErro(m){
  if(/Invalid login/i.test(m)) return 'E-mail ou senha incorretos.';
  if(/already registered/i.test(m)) return 'Esse e-mail já tem conta. Faça login.';
  if(/at least 6/i.test(m)) return 'A senha precisa ter ao menos 6 caracteres.';
  return m;
}

let _rtChannel=null;
function iniciarRealtime(){
  try{ if(_rtChannel) sb.removeChannel(_rtChannel); }catch(e){}
  _rtChannel = sb.channel('lanc-rt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'lancamentos'},payload=>{
      const r=payload.new;
      if(!r || r.user_id===USER.id) return;
      if(!MYPARTNERS.some(p=>p.owner_id===r.user_id)) return;
      if(!DATA.lancamentos.find(x=>x.id===r.id)) DATA.lancamentos.unshift(r);
      const sinal = r.tipo==='receita'?'+':(r.tipo==='despesa'?'-':'');
      toast('🔔 '+apelidoDe(r.user_id)+': '+sinal+brl(Number(r.valor)));
      updateBell();
      if(['home','trans','relatorios','contas'].includes(tab)) render();
    }).subscribe();
}
function notifSeenAt(){ try{ return localStorage.getItem('notifSeen_'+USER.id)||'1970-01-01'; }catch(e){ return '1970-01-01'; } }
function setNotifSeen(){ try{ localStorage.setItem('notifSeen_'+USER.id, new Date().toISOString()); }catch(e){} }
function partnerLancs(){
  return DATA.lancamentos
    .filter(l=> l.user_id!==USER.id && MYPARTNERS.some(p=>p.owner_id===l.user_id))
    .sort((a,b)=> (b.criado_em||b.data) < (a.criado_em||a.data) ? -1 : 1);
}
function updateBell(){
  const badge=$('bellBadge'); if(!badge) return;
  if(!MYPARTNERS.length){ badge.classList.add('hidden'); return; }
  const seen=notifSeenAt();
  const n=partnerLancs().filter(l=> (l.criado_em||l.data) > seen).length;
  if(n>0){ badge.textContent=n>9?'9+':n; badge.classList.remove('hidden'); }
  else badge.classList.add('hidden');
}

async function loadAll(){
  const [c1,c2,c3,c4]=await Promise.all([
    sb.from('contas').select('*').order('criado_em'),
    sb.from('categorias').select('*').order('nome'),
    sb.from('cartoes').select('*').order('criado_em'),
    sb.from('lancamentos').select('*').order('data',{ascending:false}),
  ]);
  if(c1.error||c2.error||c3.error||c4.error){
    const e=c1.error||c2.error||c3.error||c4.error;
    $('content').innerHTML='<div class="card"><b>Erro ao carregar dados.</b><div class="note">'+esc(e.message)+'<br><br>Verifique se você rodou o SQL das tabelas no Supabase.</div></div>';
    throw e;
  }
  DATA.contas=c1.data; DATA.categorias=c2.data; DATA.cartoes=c3.data; DATA.lancamentos=c4.data;
  const o=await sb.from('orcamentos').select('*');
  DATA.orcamentos = o.error ? [] : o.data;
  const inv=await sb.from('investimentos').select('*');
  DATA.investimentos = inv.error ? [] : inv.data;
  const sh=await sb.from('compartilhamentos').select('*');
  const shares = sh.error ? [] : sh.data;
  MYPARTNERS = shares.filter(s=>s.viewer_id===USER.id && s.status==='ativo').map(s=>({owner_id:s.owner_id, apelido:s.apelido||'Parceiro', id:s.id}));
  MYSHARES   = shares.filter(s=>s.owner_id===USER.id);
  if(source!=='eu' && source!=='casal' && !MYPARTNERS.some(p=>p.owner_id===source)) source='eu';
  updateSourceSeg();
  updateBell();
}

// ---- INVESTIMENTOS: cálculos ----
function mesesDesde(dataStr){
  const a=new Date(dataStr+'T00:00:00'), b=new Date();
  let m=(b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth());
  if(b.getDate()<a.getDate()) m-=1;
  return Math.max(0,m);
}
function valorAtualInvest(inv){
  const taxa=Number(inv.taxa_mensal)||0;
  const meses=mesesDesde(inv.data_aplicacao);
  return Number(inv.valor_aplicado||0)*Math.pow(1+taxa/100, meses);
}
function investimentosScope(){ return DATA.investimentos.filter(i=>!i.arquivado && srcOk(i.user_id)); }
function totalInvestido(){ return investimentosScope().reduce((a,i)=>a+valorAtualInvest(i),0); }
function patrimonioTotal(){
  let s=saldoTotal();
  s+=totalInvestidoContas();
  investimentosScope().filter(i=>i.incluir_patrimonio).forEach(i=>s+=valorAtualInvest(i));
  return s;
}
// agregações para gráficos/orçamento
function noScope(l){
  if(!srcOk(l.user_id)) return false;
  if(scope==='familia') return lancFamiliar(l);
  if(lancFamiliar(l)) return false;
  if(scope==='tudo') return true;
  if(l.tipo==='transferencia') return (contaById(l.conta_id)&&contaById(l.conta_id).tipo===scope)||(contaById(l.conta_destino_id)&&contaById(l.conta_destino_id).tipo===scope);
  const conta=l.cartao_id?cartaoById(l.cartao_id):contaById(l.conta_id);
  return conta&&conta.tipo===scope;
}
function inMonth(l,d){const ld=new Date(l.data+'T00:00:00');return ld>=firstOfMonth(d)&&ld<=new Date(d.getFullYear(),d.getMonth()+1,0);}
function gastosPorCategoria(d){
  const map={};
  for(const l of DATA.lancamentos){
    if(l.tipo!=='despesa') continue;
    if(!inMonth(l,d)) continue;
    if(!noScope(l)) continue;
    const cat=catById(l.categoria_id);
    const key=cat?cat.id:'_sem';
    if(!map[key]) map[key]={nome:cat?cat.nome:'Sem categoria',icone:cat?cat.icone:'❓',valor:0};
    map[key].valor+=Number(l.valor)||0;
  }
  return Object.entries(map).map(([id,v])=>({id,...v})).sort((a,b)=>b.valor-a.valor);
}
function gastoCategoriaMes(catId,d){
  let s=0;
  for(const l of DATA.lancamentos){
    if(l.tipo!=='despesa'||l.categoria_id!==catId) continue;
    if(!inMonth(l,d)) continue;
    if(!noScope(l)) continue;
    s+=Number(l.valor)||0;
  }
  return s;
}
function evolucaoMeses(n){
  const out=[];
  for(let i=n-1;i>=0;i--){
    const d=new Date(viewMonth.getFullYear(),viewMonth.getMonth()-i,1);
    let rec=0,desp=0;
    for(const l of DATA.lancamentos){
      if(l.tipo==='transferencia'||l.cartao_id) continue;
      if(!inMonth(l,d)) continue;
      if(!noScope(l)) continue;
      if(l.tipo==='receita') rec+=Number(l.valor)||0; else desp+=Number(l.valor)||0;
    }
    out.push({mes:d,rec,desp});
  }
  return out;
}

// ============ HOME ============
function balancoMes(d){
  const ini=firstOfMonth(d), fim=new Date(d.getFullYear(),d.getMonth()+1,0);
  let rec=0,desp=0;
  for(const l of DATA.lancamentos){
    if(l.tipo==='transferencia') continue;
    if(l.cartao_id) continue; // gastos de cartão entram via fatura
    if(!srcOk(l.user_id)) continue;
    const ld=new Date(l.data+'T00:00:00');
    if(ld<ini||ld>fim) continue;
    const conta=contaById(l.conta_id);
    if(scope==='familia'){ if(!lancFamiliar(l)) continue; }
    else { if(lancFamiliar(l)) continue; if(scope!=='tudo' && (!conta || conta.tipo!==scope)) continue; }
    if(l.tipo==='receita') rec+=Number(l.valor)||0;
    else desp+=Number(l.valor)||0;
  }
  return {rec,desp,saldo:rec-desp};
}
function gastoCartaoMes(d){
  const ym=ymd(firstOfMonth(d)).slice(0,7);
  let s=0;
  for(const l of DATA.lancamentos){
    if(!l.cartao_id) continue;
    if(!l.competencia || faturaYm(l.competencia, cartaoById(l.cartao_id))!==ym) continue;
    if(!srcOk(l.user_id)) continue;
    const cart=cartaoById(l.cartao_id);
    if(scope==='familia'){ if(!(cart&&cart.incluir_principal===false)) continue; }
    else { if(cart&&cart.incluir_principal===false) continue; if(scope!=='tudo' && (!cart||cart.tipo!==scope)) continue; }
    s += (l.tipo==='receita'?-1:1)*(Number(l.valor)||0);
  }
  return s;
}

// ============ TRANSAÇÕES ============
function lancScopeOk(l){
  if(scope==='familia') return lancFamiliar(l);
  if(lancFamiliar(l)) return false;
  if(scope==='tudo') return true;
  if(l.tipo==='transferencia') return (contaById(l.conta_id)&&contaById(l.conta_id).tipo===scope)||(contaById(l.conta_destino_id)&&contaById(l.conta_destino_id).tipo===scope);
  const conta=l.cartao_id?cartaoById(l.cartao_id):contaById(l.conta_id); return conta&&conta.tipo===scope;
}
function pendentesList(){
  return DATA.lancamentos
    .filter(l=>l.status==='pendente' && !l.cartao_id)
    .filter(l=>srcOk(l.user_id))
    .filter(lancScopeOk)
    .sort((a,b)=> a.data<b.data?-1:(a.data>b.data?1:0));
}
function pendDueList(){ // vencidas + que vencem até o fim deste mês
  const fimMes=new Date(new Date().getFullYear(),new Date().getMonth()+1,0);
  return pendentesList().filter(l=>new Date(l.data+'T00:00:00')<=fimMes);
}
window._pendSel = window._pendSel || new Set();
window._pendFut = window._pendFut || false;
function renderPendencias(){

  const due=all.filter(l=>new Date(l.data+'T00:00:00')<=fimMes);
  const fut=all.filter(l=>new Date(l.data+'T00:00:00')>fimMes);
  const list = window._pendFut ? all : due;
  const hoje=ymd(new Date());
  let html=`<div class="lrow" style="border:none;padding:4px 0 10px;cursor:pointer" onclick="go('home')"><span style="font-size:20px;margin-right:4px">‹</span><b>Contas a pagar</b></div>`;
  if(!list.length){
    html+=`<div class="card"><div class="empty"><div class="ico">${ICON('receipt',32)}</div><p>${all.length?'Nada vence até o fim do mês. 🎉':'Nenhuma pendência. Está tudo em dia! 🎉'}</p></div></div>`;
    if(fut.length){ html+=`<button class="btn ghost" style="margin-top:8px;width:100%;border:1.5px solid var(--line-2)" onclick="window._pendFut=true;renderPendencias()">Ver futuras (${fut.length}) ›</button>`; }
    $('content').innerHTML=html; return;
  }
  const allSel=list.every(l=>window._pendSel.has(l.id));
  html+=`<div class="note" style="margin-bottom:8px">Marque o que já pagou e toque em <b>Dar baixa</b> — o valor sai do saldo da conta.</div>`;
  html+=`<div class="card" style="padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
    <div><b>${window._pendSel.size}</b> selecionada(s)</div>
    <button class="lnk" onclick="pendSelAll()">${allSel?'Limpar':'Selecionar todas'}</button></div>`;
  let lastG='';
  html+=`<div class="card">`;
  list.forEach(l=>{
    const g=new Date(l.data+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'short'});
    if(g!==lastG){ html+=`<div class="pend-g">${g.charAt(0).toUpperCase()+g.slice(1)}</div>`; lastG=g; }
    const cat=catById(l.categoria_id); const conta=contaById(l.conta_id);
    const isRec=l.tipo==='receita';
    const venc=(!isRec && l.data<hoje)?` <span class="pill" style="background:#fdecec;color:var(--coral)">vencida</span>`:'';
    const sub=`${cat?esc(cat.nome):'Sem categoria'}${conta?' · '+esc(conta.nome):''}`;
    const sel=window._pendSel.has(l.id);
    html+=`<div class="lrow pend-row ${sel?'sel':''}" onclick="pendToggle('${l.id}')">
      <div class="dot">${cat?cat.icone:'•'}</div>
      <div class="mid"><div class="t">${esc(l.descricao)}${venc}</div><div class="s">${sub}</div></div>
      <div class="amt ${isRec?'g':'r'}">${isRec?'+':'−'}${brl(Number(l.valor)).replace('R$ ','R$ ')}</div>
      <div class="pend-chk ${sel?'on':''}">${sel?'✓':''}</div></div>`;
  });
  html+=`</div>`;
  if(fut.length){ html+=`<button class="btn ghost" style="margin-top:10px;width:100%;border:1.5px solid var(--line-2)" onclick="window._pendFut=${!window._pendFut};renderPendencias()">${window._pendFut?'Ocultar futuras':'Ver futuras ('+fut.length+') ›'}</button>`; }
  html+=`<div style="height:90px"></div>`;
  const tot=list.filter(l=>window._pendSel.has(l.id)).reduce((a,l)=>a+Number(l.valor),0);
  html+=`<div class="pendbar ${window._pendSel.size?'':'hidden'}" id="pendBar">
    <div><div class="note">Total selecionado</div><div style="font-weight:800;font-size:17px">${brl(tot)}</div></div>
    <button class="btn coral" style="width:auto;padding:13px 22px" onclick="efetivarPendencias()">Dar baixa (${window._pendSel.size})</button></div>`;
  $('content').innerHTML=html;
}
function verTrans(f){ window._transFilter=f||'all'; go('trans'); }
async function toggleLancPago(id){
  const l=DATA.lancamentos.find(x=>x.id===id); if(!l)return;

function pendToggle(id){ if(window._pendSel.has(id))window._pendSel.delete(id); else window._pendSel.add(id); renderPendencias(); }
function pendSelAll(){ const list=pendentesList(); const allSel=list.every(l=>window._pendSel.has(l.id)); if(allSel)window._pendSel.clear(); else list.forEach(l=>window._pendSel.add(l.id)); renderPendencias(); }

async function efetivarConfirma(){

function renderTrans(){
  const ini=firstOfMonth(viewMonth), fim=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+1,0);
  let list=DATA.lancamentos.filter(l=>{
    if(!srcOk(l.user_id)) return false;
    const ld=new Date(l.data+'T00:00:00');
    if(ld<ini||ld>fim) return false;
    if(scope==='familia') return lancFamiliar(l);
    if(lancFamiliar(l)) return false;
    if(scope==='tudo') return true;
    if(l.tipo==='transferencia') return (contaById(l.conta_id)&&contaById(l.conta_id).tipo===scope)||(contaById(l.conta_destino_id)&&contaById(l.conta_destino_id).tipo===scope);
    const conta=l.cartao_id?cartaoById(l.cartao_id):contaById(l.conta_id); return conta&&conta.tipo===scope;
  });
  list.sort((a,b)=> (a.data<b.data?1:a.data>b.data?-1:0));
  const f=window._transFilter||'all';
  if(f==='receita') list=list.filter(l=>l.tipo==='receita');
  else if(f==='despesa') list=list.filter(l=>l.tipo==='despesa');
  let html=monthNav('trans');
  html+=`<div class="tfilter">
    <button class="${f==='all'?'on':''}" onclick="verTrans('all')">Tudo</button>
    <button class="${f==='receita'?'on':''}" onclick="verTrans('receita')">Receitas</button>
    <button class="${f==='despesa'?'on':''}" onclick="verTrans('despesa')">Despesas</button>
  </div>`;
  html+=`<div class="card">`;
  if(!list.length) html+=`<div class="empty"><div class="ico">${ICON('receipt',30)}</div><p>Nenhuma ${f==='receita'?'receita':f==='despesa'?'despesa':'transação'} em ${mesNome(viewMonth)}.</p><button class="btn coral sm" onclick="openLanc()">Adicionar</button></div>`;
  else list.forEach(l=>html+=rowLanc(l));
  html+=`</div>`;
  $('content').innerHTML=html;
}
function rowLanc(l){
  const cat=catById(l.categoria_id);
  let icon='🔁',cls='b',sign='',sub='';
  if(l.tipo==='receita'){icon=cat?cat.icone:'⬆️';cls='g';sign='+';}
  else if(l.tipo==='despesa'){icon=cat?cat.icone:'⬇️';cls='r';sign='-';}
  else {icon='🔁';cls='b';}
  if(l.tipo==='transferencia'){
    const o=contaById(l.conta_id),d=contaById(l.conta_destino_id);
    sub=`${o?esc(o.nome):'?'} → ${d?esc(d.nome):'?'}`;
  }else{
    const conta=l.cartao_id?cartaoById(l.cartao_id):contaById(l.conta_id);
    sub=(cat?esc(cat.nome):'Sem categoria')+(conta?' · '+esc(conta.nome):'');
  }
  const dt=new Date(l.data+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  const parc=(l.parcelas&&l.parcelas>1)?` <span class="pill neg">${l.parcela}/${l.parcelas}</span>`:'';
  const fixo=(l.grupo_id&&!(l.parcelas>1)&&l.tipo!=='transferencia')?` <span class="pill" style="background:#e8eefc;color:#3b5bdb">🔁 fixo</span>`:'';
  const pend=l.status==='pendente'?' <span class="pill pend">pendente</span>':'';
  const chk=(!l.cartao_id && l.tipo!=='transferencia')?`<div class="lchk ${l.status==='pago'?'on':''}" title="Confirmar" onclick="event.stopPropagation();toggleLancPago('${l.id}')">${l.status==='pago'?'✓':''}</div>`:'';
  return `<div class="lrow" onclick="openLanc('${l.id}')">
    <div class="dot">${icon||'•'}</div>
    <div class="mid"><div class="t">${esc(l.descricao)}${parc}${fixo}${pend}</div><div class="s">${dt} · ${sub}</div></div>
    <div class="amt ${cls}">${sign}${brl(Number(l.valor)).replace('R$ ','R$ ')}</div>${chk}</div>`;
}

function valFatura(l){ return (l.tipo==='receita'?-1:1)*(Number(l.valor)||0); }
function faturaTotal(cartaoId,mes){

function ajustarFatura(cartaoId){

      <div class="barpair">
        <div class="bar rec" style="height:${hr}px" title="${brl(m.rec)}"></div>
        <div class="bar desp" style="height:${hd}px" title="${brl(m.desp)}"></div>

      <div class="barlab">${m.mes.toLocaleDateString('pt-BR',{month:'short'}).replace('.','')}</div>
    </div>`;
  });

  $('content').innerHTML=html;
}
function donutSVG(seg,total){
  const size=180,r=70,cx=size/2,cy=size/2,sw=26;
  const C=2*Math.PI*r; let off=0; let arcs='';
  seg.forEach(s=>{
    const frac=s.valor/total; const len=frac*C;
    arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"></circle>`;
    off+=len;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${arcs}
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="12" fill="#6f7d79">Total</text>
    <text x="${cx}" y="${cy+15}" text-anchor="middle" font-size="16" font-weight="700" fill="#0c1c1a">${brl(total).replace('R$ ','R$')}</text></svg>`;
}

// barras/progresso helpers
function barRecDesp(rec,desp){
  const tot=rec+desp; if(!tot) return '';
  const pr=Math.round(rec/tot*100);
  return `<div class="rdbar"><div class="rdrec" style="width:${pr}%"></div><div class="rddesp" style="width:${100-pr}%"></div></div>`;
}
function barProg(g,lim,bg){
  const pct=lim?Math.min(100,g/lim*100):0; const over=g>lim;
  return `<div class="prog" style="margin-top:12px;background:rgba(255,255,255,.18)"><div class="progfill" style="width:${pct}%;background:${over?'#ffb4a8':'#a8f0c8'}"></div></div>`;
}

// ============ INVESTIMENTOS ============
function renderInvestimentos(){
  const lista=investimentosScope();
  const totalAtual=lista.reduce((a,i)=>a+valorAtualInvest(i),0);
  const totalAplic=lista.reduce((a,i)=>a+(Number(i.valor_aplicado)||0),0);
  const rend=totalAtual-totalAplic;
  const patr=patrimonioTotal();
  let html=`<div class="page-title">Investimentos ${scope!=='tudo'?'':''}</div>`;
  html+=`<div class="card hero">
    <div class="lab">Total investido</div>
    <div class="big">${brl(totalAtual)}</div>
    <div class="balrow">
      <div class="b"><div class="l">Aplicado</div><div class="v">${brl(totalAplic)}</div></div>
      <div class="b"><div class="l">Rendimento</div><div class="v ${rend<0?'r':'g'}">${rend>=0?'+':''}${brl(rend)}</div></div>
    </div>
    <div class="balrow"><div class="b" style="flex:1"><div class="l">Patrimônio (contas + investimentos)</div><div class="v">${brl(patr)}</div></div></div>
  </div>`;
  html+=`<div class="card">`;
  if(!lista.length){
    html+=`<div class="empty"><div class="ico">💰</div><p>Cadastre seus investimentos (poupança, renda fixa…) e acompanhe render mês a mês.</p><button class="btn coral sm" onclick="openInvest()">Adicionar investimento</button></div>`;
  }else{
    lista.forEach(i=>{
      const atual=valorAtualInvest(i), aplic=Number(i.valor_aplicado)||0, r=atual-aplic;
      const ic = i.tipo==='poupanca'?'🐷':(i.tipo==='renda_fixa'?'📈':'💼');
      const tx = Number(i.taxa_mensal)||0;
      html+=`<div class="lrow" onclick="openInvest('${i.id}')">
        <div class="dot" style="background:#e9f3f1">${ic}</div>
        <div class="mid"><div class="t">${esc(i.nome)} ${i.incluir_patrimonio?'':'<span class="pill neg">fora do patrimônio</span>'}</div>
          <div class="s">${tx>0?tx.toString().replace('.',',')+'%/mês · ':''}rend ${r>=0?'+':''}${brl(r)}</div></div>
        <div class="amt g">${brl(atual)}</div></div>`;
    });
  }
  html+=`</div><button class="btn outline" onclick="openInvest()">+ Adicionar investimento</button>`;
  $('content').innerHTML=html;
}

async function saveInvest(id){
  const nome=$('iNome').value.trim(); if(!nome){toast('Informe o nome');return;}
  const valor=parseFloat($('iValor').value)||0;
  const taxa=parseFloat($('iTaxa').value)||0;
  const data=$('iData').value||ymd(new Date());
  const row={user_id:USER.id,nome,tipo:window._invTipo||'renda_fixa',valor_aplicado:valor,taxa_mensal:taxa,data_aplicacao:data,incluir_patrimonio:window._invInc!==false};
  let error;
  if(id)({error}=await sb.from('investimentos').update(row).eq('id',id));
  else ({error}=await sb.from('investimentos').insert(row));
  if(error){toast('Erro: '+error.message);return;}
  closeSheet(); await loadAll(); toast(id?'Investimento atualizado':'Investimento criado'); render();
}
async function delInvest(id){
  if(!confirm('Excluir este investimento?'))return;
  const {error}=await sb.from('investimentos').delete().eq('id',id);
  if(error){toast('Erro: '+error.message);return;}
  closeSheet(); await loadAll(); toast('Excluído'); render();
}

function evalValor(str){
  if(str==null) return NaN;
  let s=(''+str).replace(/\s/g,'').replace(/[xX]/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
  if(s.indexOf(',')>=0 && s.indexOf('.')>=0){ s=s.replace(/\./g,'').replace(/,/g,'.'); } // 1.234,56 -> 1234.56
  else if(s.indexOf(',')>=0){ s=s.replace(/,/g,'.'); }                                    // 12,90 -> 12.90
  if(!/^[-+*/.()0-9]+$/.test(s)) return NaN;
  try{ const v=Function('"use strict";return ('+s+')')(); return (typeof v==='number'&&isFinite(v))?Math.round(v*100)/100:NaN; }catch(e){ return NaN; }
}
function fmtBRLnum(n){ return 'R$ '+(Number(n)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function setLancValor(n){ const v=Math.round((Number(n)||0)*100)/100; if($('lValor'))$('lValor').value=v||''; if($('lValDisplay'))$('lValDisplay').textContent=fmtBRLnum(v); try{updateParcNote();updateFaturaNote();}catch(e){} }
function abrirCalc(){

}
function fecharCalc(){ $('calcPad').classList.remove('show'); }

function calcPress(ch){
  if(ch==='back'){ window._calcExpr=(window._calcExpr||'').slice(0,-1); }
  else if(ch==='='){ const v=evalValor(window._calcExpr); if(!isNaN(v)) window._calcExpr=String(v).replace('.',','); }
  else { window._calcExpr=(window._calcExpr||'')+ch; }
  renderCalc();
}
function calcPronto(){ const v=evalValor(window._calcExpr||'0'); if(isNaN(v)){toast('Conta inválida');return;} setLancValor(v); fecharCalc(); }

  openSheet(`

async function colarClipboard(){
  try{ const t=await navigator.clipboard.readText(); if(t&&t.trim()){$('bancoTxt').value=t; toast('Colado ✅');} else toast('Nada copiado ainda'); }
  catch(e){ toast('Segure no campo e toque em "Colar"'); }
}
function parseBanco(txt){
  const t=txt.replace(/\s+/g,' ').trim();
  let valor=0; const mv=t.match(/R\$\s*([\d.]+,\d{2})/); if(mv){valor=parseFloat(mv[1].replace(/\./g,'').replace(',','.'));}
  let data=ymd(new Date()); const md=t.match(/(\d{2})\/(\d{2})(?:\/(\d{2,4}))?/);
  if(md){let y=md[3]?(md[3].length===2?'20'+md[3]:md[3]):String(new Date().getFullYear()); data=`${y}-${md[2]}-${md[1]}`;}
  const tipo=/(receb|cr[ée]dito|entrada|dep[oó]sito|estorno|salário|salario)/i.test(t)?'receita':'despesa';
  const isCard=/(cart[ãa]o|final\s*\d{4}|cr[ée]dito)/i.test(t) && !/pix|d[ée]bito autom/i.test(t);
  let desc=''; let m;
  if((m=t.match(/(?:em|no|na|para|de)\s+([A-Za-zÀ-ÿ][A-Za-zÀ-ÿ0-9 .&'*\-]{2,40})/i))){
    desc=m[1].trim().replace(/\s+(no cart[ãa]o.*|em \d.*|R\$.*|final.*)$/i,'').trim();
  }
  if(!desc || /^\d/.test(desc)) desc = tipo==='receita'?'Recebimento':'Compra';
  return {valor, data, tipo, isCard, desc};
}
function lerBanco(){
  const txt=($('bancoTxt')&&$('bancoTxt').value||'').trim(); if(!txt){toast('Cole a mensagem do banco');return;}
  closeSheet(); lerBancoTexto(txt);
}
function lerBancoTexto(txt){
  const p=parseBanco(txt);
  if(!(p.valor>0)){toast('Não achei o valor (R$). Confira a mensagem.');return;}
  window._prefill={desc:p.desc,valor:p.valor,data:p.data};
  const preset = p.tipo==='receita' ? 'receita' : (p.isCard?'despesa_cartao':'despesa_conta');
  openLanc(null, preset);
  toast('Confira e ajuste se precisar 👇');
}
function checkBancoURL(){
  try{
    const u=new URL(location.href);
    let txt=u.searchParams.get('banco');
    if(!txt && location.hash.indexOf('banco=')>=0) txt=decodeURIComponent(location.hash.split('banco=')[1]||'');
    if(txt && txt.trim()){
      history.replaceState(null,'',location.pathname);
      setTimeout(()=>lerBancoTexto(txt.trim()), 400);
    }
  }catch(e){}
}
function setLancType(t){lancType=t;['Rec','Desp','Transf'].forEach(x=>{const b=$('tt'+x);b.className=(('tt'+x==='tt'+({receita:'Rec',despesa:'Desp',transferencia:'Transf'}[t]))?'on '+({receita:'rec',despesa:'desp',transferencia:'transf'}[t]):'');});renderLancDynamic(window._lancEdit);if(!window._lancEdit)ajustaStatusData();}
function onRecorrChange(){
  const sel=$('lRecorr'); const inp=$('lRecorrN'); if(!sel)return;
  if(inp) inp.style.display = sel.value==='custom' ? 'block' : 'none';
  updateRecorrNote();
}
function updateRecorrNote(){
  const nt=$('recorrNote'); const sel=$('lRecorr'); if(!nt||!sel)return;
  let n=0;
  if(sel.value==='fixo') n=24; else if(sel.value==='custom') n=parseInt($('lRecorrN')?$('lRecorrN').value:'')||0; else n=parseInt(sel.value)||0;
  const dini=$('lData')?$('lData').value:'';
  if(n>1 && dini){
    const di=new Date(dini+'T00:00:00');
    const fim=new Date(di.getFullYear(), di.getMonth()+n-1, di.getDate());
    const f=x=>x.toLocaleDateString('pt-BR',{month:'short',year:'numeric'});
    nt.innerHTML=`Cria <b>${n}</b> lançamentos <b>pendentes</b>, 1 por mês — de <b>${f(di)}</b> até <b>${f(fim)}</b>. Cada um aparece em "Contas a pagar" na sua vez.`;
  }else{
    nt.innerHTML=`Cria a conta repetida nos próximos meses (água, luz, internet, escola, aluguel…). Cada mês entra como <b>pendente</b> e aparece em "Contas a pagar" na sua vez.`;
  }
}
function setStatus(s){window._lancStatus=s;$('stPago').classList.toggle('on',s==='pago');$('stPend').classList.toggle('on',s==='pendente');}
function renderLancDynamic(e){
  e=e||{};
  const contas=DATA.contas.filter(c=>!c.arquivada && c.user_id===USER.id);
  const cartoes=DATA.cartoes.filter(c=>!c.arquivado && c.user_id===USER.id);

  if(lancType==='transferencia'){
    const ownerSel = MYPARTNERS.length ? `<div class="field"><label>Transferir para</label>
        <select id="lDestOwner" onchange="updateDestContas()">
          <option value="${USER.id}">Minha conta</option>
          ${MYPARTNERS.map(p=>`<option value="${p.owner_id}">Conta de ${esc(p.apelido)}</option>`).join('')}

    h+=`<div class="field"><label>De (origem)</label><select id="lContaOrig">${contas.map(c=>`<option value="${c.id}" ${e.conta_id===c.id?'selected':''}>${esc(c.nome)}</option>`).join('')}</select></div>
      ${ownerSel}
      <div class="field"><label>Para (destino)</label><select id="lContaDest"></select></div>`;
    $('lancStatusWrap')&&$('lancStatusWrap').classList.remove('hidden');
  } else {

    if(lancType==='despesa'){
      h+=`<div class="field"><label>Pagar com</label>
        <div class="seg2"><button id="meioConta" class="${window._meio==='conta'?'on':''}" onclick="setMeio('conta')">Conta</button>
        <button id="meioCartao" class="${window._meio==='cartao'?'on':''}" onclick="setMeio('cartao')">Cartão</button></div></div>`;
    }
    h+=`<div id="meioWrap"></div>`;
    // categoria
    h+=`<div class="field"><label>Categoria</label>
      <select id="lCatSel" onchange="onCatSelect(this.value)">
        <option value="" ${!e.categoria_id?'selected':''}>Selecione…</option>
        ${cats.map(c=>`<option value="${c.id}" ${e.categoria_id===c.id?'selected':''}>${c.icone?c.icone+' ':''}${esc(c.nome)}</option>`).join('')}
        <option value="__nova__">➕ Escrever nova categoria</option>
      </select></div>`;
  }
  $('lancDynamic').innerHTML=h;
  if(lancType==='transferencia'){ updateDestContas(e); }
  if(lancType!=='transferencia'){
    window._catSel = e.categoria_id||null;
    renderMeio(e);
  }

function updateFaturaNote(){
  const el=$('faturaNote'); if(!el) return;
  const sel=$('lCartao'); if(!sel){ el.innerHTML=''; return; }
  const cartao=cartaoById(sel.value); if(!cartao){ el.innerHTML=''; return; }
  const data=$('lData')?$('lData').value:ymd(new Date());
  const pv=$('lParcelas')?$('lParcelas').value:'1';
  const base=calcCompetencia(data, cartao.dia_fechamento);
  const venc=new Date(base.getFullYear(), base.getMonth()+cardDueOffset(cartao), 1);
  const fmt=x=>x.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const dd=new Date(data+'T00:00:00');
  let aviso='';
  if(dd.getDate()>cartao.dia_fechamento){ aviso=`Fatura deste mês já fechou (dia ${cartao.dia_fechamento}), então `; }
  if(pv==='rec'){
    el.innerHTML=`🔁 ${aviso}entra <b>todo mês</b> a partir da fatura de <b>${fmt(venc)}</b> (cria 24 meses).`;
    return;
  }
  const n=parseInt(pv)||1;
  if(n>1){
    const ult=new Date(venc.getFullYear(), venc.getMonth()+n-1, 1);
    el.innerHTML=`🧾 ${aviso}a 1ª parcela cai na fatura de <b>${fmt(venc)}</b> e a última em <b>${fmt(ult)}</b>.`;
  }else{
    el.innerHTML=`🧾 ${aviso}entra na fatura de <b>${fmt(venc)}</b> (vence dia ${cartao.dia_vencimento}).`;
  }
}
function updateParcNote(){
  if(!$('parcNote'))return;
  const pv=$('lParcelas')?$('lParcelas').value:'1';
  const v=evalValor($('lValor').value)||0;
  if(pv==='rec'){ $('parcNote').innerHTML = v>0?`🔁 <b>${brl(v)}</b> todo mês`:''; return; }
  const n=parseInt(pv)||1;
  if(n>1&&v>0){const each=Math.floor(v/n*100)/100;$('parcNote').innerHTML=`${n}x de aprox. <b>${brl(each)}</b> · entra na fatura de cada mês`;}
  else $('parcNote').textContent='';
}

// calcula a competência (1º dia do mês da fatura) p/ uma compra
function calcCompetencia(dataStr,diaFechamento){
  const d=new Date(dataStr+'T00:00:00');
  let y=d.getFullYear(),m=d.getMonth();
  if(d.getDate()>diaFechamento) m+=1;
  return new Date(y,m,1);
}
// Mês em que a fatura é PAGA (vencimento). Se vence antes/no fechamento, vence no mês seguinte ao fechamento.
function cardDueOffset(c){ return (c && Number(c.dia_vencimento)>Number(c.dia_fechamento)) ? 0 : 1; }
function faturaYm(competencia, cartao){
  if(!competencia) return '';
  const d=new Date(competencia+'T00:00:00');
  const t=new Date(d.getFullYear(), d.getMonth()+cardDueOffset(cartao), 1);
  return ymd(t).slice(0,7);
}
async function saveLanc(id){
  const desc=$('lDesc').value.trim();
  const valor=evalValor($('lValor').value);
  const data=$('lData').value;
  if(!desc){toast('Informe a descrição');return;}
  if(isNaN(valor)){toast('Valor inválido (confira a conta)');return;}
  if(!(valor>0)){toast('Informe um valor válido');return;}
  if(!data){toast('Informe a data');return;}
  if(lancType!=='transferencia' && !window._meio){toast('Escolha Conta ou Cartão');return;}
  const isCardPurchase = (lancType!=='transferencia' && window._meio==='cartao');
  if(!isCardPurchase && !window._lancStatus){toast('Toque em Pago ou Pendente pra confirmar');return;}

  if(lancType==='transferencia'){
    const o=$('lContaOrig').value, d=$('lContaDest').value;
    const destOwner = $('lDestOwner') ? $('lDestOwner').value : USER.id;
    if(!d){toast('Selecione a conta de destino');return;}
    if(destOwner!==USER.id){
      const {error}=await sb.rpc('transferir_parceiro',{p_conta_origem:o,p_owner_destino:destOwner,p_conta_destino:d,p_valor:valor,p_descricao:desc,p_data:data});
      if(error){toast('Erro: '+error.message);return;}
      closeSheet(); await loadAll(); toast('Transferência enviada ✅'); render(); return;
    }
    if(o===d){toast('Origem e destino devem ser diferentes');return;}
    const row={user_id:USER.id,tipo:'transferencia',descricao:desc,valor,data,status:window._lancStatus||'pago',conta_id:o,conta_destino_id:d};
    await upsertLanc(id,row); return;
  }

  if(window._meio==='cartao'){
    const cartaoId=$('lCartao')?$('lCartao').value:null;
    if(!cartaoId){toast('Selecione o cartão');return;}
    const pv=$('lParcelas')?$('lParcelas').value:'';
    if(!pv){toast('Escolha as parcelas (à vista, parcelado ou recorrente)');return;}
    const rec = pv==='rec';
    const n = rec?24:(parseInt(pv)||1);
    const cartao=cartaoById(cartaoId);
    if(id){const old=DATA.lancamentos.find(l=>l.id===id); if(old&&old.grupo_id){await sb.from('lancamentos').delete().eq('grupo_id',old.grupo_id);} else {await sb.from('lancamentos').delete().eq('id',id);} }
    const grupo=uuid();
    const baseComp=calcCompetencia(data,cartao.dia_fechamento);
    const rows=[];
    if(rec){
      // cobrança fixa todo mês (24 meses à frente), cada mês com sua data e competência
      for(let i=0;i<24;i++){
        const dataI=addMonths(data,i);
        const comp=calcCompetencia(dataI,cartao.dia_fechamento);
        rows.push({user_id:USER.id,tipo:'despesa',descricao:desc,valor,data:dataI,status:'pago',
          cartao_id:cartaoId,categoria_id:window._catSel||null,competencia:ymd(comp),
          grupo_id:grupo});
      }
    }else{
      const centavos=Math.round(valor*100);
      const each=Math.floor(centavos/n);
      const resto=centavos-each*n;
      for(let i=0;i<n;i++){
        const comp=new Date(baseComp.getFullYear(),baseComp.getMonth()+i,1);
        let cent=each; if(i===n-1) cent+=resto;
        rows.push({user_id:USER.id,tipo:'despesa',descricao:desc,valor:cent/100,data,status:'pago',
          cartao_id:cartaoId,categoria_id:window._catSel||null,competencia:ymd(comp),
          grupo_id:n>1?grupo:null,parcela:n>1?i+1:null,parcelas:n>1?n:null});
      }
    }
    const {error}=await sb.from('lancamentos').insert(rows);
    if(error){toast('Erro: '+error.message);return;}
    closeSheet(); await loadAll(); toast(rec?'Recorrência criada (24 meses) 🔁':(id?'Compra atualizada':'Compra registrada')); render(); return;
  }

  // conta normal
  const contaId=$('lConta').value;
  if(!contaId){toast('Selecione a conta');return;}
  const recVal = $('lRecorr') ? $('lRecorr').value : '0';
  const recorr = recVal==='fixo' ? 24 : (recVal==='custom' ? (Math.min(120,Math.max(0,parseInt($('lRecorrN')?$('lRecorrN').value:'')||0))) : (parseInt(recVal)||0));
  if(!id && recorr>1){
    const grupo=uuid();
    const rows=[];
    for(let i=0;i<recorr;i++){
      rows.push({user_id:USER.id,tipo:lancType,descricao:desc,valor,data:addMonths(data,i),
        status: i===0?(window._lancStatus||'pago'):'pendente',
        conta_id:contaId,categoria_id:window._catSel||null,grupo_id:grupo});
    }
    const {error}=await sb.from('lancamentos').insert(rows);
    if(error){toast('Erro: '+error.message);return;}
    closeSheet(); await loadAll(); toast(recorr+'x criadas'); render(); return;
  }
  const row={user_id:USER.id,tipo:lancType,descricao:desc,valor,data,status:window._lancStatus||'pago',
    conta_id:contaId,categoria_id:window._catSel||null};
  await upsertLanc(id,row);
}
function addMonths(dateStr,n){
  const b=new Date(dateStr+'T00:00:00'); const day=b.getDate();
  const t=new Date(b.getFullYear(),b.getMonth()+n,1);
  const dim=new Date(t.getFullYear(),t.getMonth()+1,0).getDate();
  t.setDate(Math.min(day,dim));
  return ymd(t);
}
async function upsertLanc(id,row){
  let error;
  if(id){({error}=await sb.from('lancamentos').update(row).eq('id',id));}
  else{({error}=await sb.from('lancamentos').insert(row));}
  if(error){toast('Erro: '+error.message);return;}
  closeSheet(); await loadAll(); toast(id?'Transação atualizada':'Transação adicionada'); render();
}

}

  const fecha=parseInt($('kFecha').value), vence=parseInt($('kVence').value);
  if(!(fecha>=1&&fecha<=31)){toast('Dia de fechamento inválido');return;}
  if(!(vence>=1&&vence<=31)){toast('Dia de vencimento inválido');return;}

// ============ IMPORTAÇÃO MOBILLS ============
function triggerImport(){ $('mobillsFile').click(); }
function splitCsvLine(line){
  const out=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(inQ){ if(c==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else inQ=false; } else cur+=c; }
    else { if(c==='"') inQ=true; else if(c===';'){ out.push(cur); cur=''; } else cur+=c; }
  }
  out.push(cur); return out;
}
function parseBRNumber(s){ s=(s||'').replace(/\s/g,''); if(s.includes(',')){ s=s.replace(/\./g,'').replace(',','.'); } return parseFloat(s); }
function parseBRDate(s){ const m=(s||'').match(/(\d{2})\/(\d{2})\/(\d{4})/); return m?`${m[3]}-${m[2]}-${m[1]}`:null; }

function parseMobills(text){
  text=text.replace(/^\uFEFF/,'');
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length);
  let header=null; const out=[]; const contas=new Map(); const cats=new Map();
  for(const line of lines){
    const cells=splitCsvLine(line);
    if(!header){ header=cells.map(c=>c.toLowerCase().trim()); continue; }
    const get=name=>{const i=header.indexOf(name);return i>=0?(cells[i]||''):'';};
    const dataStr=get('data').trim(), valRaw=get('valor').trim();
    const contaNome=get('conta').trim(), catNome=get('categoria').trim();
    let desc=get('descricao').trim();
    if(!dataStr||!valRaw) continue;
    const valor=parseBRNumber(valRaw); if(isNaN(valor)) continue;
    const data=parseBRDate(dataStr); if(!data) continue;
    const tipo=valor<0?'despesa':'receita';
    let parcela=null,parcelas=null;
    const m=desc.match(/\((\d+)\s*\/\s*(\d+)\)/);
    if(m){ parcela=+m[1]; parcelas=+m[2]; desc=desc.replace(/\s*\(\d+\s*\/\s*\d+\)\s*$/,'').trim()||desc; }
    if(contaNome) contas.set(contaNome,'pessoal');
    if(catNome) cats.set(catNome,(cats.get(catNome)||0)+valor);
    out.push({data,desc:desc||'(sem descrição)',valor:Math.abs(valor),tipo,conta:contaNome,cat:catNome,parcela,parcelas});
  }
  return {rows:out,contas,cats};
}
async function handleMobillsFile(ev){
  const file=ev.target.files&&ev.target.files[0]; ev.target.value='';
  if(!file) return;
  let text; try{ text=await file.text(); }catch(e){ toast('Não consegui ler o arquivo'); return; }
  let p; try{ p=parseMobills(text); }catch(e){ toast('Arquivo em formato inesperado'); return; }
  if(!p.rows.length){ toast('Nenhuma transação encontrada no arquivo'); return; }
  window._importData=p;
  const nLanc=p.rows.length, nContas=p.contas.size, nCats=p.cats.size;
  const rec=p.rows.filter(r=>r.tipo==='receita').reduce((a,r)=>a+r.valor,0);
  const desp=p.rows.filter(r=>r.tipo==='despesa').reduce((a,r)=>a+r.valor,0);
  const contasList=[...p.contas.keys()];
  // quais já existem
  const existing=new Set(DATA.contas.map(c=>c.nome.toLowerCase()));
  const novas=contasList.filter(n=>!existing.has(n.toLowerCase()));
  openSheet(`
    <h2>Importar do Mobills</h2>
    <div class="note">Encontrei no seu arquivo:</div>
    <div class="card" style="margin-top:10px;margin-bottom:12px">
      <div class="lrow"><div class="dot">🧾</div><div class="mid"><div class="t">${nLanc} transações</div><div class="s">${mesRangeLabel(p.rows)}</div></div></div>
      <div class="lrow"><div class="dot" style="background:#e7f6ee">⬆️</div><div class="mid"><div class="t">Receitas</div><div class="s">${nCats} categorias no total</div></div><div class="amt g">${brl(rec)}</div></div>
      <div class="lrow"><div class="dot" style="background:#fdeceb">⬇️</div><div class="mid"><div class="t">Despesas</div><div class="s">${nContas} contas</div></div><div class="amt r">${brl(desp)}</div></div>
    </div>
    <div class="note"><b>Contas que serão criadas:</b> ${novas.length?novas.map(esc).join(', '):'(nenhuma nova — todas já existem)'}</div>
    <div class="note" style="margin-top:8px">As transações entram como <b>pagas</b>, na conta e categoria certas. Compras parceladas mostram o "x/y". Categorias e contas novas são criadas sozinhas.</div>
    <div class="note" style="margin-top:8px;color:#a9701a">⚠️ O saldo de cada conta vai refletir só o que foi importado. Depois, em <b>Contas</b>, você ajusta o "saldo inicial" de cada uma pro valor real.</div>
    <button class="btn" style="margin-top:14px" onclick="commitImport()">Importar ${nLanc} transações</button>
    <button class="btn ghost" onclick="closeSheet()">Cancelar</button>
  `);
}
function mesRangeLabel(rows){
  const ds=rows.map(r=>r.data).sort();
  if(!ds.length) return '';
  const f=d=>new Date(d+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
  return ds[0]===ds[ds.length-1]?f(ds[0]):`${f(ds[0])} a ${f(ds[ds.length-1])}`;
}
async function commitImport(){
  const p=window._importData; if(!p) return;
  closeSheet(); toast('Importando…');
  // 1) contas
  const contaId={}; DATA.contas.forEach(c=>contaId[c.nome.toLowerCase()]=c.id);
  const novasContas=[...p.contas.keys()].filter(n=>!(n.toLowerCase() in contaId));
  if(novasContas.length){
    const rows=novasContas.map(n=>({user_id:USER.id,nome:n,tipo:'pessoal',saldo_inicial:0}));
    const {data,error}=await sb.from('contas').insert(rows).select();
    if(error){toast('Erro ao criar contas: '+error.message);return;}
    data.forEach(c=>contaId[c.nome.toLowerCase()]=c.id);
  }
  // 2) categorias
  const catId={}; DATA.categorias.forEach(c=>catId[c.nome.toLowerCase()]=c.id);
  const novasCats=[...p.cats.entries()].filter(([n])=>!(n.toLowerCase() in catId));
  if(novasCats.length){
    const rows=novasCats.map(([n,sum])=>({user_id:USER.id,nome:n,tipo:sum>=0?'receita':'despesa'}));
    const {data,error}=await sb.from('categorias').insert(rows).select();
    if(error){toast('Erro ao criar categorias: '+error.message);return;}
    data.forEach(c=>catId[c.nome.toLowerCase()]=c.id);
  }
  // 3) lançamentos (em lotes)
  const rows=p.rows.map(r=>({
    user_id:USER.id, tipo:r.tipo, descricao:r.desc, valor:r.valor, data:r.data, status:'pago',
    conta_id: r.conta?(contaId[r.conta.toLowerCase()]||null):null,
    categoria_id: r.cat?(catId[r.cat.toLowerCase()]||null):null,
    parcela:r.parcela, parcelas:r.parcelas
  }));
  for(let i=0;i<rows.length;i+=200){
    const {error}=await sb.from('lancamentos').insert(rows.slice(i,i+200));
    if(error){toast('Erro ao importar: '+error.message);return;}
  }
  await loadAll(); toast('✅ '+rows.length+' transações importadas'); go('home');
}

// ============ INSTALAÇÃO (PWA) ============
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); _deferredPrompt=e; });
function isStandalone(){ return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true; }
function isIOS(){ return /iphone|ipad|ipod/i.test(navigator.userAgent); }
function installDismissed(){ try{ return localStorage.getItem('installDismiss')==='1'; }catch(e){ return false; } }
function dismissInstall(){ try{ localStorage.setItem('installDismiss','1'); }catch(e){} const b=$('installBanner'); if(b)b.classList.add('hidden'); }
function maybeShowInstall(){
  if(isStandalone()) return;            // já instalado
  if(_promptAfterSignup){ _promptAfterSignup=false; openInstallSheet(); return; }
  if(installDismissed()) return;
  const b=$('installBanner'); if(b) b.classList.remove('hidden');
}
async function openInstallSheet(){
  // Android/desktop com prompt nativo
  if(_deferredPrompt){
    _deferredPrompt.prompt();
    try{ await _deferredPrompt.userChoice; }catch(e){}
    _deferredPrompt=null; dismissInstall(); return;
  }
  // iOS (e fallback): instruções
  const passos = isIOS() ? `
    <div class="istep"><div class="n">1</div><div class="st">Toque no botão <b>Compartilhar</b> (o quadradinho com a setinha pra cima ⬆️, na barra de baixo do Safari).</div></div>
    <div class="istep"><div class="n">2</div><div class="st">Role e toque em <b>Adicionar à Tela de Início</b>.</div></div>
    <div class="istep"><div class="n">3</div><div class="st">Toque em <b>Adicionar</b>. Pronto — o ícone do Gestor aparece na sua tela. 🎉</div></div>
  ` : `
    <div class="istep"><div class="n">1</div><div class="st">Toque no menu <b>⋮</b> do navegador (canto superior).</div></div>
    <div class="istep"><div class="n">2</div><div class="st">Toque em <b>Instalar app</b> (ou "Adicionar à tela inicial").</div></div>
    <div class="istep"><div class="n">3</div><div class="st">Confirme. O ícone do Gestor aparece na sua tela. 🎉</div></div>
  `;
  openSheet(`
    <h2>Instalar na tela de início</h2>
    <div class="note">Assim o app abre em tela cheia, com o ícone do Gestor — e libera as notificações na tela bloqueada.</div>
    <div class="card" style="margin-top:12px">${passos}</div>
    <button class="btn" onclick="closeSheet();dismissInstall()">Entendi</button>
  `);
}

// ============ PUSH (notificação na tela bloqueada) ============
function urlB64ToUint8(base64){
  const pad='='.repeat((4-base64.length%4)%4);
  const b=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(b); const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}
function pushSuportado(){ return ('serviceWorker' in navigator) && ('PushManager' in window) && ('Notification' in window); }
async function jaInscrito(){
  try{ const reg=await navigator.serviceWorker.ready; const s=await reg.pushManager.getSubscription(); return !!s; }catch(e){ return false; }
}
async function ativarPush(){
  if(!pushSuportado()){ toast('Este aparelho não suporta notificações push'); return; }
  if(isIOS() && !isStandalone()){ toast('No iPhone, instale o app na tela de início primeiro'); openInstallSheet(); return; }
  let perm=Notification.permission;
  if(perm!=='granted') perm=await Notification.requestPermission();
  if(perm!=='granted'){ toast('Permissão de notificação negada'); return; }
  try{
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub){ sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlB64ToUint8(VAPID_PUBLIC)}); }
    const j=sub.toJSON();
    const {error}=await sb.from('push_subs').upsert({user_id:USER.id, subscription:sub, endpoint:j.endpoint},{onConflict:'user_id,endpoint'});
    if(error){ toast('Erro ao salvar: '+error.message); return; }
    toast('Notificações ativadas 🔔'); if($('modalRoot').innerHTML) abrirNotificacoes();
  }catch(e){ toast('Não consegui ativar: '+(e.message||e)); }
}
